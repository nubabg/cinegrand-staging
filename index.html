<!DOCTYPE html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Grand Hygiene Control</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.svg" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap");

      :root {
        --bg: #06080c;
        --bg-2: #0b1016;
        --panel: #121821;
        --panel-2: #18212c;
        --panel-3: #0f141b;
        --border: #263140;
        --gold: #c87818;
        --gold-2: #eba030;
        --text: #f5f7fb;
        --muted: #9ba8b9;
        --muted-2: #6d7a8c;
        --green: #2dcc70;
        --green-dark: #16784a;
        --red: #ef5b5b;
        --red-dark: #862a2a;
        --blue: #62a9ff;
        --shadow: 0 16px 40px rgba(0,0,0,.32);
      }
      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        overscroll-behavior: none;
        -webkit-user-select: none; user-select: none;
        -webkit-touch-callout: none;
        background:
          radial-gradient(circle at top left, rgba(200,120,24,.14), transparent 24%),
          radial-gradient(circle at top right, rgba(98,169,255,.10), transparent 20%),
          linear-gradient(180deg, var(--bg) 0%, #05070a 100%);
        color: var(--text);
        font-family: "DM Sans", "Segoe UI", sans-serif;
      }

      button, input, select, textarea { font: inherit; }
      input, textarea { -webkit-user-select: text; user-select: text; }

      #app { position: relative; z-index: 1; }
      #modals { position: relative; z-index: 100; }
      .app-shell { min-height: 100vh; padding: 24px; }
      .workspace { width: min(1280px, 100%); margin: 0 auto; }

      .product-strip {
        position: relative;
        display: flex; align-items: center; justify-content: center;
        gap: 16px; margin-bottom: 14px; color: var(--muted);
        min-height: 48px;
      }
      .product-strip-left {
        display: flex; align-items: center; gap: 12px;
        margin: 0 auto;
      }
      .product-strip-status {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
      }

      .brand-badge {
        width: 42px; height: 42px; border-radius: 14px;
        display: inline-flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, var(--gold), var(--gold-2));
        color: #15110b; font-family: "Oswald", sans-serif;
        font-size: 22px; font-weight: 700; letter-spacing: .08em;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.45);
      }

      .brand-meta strong {
        display: block; color: var(--text); font-family: "Oswald", sans-serif;
        font-size: 18px; letter-spacing: .08em; text-transform: uppercase;
      }
      .brand-meta span { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }

      .topbar-shell { position: sticky; top: 16px; z-index: 20; margin-bottom: 18px; }
      .topbar {
        display: flex; justify-content: space-between; align-items: center;
        gap: 16px; padding: 16px 18px;
        border: 1px solid rgba(200,120,24,.18); border-radius: 20px;
        background: linear-gradient(180deg, rgba(19,24,33,.96) 0%, rgba(10,14,20,.96) 100%);
        box-shadow: var(--shadow); backdrop-filter: blur(14px);
      }
      .topbar-nav { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .topbar-meta { display: flex; gap: 10px; align-items: center; color: var(--muted); white-space: nowrap; }

      .meta-chip {
        padding: 8px 12px; border-radius: 999px;
        background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06);
        font-size: 12px;
      }

      .btn {
        border: 1px solid transparent; border-radius: 14px;
        padding: 10px 14px; cursor: pointer;
        transition: transform .16s ease, border-color .16s ease, background .16s ease;
      }
      .btn:hover, .nav-btn:hover, .status-btn:hover, .tab:hover { transform: translateY(-1px); }

      .btn-gold {
        background: linear-gradient(135deg, var(--gold), var(--gold-2));
        color: #15110b; font-weight: 700;
        border-color: rgba(0,0,0,.15);
        outline: 2px solid transparent; outline-offset: 2px;
      }
      .btn-gold:focus-visible { outline-color: var(--gold-2); }
      .btn-outline {
        background: rgba(255,255,255,.03); color: var(--text);
        border-color: rgba(255,255,255,.1);
      }
      .btn-outline:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
      .btn-green {
        background: rgba(45,204,112,.12); color: var(--green);
        border-color: rgba(45,204,112,.24);
      }
      .btn-green:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }
      .btn-red {
        background: rgba(239,91,91,.12); color: var(--red);
        border-color: rgba(239,91,91,.24);
      }
      .btn-red:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
      .nav-btn {
        background: transparent; border: 1px solid transparent;
        color: var(--muted); border-radius: 12px; padding: 10px 12px;
        font-family: "Oswald", sans-serif; font-size: 14px; font-weight: 500;
        text-transform: uppercase; letter-spacing: .04em; cursor: pointer;
      }
      .nav-btn:hover { color: var(--text); background: rgba(255,255,255,.04); }
      .nav-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
      .nav-btn.state {
        color: var(--gold-2); border-color: rgba(200,120,24,.26);
        background: rgba(200,120,24,.10);
      }
      .nav-btn.cooldown { opacity: 0.7; cursor: not-allowed; pointer-events: none; }

      .page { padding: 8px 0 24px; }
      .grid { display: grid; gap: 16px; }
      .cards-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .cards-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

      .panel {
        background: linear-gradient(180deg, rgba(24,33,44,.98) 0%, rgba(15,20,27,.98) 100%);
        border: 1px solid var(--border); border-radius: 20px;
        padding: 20px; box-shadow: var(--shadow);
      }
      .panel-soft {
        background:
          linear-gradient(135deg, rgba(200,120,24,.18), rgba(98,169,255,.08)),
          linear-gradient(180deg, rgba(24,33,44,.98), rgba(15,20,27,.98));
        border-color: rgba(200,120,24,.24);
      }

      .hero-title, .section-title {
        margin: 0 0 8px; font-family: "Oswald", sans-serif;
        letter-spacing: .04em; text-transform: uppercase;
      }
      .hero-title { font-size: 34px; }
      .section-title { font-size: 24px; }
      .muted { color: var(--muted); }
      .muted-2 { color: var(--muted-2); }

      .hero-grid {
        display: grid; grid-template-columns: minmax(0, 1.4fr) minmax(280px, .8fr);
        gap: 18px; align-items: stretch;
      }
      .hero-copy {
        display: flex; flex-direction: column;
        justify-content: space-between; min-height: 220px;
      }
      .hero-kicker {
        color: var(--gold-2); font-family: "Oswald", sans-serif;
        font-size: 13px; letter-spacing: .18em;
        text-transform: uppercase; margin-bottom: 10px;
      }
      .hero-orbit {
        border-radius: 18px; min-height: 220px;
        background:
          radial-gradient(circle at center, rgba(235,203,120,.20), transparent 36%),
          linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
        display: flex; align-items: center; justify-content: center;
        position: relative; overflow: hidden;
      }
      .hero-orbit::before, .hero-orbit::after {
        content: ""; position: absolute; border-radius: 50%;
        border: 1px solid rgba(200,120,24,.28);
      }
      .hero-orbit::before { width: 180px; height: 180px; }
      .hero-orbit::after { width: 240px; height: 240px; opacity: .55; }

      .hero-core {
        width: 108px; height: 108px; border-radius: 28px;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, var(--gold), var(--gold-2));
        color: #17120a; font-family: "Oswald", sans-serif;
        font-size: 46px; font-weight: 700;
        box-shadow: 0 18px 40px rgba(200,120,24,.18);
      }
      .hero-metrics {
        display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px; margin-top: 18px;
      }
      .metric {
        padding: 14px; border-radius: 16px;
        background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      }
      .metric-label {
        color: var(--muted); font-size: 11px;
        letter-spacing: .12em; text-transform: uppercase;
      }
      .metric-value { font-family: "Oswald", sans-serif; font-size: 26px; margin-top: 6px; }

      .stat {
        text-align: center;
        background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      }
      .stat strong {
        display: block; font-family: "Oswald", sans-serif;
        font-size: 36px; margin-top: 8px;
      }

      .card-pick { cursor: pointer; overflow: hidden; padding: 0; transition: transform .2s ease, box-shadow .2s ease; }
      .card-pick:hover { transform: translateY(-4px); box-shadow: 0 24px 48px rgba(0,0,0,.4); }

      .card-head {
        padding: 22px 22px 28px; min-height: 240px; position: relative;
        display: flex; flex-direction: column; justify-content: flex-end;
      }
      .card-text-icon {
        position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
        font-family: "Oswald", sans-serif; font-weight: 700;
        font-size: 44px; letter-spacing: .06em; text-transform: uppercase;
        background: linear-gradient(135deg, var(--gold), var(--gold-2));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; opacity: .32; pointer-events: none;
        line-height: 1.1; text-align: center; max-width: 160px;
      }


      .card-body {
        padding: 18px 20px 20px;
        background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      }

      .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
      .tag {
        font-size: 11px; padding: 5px 9px; border-radius: 999px;
        border: 1px solid rgba(255,255,255,.08);
        color: var(--muted); background: rgba(255,255,255,.03);
      }

      .field { display: grid; gap: 8px; margin-bottom: 14px; }
      .field label {
        font-size: 11px; color: var(--muted); text-transform: uppercase;
        letter-spacing: .14em; font-family: "Oswald", sans-serif;
      }
      .field input, .field select, .field textarea {
        width: 100%; background: var(--panel-3); color: var(--text);
        border: 1px solid rgba(255,255,255,.08); border-radius: 14px;
        padding: 12px 14px;
      }
      .field input:focus, .field select:focus, .field textarea:focus {
        outline: none; border-color: rgba(200,120,24,.45);
        box-shadow: 0 0 0 3px rgba(200,120,24,.12);
      }

      .items { display: grid; gap: 10px; }
      .item-row {
        display: grid; grid-template-columns: 1fr 240px;
        gap: 16px; align-items: center;
        background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.06);
        border-left: 4px solid rgba(200,120,24,.24); border-radius: 16px;
        padding: 14px 16px; transition: background .2s ease, border-color .2s ease;
      }
      .item-row.clean { border-left-color: var(--green); background: rgba(45,204,112,.08); }
      .item-row.dirty { border-left-color: var(--red); background: rgba(239,91,91,.08); }
      .item-row.missing { border-left-color: #f59e0b; }
      .item-title { font-weight: 700; margin-bottom: 4px; }
      .status-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .status-btn {
        border: 1px solid rgba(255,255,255,.08); border-radius: 14px;
        padding: 12px 8px; cursor: pointer;
        background: rgba(255,255,255,.03); color: var(--text);
        font-family: "Oswald", sans-serif; letter-spacing: .05em;
        transition: background .15s ease, border-color .15s ease, transform .1s ease;
      }
      .status-btn:active { transform: scale(.96); }
      .status-btn.active.clean { background: linear-gradient(135deg, var(--green), var(--green-dark)); border-color: var(--green); }
      .status-btn.active.dirty { background: linear-gradient(135deg, var(--red), var(--red-dark)); border-color: var(--red); }

      .toolbar {
        display: flex; flex-wrap: wrap; justify-content: space-between;
        align-items: center; gap: 10px; margin-bottom: 18px;
      }

      .table-wrap { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,.06); }
      th {
        color: var(--muted); font-size: 11px; text-transform: uppercase;
        letter-spacing: .16em; font-family: "Oswald", sans-serif;
      }
      tr:nth-child(even) td { background: rgba(255,255,255,.02); }

      .pill {
        display: inline-block; padding: 4px 10px;
        border-radius: 999px; font-size: 12px; font-weight: 700;
      }
      .pill.ok { color: var(--green); background: rgba(45,204,112,.15); }
      .pill.bad { color: var(--red); background: rgba(239,91,91,.15); }

      .progress { height: 6px; background: rgba(255,255,255,.04); border-radius: 999px; overflow: hidden; }
      .progress > div { height: 100%; background: linear-gradient(135deg, var(--gold), var(--gold-2)); transition: width .3s ease; }

      .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
      .tab {
        background: rgba(255,255,255,.03); color: var(--muted);
        border: 1px solid rgba(255,255,255,.08); border-radius: 999px;
        padding: 8px 12px; cursor: pointer;
        transition: background .15s ease, color .15s ease;
      }
      .tab.active { color: var(--gold-2); border-color: rgba(200,120,24,.28); background: rgba(200,120,24,.10); }

      .bars { display: grid; gap: 10px; }
      .bar-label { display: flex; justify-content: space-between; margin-bottom: 6px; gap: 10px; }
      .bar-track { height: 8px; background: rgba(255,255,255,.04); border-radius: 999px; overflow: hidden; }
      .bar-fill { height: 100%; border-radius: 999px; transition: width .4s ease; }

      .footer-bar {
        margin-top: 24px; display: flex; justify-content: space-between;
        gap: 18px; flex-wrap: wrap; align-items: center;
        color: var(--muted); padding: 16px 2px 0;
      }
      .footer-links, .footer-icons { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; }
      .footer-icons span, .footer-links span {
        padding: 8px 10px; border-radius: 999px;
        background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      }

      .modal-backdrop {
        position: fixed; inset: 0; background: rgba(0,0,0,.78);
        display: flex; align-items: center; justify-content: center;
        padding: 20px; z-index: 40;
        animation: fadeIn .2s ease;
      }
      .modal {
        width: min(520px, 100%);
        background: linear-gradient(180deg, rgba(24,33,44,.98) 0%, rgba(15,20,27,.98) 100%);
        border: 1px solid rgba(255,255,255,.08); border-radius: 20px;
        padding: 24px; box-shadow: var(--shadow);
        animation: slideUp .25s ease;
      }
      .toast {
        position: fixed; right: 20px; bottom: 20px; z-index: 50;
        padding: 14px 16px; border-radius: 16px; color: var(--text);
        border: 1px solid transparent; box-shadow: var(--shadow);
        animation: slideIn .3s ease;
      }
      .toast.success { background: rgba(22,101,52,.95); border-color: var(--green); }
      .toast.error { background: rgba(127,29,29,.95); border-color: var(--red); }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes liveBlink { 0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(45,204,112,.6); } 50% { opacity: .6; box-shadow: 0 0 8px 2px rgba(45,204,112,.8); } }
      .live-dot {
        display: inline-block; width: 8px; height: 8px; border-radius: 50%;
        background: var(--green); margin-right: 6px; vertical-align: middle;
        animation: liveBlink 1.5s ease-in-out infinite;
      }

      /* Декоративна метла в background – не пречи на кликове */
      .broom-fun {
        position: fixed; bottom: 0; left: 0; right: 0;
        height: 80px; z-index: 0; pointer-events: none;
        overflow: hidden;
      }
      .broom-sweep {
        position: absolute; bottom: 12px; left: -60px;
        font-size: 42px; opacity: .35;
        animation: sweepAcross 18s ease-in-out infinite;
      }
      .broom-dust {
        position: absolute; bottom: 24px; width: 6px; height: 6px;
        border-radius: 50%; background: rgba(255,255,255,.25);
        pointer-events: none;
      }
      .broom-dust:nth-child(1) { left: 8%; animation: dustFade 18s ease-in-out infinite 0s; }
      .broom-dust:nth-child(2) { left: 22%; animation: dustFade 18s ease-in-out infinite 1.5s; }
      .broom-dust:nth-child(3) { left: 38%; animation: dustFade 18s ease-in-out infinite 3s; }
      .broom-dust:nth-child(4) { left: 55%; animation: dustFade 18s ease-in-out infinite 4.5s; }
      .broom-dust:nth-child(5) { left: 72%; animation: dustFade 18s ease-in-out infinite 6s; }
      .broom-dust:nth-child(6) { left: 88%; animation: dustFade 18s ease-in-out infinite 7.5s; }
      @keyframes sweepAcross {
        0%, 100% { transform: translateX(0) rotate(-5deg); }
        25% { transform: translateX(25vw) rotate(2deg); }
        50% { transform: translateX(50vw) rotate(-3deg); }
        75% { transform: translateX(75vw) rotate(2deg); }
        100% { transform: translateX(100vw) translateX(60px) rotate(-5deg); }
      }
      @keyframes dustFade {
        0%, 10%, 90%, 100% { opacity: 0; transform: scale(0.8); }
        25%, 50%, 75% { opacity: .4; transform: scale(1); }
      }

      @media (max-width: 980px) {
        .hero-grid, .cards-2, .cards-4, .cg-chart-grid { grid-template-columns: 1fr; }
        .topbar { flex-direction: column; align-items: stretch; }
        .topbar-meta { justify-content: flex-start; flex-wrap: wrap; }
        .product-strip {
          flex-direction: column;
          justify-content: center;
          text-align: center;
          gap: 10px;
        }
        .product-strip-left { justify-content: center; }
        .product-strip-status {
          position: static;
          transform: none;
        }
      }
      @media (max-width: 900px) {
        .item-row { grid-template-columns: 1fr; }
      }

      /* ── Charts Screen ── */
      .charts-loading {
        display: flex; align-items: center; justify-content: center;
        gap: 14px; padding: 80px 20px; color: var(--muted); font-size: 15px;
      }
      .charts-loading .spinner {
        width: 36px; height: 36px; border-radius: 50%;
        border: 3px solid var(--border); border-top-color: var(--gold);
        animation: spin .8s linear infinite;
      }
      .charts-stat-row {
        display: grid; grid-template-columns: repeat(4, 1fr);
        gap: 12px; margin-bottom: 20px;
      }
      .charts-stat-pill {
        display: flex; flex-direction: column; align-items: center;
        gap: 4px; padding: 20px 16px;
        background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
        border: 1px solid rgba(255,255,255,.07); border-radius: 18px;
        text-align: center;
      }
      .charts-stat-pill strong { font-family: "Oswald", sans-serif; font-size: 36px; line-height: 1; }
      .charts-stat-pill span  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; }
      .charts-grid {
        display: grid; grid-template-columns: repeat(2, 1fr);
        gap: 16px; margin-bottom: 16px;
      }
      @media (max-width: 860px) {
        .charts-grid { grid-template-columns: 1fr; }
        .charts-stat-row { grid-template-columns: repeat(2, 1fr); }
      }
      .chart-card.full-width { grid-column: 1 / -1; }
      .charts-table {
        width: 100%; border-collapse: collapse; font-size: 13px;
      }
      .charts-table th {
        text-align: left; padding: 10px 12px;
        font-family: "Oswald", sans-serif; font-weight: 600;
        font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
        color: var(--muted); border-bottom: 1px solid rgba(255,255,255,.08);
      }
      .charts-table td {
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255,255,255,.04);
        color: var(--muted);
      }
      .charts-table tr:last-child td { border-bottom: none; }
      .charts-table tr:hover td { background: rgba(255,255,255,.02); }
      .charts-bar-bg {
        background: rgba(255,255,255,.06); border-radius: 6px; height: 8px; width: 100%; max-width: 200px;
      }
      .charts-bar-fill {
        background: var(--gold); border-radius: 6px; height: 100%;
      }
      .charts-bar-fill--green { background: var(--green); }
      .charts-bar-fill--red { background: var(--red); }
      .charts-bar-fill--blue { background: var(--blue); }
      .charts-bar-fill--purple { background: #a78bfa; }
      .charts-html-list { display: flex; flex-direction: column; gap: 12px; }
      .charts-html-row { display: flex; align-items: center; gap: 12px; font-size: 13px; padding: 4px 0; border-radius: 8px; transition: background .15s ease; }
      .charts-html-row:hover { background: rgba(255,255,255,.02); }
      .charts-html-row span:first-child { min-width: 90px; color: var(--muted); flex-shrink: 0; }
      .charts-html-row span:last-child { min-width: 32px; text-align: right; font-weight: 600; color: var(--text); }
      .charts-html-row .charts-bar-bg { flex: 1; max-width: none; height: 10px; }
      /* KPI cards */
      .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 16px; }
      .kpi-card { padding: 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,.06); background: linear-gradient(160deg, rgba(255,255,255,.03), transparent); transition: transform .15s ease, border-color .15s ease; }
      .kpi-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,.1); }

          const attempts = JSON.parse(localStorage.getItem(ACCESS_ATTEMPTS_KEY) || "[]");

          const recent = attempts.filter(t => Date.now() - t < ACCESS_BLOCK_DURATION_MS);
          localStorage.setItem(ACCESS_ATTEMPTS_KEY, JSON.stringify(recent));
          if (recent.length >= ACCESS_MAX_ATTEMPTS) {
            localStorage.setItem(ACCESS_BLOCK_KEY, JSON.stringify({ blockedAt: Date.now() }));
            return true;
          }
          return false;
        } catch (_) { return false; }
      }

      /* ── Location Lock helpers ── */

        if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();

      async function acquireLock(type, location, sessionId) {
        if (!isSheetsConfigured()) return { success: true };
        try {
          const res = await fetch(SHEETS_WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=UTF-8" },
            body: JSON.stringify({ action: "acquireLock", type, location, sessionId }),
          });
          if (!res.ok) return { success: true, offline: true };
          try { return await res.json(); } catch (_) { return { success: true, offline: true }; }
        } catch (err) {
          console.warn("[Lock] acquireLock failed:", err.message);
          return { success: true, offline: true };
        }
      }

      async function releaseLock(sessionId) {
        if (!sessionId || !isSheetsConfigured()) return;
        try {
          await fetch(SHEETS_WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=UTF-8" },
            body: JSON.stringify({ action: "releaseLock", sessionId }),
          });
        } catch (err) {
          console.warn("[Lock] releaseLock failed:", err.message);
        }
      }

      function releaseLockBeacon(sessionId) {
        if (!sessionId || !isSheetsConfigured()) return;
        const payload = JSON.stringify({ action: "releaseLock", sessionId });
        try {
          fetch(SHEETS_WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=UTF-8" },
            body: payload,
            keepalive: true,
          }).catch(() => {});
        } catch (_) {}
        try {
          const blob = new Blob([payload], { type: "text/plain;charset=UTF-8" });
          navigator.sendBeacon(SHEETS_WEB_APP_URL, blob);
        } catch (_) {}
      }

      function cleanupSessionLock() {
        if (state.currentSessionId) {
          releaseLock(state.currentSessionId);

      /* ── Geolocation Access Control ── */
      const CINEMA_LAT = 42.678351;
      const CINEMA_LNG = 23.320035;
      const CINEMA_RADIUS_M = 200;
      const GEO_RECHECK_MS = 5 * 60 * 1000; /* Проверка на локация всеки 5 минути */

      function distanceMeters(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
        const Δφ = (lat2 - lat1) * Math.PI / 180;
        const Δλ = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                  Math.cos(φ1) * Math.cos(φ2) *
                  Math.sin(Δλ/2) * Math.sin(Δλ/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      function getGeolocation() {
        return new Promise((resolve) => {
          if (!navigator.geolocation) { resolve(null); return; }
          navigator.geolocation.getCurrentPosition(
            (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
            () => resolve(null),
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
          );
        });
      }

      function isNearCinema(lat, lng) {
        return distanceMeters(lat, lng, CINEMA_LAT, CINEMA_LNG) <= CINEMA_RADIUS_M;
      }

      async function checkAccess() {
        /* IP проверка — whitelisted IP-та имат достъп отвсякъде */
        let isWhitelistedIP = false;
        try {
          const res = await fetch("https://api.ipify.org?format=json");
          const { ip } = await res.json();
          isWhitelistedIP = ACCESS_ALLOWED_IPS.includes(ip);
        } catch (_) {
          /* Fallback: опитай втори IP сервис ако първият не отговори */
          try {
            const res2 = await fetch("https://api.my-ip.io/v2/ip.json");
            const data2 = await res2.json();
            if (data2 && data2.ip) isWhitelistedIP = ACCESS_ALLOWED_IPS.includes(data2.ip);
          } catch (_2) {}
        }
        sessionStorage.setItem(LOCK_WHITELISTED_KEY, isWhitelistedIP ? "1" : "0");

        const params = new URLSearchParams(window.location.search || (window.location.hash.startsWith("#") ? window.location.hash.slice(1) : ""));
        /* QR достъп — URL съдържа QR параметри */
        if (params.get("open") === "inspection") {
          const type = params.get("type") || "";
          const loc = params.get("location") || "";
          /* Whitelisted IP-та пропускат cooldown — могат да сканират без ограничение */
          if (!isWhitelistedIP && getQRCooldownRemaining(type, loc) > 0) return false;
          if (!isWhitelistedIP) {
            /* Геолокация — трябва да е в киното (само за не-whitelisted IP) */
            updateLoadingText("Проверка на локация…");
            const pos = await getGeolocation();
            if (!pos || !isNearCinema(pos.lat, pos.lng)) return "outside";
          }
          sessionStorage.setItem(QR_SESSION_KEY, String(Date.now()));
          sessionStorage.setItem(QR_MODE_KEY, "1");
          sessionStorage.setItem(QR_TYPE_KEY, type);
          sessionStorage.setItem(QR_LOC_KEY, loc);
          return true;
        }
        /* Сесия — вече е влязъл чрез QR в тази сесия, проверка за изтичане */
        const sessionTs = parseInt(sessionStorage.getItem(QR_SESSION_KEY) || "0", 10);
        if (sessionTs) {
          if (Date.now() - sessionTs < QR_SESSION_TTL_MS) {
            if (!isWhitelistedIP) {
              /* Геолокация при reload на QR сесия (само за не-whitelisted IP) */
              updateLoadingText("Проверка на локация…");
              const pos = await getGeolocation();
              if (!pos || !isNearCinema(pos.lat, pos.lng)) return "outside";
            }
            return true;
          }
          sessionStorage.removeItem(QR_SESSION_KEY);
          sessionStorage.removeItem(QR_MODE_KEY);
          sessionStorage.removeItem(QR_TYPE_KEY);
          sessionStorage.removeItem(QR_LOC_KEY);
        }
        /* Whitelisted IP без QR — пълен достъп */
        if (isWhitelistedIP) return true;
        return false;
      }

      /* Само тези локации се показват в QR модала */
      const QR_LOCATIONS = [
        ...HALLS.map((loc) => ({ type: "hall", location: loc, icon: "🎬" })),
        { type: "bathroom", location: "Дамска тоалетна", icon: "🚿" },
        { type: "bathroom", location: "Мъжка тоалетна", icon: "🚿" },
      ];

      const CONFIGS = {
        hall: {
          title: "Проверка на Кинозала",

          accent: "var(--gold)",

      /* ── State ── */

      try { state.records = JSON.parse(localStorage.getItem(STORAGE_KEYS.records) || "[]"); }

      let toastTimer = null;

      /* ── Charts button cooldown (prevents spam / chart bugs) ── */
      const CHARTS_COOLDOWN_SEC = 15;

      /* ── Helpers ── */
      const app = document.getElementById("app");

      function getConfig(type) { return CONFIGS[type] || CONFIGS.hall; }

      function fmt(iso) {
        return new Date(iso).toLocaleString("bg-BG", {
          day: "2-digit", month: "2-digit", year: "numeric",
          hour: "2-digit", minute: "2-digit",
        });
      }

      function pct(issues, total) { return total > 0 ? Math.round((issues / total) * 100) : 0; }
      function isFilled(v) { return v === STATUS.CLEAN || v === STATUS.DIRTY; }
      function dirtyItems(record) { return (record && record.items || []).filter((i) => i && i.status === STATUS.DIRTY); }

      function escapeHtml(v) {
        return String(v || "").replace(/&/g, "&amp;").replace(/</g, "&lt;")
          .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      const RANGE_OPTIONS = [["today", "\u0414\u043d\u0435\u0441"], ["week", "\u0421\u0435\u0434\u043c\u0438\u0446\u0430"]];

      function rangeLabel(range) {
        const found = RANGE_OPTIONS.find(([v]) => v === range);
        return found ? found[1] : "\u0421\u0435\u0434\u043c\u0438\u0446\u0430";
      }

      function recordsForRange(range) {
        const now = new Date();
        return state.records.filter((r) => {
          try {
            const d = new Date(r && r.timestamp);
            if (isNaN(d.getTime())) return false;
            if (range === "today") return d.toDateString() === now.toDateString();
            return now - d < 7 * 86400000;
          } catch (_) { return false; }
        });
      }

      function historyRecords() {
        return recordsForRange(state.exportRange).filter((r) => {
          if (state.historyTypeFilter !== "all" && r.type !== state.historyTypeFilter) return false;
          if (state.historyLocationFilter !== "all" && r.location !== state.historyLocationFilter) return false;
          return true;
        });
      }

      /* ── Persistence ── */
      function persist() {
        localStorage.setItem(STORAGE_KEYS.records, JSON.stringify(state.records));
        localStorage.setItem(STORAGE_KEYS.sync, JSON.stringify(state.syncHistory));
      }

      /* ── Auto-cleanup: изтрива локални записи по-стари от 7 дни ── */
      function cleanupOldRecords() {
        const cutoff = Date.now() - LOCAL_RETENTION_DAYS * 86400000;
        const before = state.records.length;
        state.records = state.records.filter((r) => new Date(r.timestamp).getTime() > cutoff);
        if (state.records.length < before) {
          persist();
          console.log(`[Cleanup] Изтрити ${before - state.records.length} стари записа (>7 дни)`);
        }
      }

      /* ── Google Sheets Sync ── */
      function isSheetsConfigured() {
        return SHEETS_WEB_APP_URL && SHEETS_WEB_APP_URL !== "???????_????_WEB_APP_URL_???" && SHEETS_WEB_APP_URL.startsWith("https://");
      }

      function buildSheetsPayload(record) {
        const issues = dirtyItems(record);
        const config = getConfig(record.type);
        const status = issues.length ? "\u041c\u0420\u042a\u0421\u041d\u0410" : "\u0427\u0418\u0421\u0422\u0410";
        const typeLabel = config.shortTitle + " - " + record.location;
        const issueLabel = issues.length ? issues.map((item) => item.label).join(", ") : "";
        const notes = record.notes || "";

        return {
          entry_id: String(record.id),
          inspected_at: fmt(record.timestamp),
          inspection_type: typeLabel,
          inspector: record.inspector,
          status,
          issues: issueLabel,
          notes,
          row_values: JSON.stringify([
            record.id,
            fmt(record.timestamp),
            typeLabel,
            record.inspector,
            status,
            issueLabel,
            notes,
          ]),
          record_json: JSON.stringify(record),
        };
      }

      async function sendToSheets(record) {
        if (!isSheetsConfigured()) return { success: false, error: "Sheets URL \u043d\u0435 \u0435 \u043a\u043e\u043d\u0444\u0438\u0433\u0443\u0440\u0438\u0440\u0430\u043d" };
        const payload = JSON.stringify({ record });

        try {
          const response = await fetch(SHEETS_WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=UTF-8" },
            body: payload,
          });
          if (!response.ok) return { success: false, error: "HTTP " + response.status };
          return { success: true, verified: true };
        } catch (err) {
          try {
            await fetch(SHEETS_WEB_APP_URL, {
              method: "POST",
              mode: "no-cors",
              body: payload,
            });
            return { success: true, verified: false };
          } catch (fallbackErr) {
            return { success: false, error: fallbackErr.message || err.message };
          }
        }
      }

      async function syncRecord(record) {
        if (!isSheetsConfigured()) return { success: false, error: "Sheets URL \u043d\u0435 \u0435 \u043a\u043e\u043d\u0444\u0438\u0433\u0443\u0440\u0438\u0440\u0430\u043d" };
        state.syncHistory[record.id] = "syncing";
        persist(); render();
        const result = await sendToSheets(record);
        state.syncHistory[record.id] = result.success ? (result.verified ? "synced" : "sent") : "error";
        persist(); render();
        return result;
      }

      function getQRBaseUrl() {
        const saved = (localStorage.getItem(STORAGE_KEYS.qrBaseUrl) || "").trim();
        if (saved && saved.startsWith("http") && saved.length > 40) return saved.replace(/\/$/, "");
        if (typeof window !== "undefined" && window.location && window.location.href) {
          const href = window.location.href;
          if (href.startsWith("http") && (href.includes("github.io") || href.includes("vercel.app") || href.includes("netlify.app"))) {
            return href.split("?")[0].split("#")[0].replace(/\/$/, "");
          }
        }
        return QR_DEFAULT_URL;
      }

      function startInspection(type, locationOverride) {
        const config = getConfig(type);
        const loc = locationOverride && config.locations.includes(locationOverride) ? locationOverride : config.locations[0];
        Object.assign(state, {
          inspectionType: type,
          location: loc,
          inspector: "",
          itemState: {},
          notes: "",
          showValidation: false,
          screen: "inspection",
        });
        render();
      }

      async function acquireLockFirstFree(type, locations, sessionId) {
        if (!isSheetsConfigured()) return { success: true, location: locations[0] };
        try {
          const res = await fetch(SHEETS_WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=UTF-8" },
            body: JSON.stringify({ action: "acquireLockFirstFree", type, locations, sessionId }),
          });
          if (!res.ok) return { success: true, location: locations[0], offline: true };
          try { return await res.json(); } catch (_) { return { success: true, location: locations[0], offline: true }; }
        } catch (err) {
          console.warn("[Lock] acquireLockFirstFree failed:", err.message);
          return { success: true, location: locations[0], offline: true };
        }
      }

      async function startInspectionWithLock(type, locationOverride) {
        if (_lockBusy) return false;
        _lockBusy = true;
        try {
          /* Ако вече има активен lock, освободи го */
          if (state.currentSessionId) {
            await releaseLock(state.currentSessionId);
            state.currentSessionId = null;
            _lockAcquiredAt = 0;
            sessionStorage.removeItem(LOCK_SESSION_KEY);
          }
          const config = getConfig(type);
          if (locationOverride) {
            const sessionId = generateSessionId();
            const lockResult = await acquireLock(type, locationOverride, sessionId);
            if (!lockResult.success) {
              showLocationLocked(locationOverride, lockResult.error);
              return false;
            }
            state.currentSessionId = sessionId;
            _lockAcquiredAt = Date.now();
            sessionStorage.setItem(LOCK_SESSION_KEY, sessionId);
            startInspection(type, locationOverride);
            return true;
          }
          /* Non-QR: 1 заявка — сървърът намира първата свободна локация */
          const sessionId = generateSessionId();
          const result = await acquireLockFirstFree(type, config.locations, sessionId);
          if (!result.success) {
            if (result.allLocked) {
              showToast("Всички " + config.shortTitle.toLowerCase() + " се проверяват в момента. Опитайте след няколко минути.", "error");
              return false;
            }
            /* Сървърна грешка — пропусни lock, отвори формата */
            console.warn("[Lock] acquireLockFirstFree error:", result.error);
            startInspection(type);
            return true;
          }
          state.currentSessionId = sessionId;
          _lockAcquiredAt = Date.now();
          sessionStorage.setItem(LOCK_SESSION_KEY, sessionId);
          startInspection(type, result.location);
          return true;
        } finally {
          _lockBusy = false;
        }
      }

      let _submitBusy = false;
      async function submitInspection() {
        if (_submitBusy) return;
        if (!state.currentSessionId) {
          showToast("Няма активно заключване. Моля изберете локация отново.", "error");
          return;
        }
        if (isLockExpired()) {
          showToast("Времето за проверка изтече (" + LOCK_TIMEOUT_MIN + " мин). Моля сканирайте QR кода отново.", "error");
          return;
        }
        const config = getConfig(state.inspectionType);
        state.showValidation = true;
        const allFilled = config.items.every((i) => isFilled(state.itemState[i.id]));
        if (!state.inspector.trim()) { showToast("Моля въведи своето пълно име.", "error"); return; }
        if (!/^[\u0400-\u04FF ]+$/.test(state.inspector.trim())) { showToast("Името трябва да е само на кирилица, без специални символи.", "error"); return; }
        if (!allFilled) { showToast("Всички точки трябва да бъдат попълнени.", "error"); render(); return; }
        _submitBusy = true;
        try {
        const record = {
          id: Date.now(),
          type: state.inspectionType,
          location: state.location,
          inspector: state.inspector.trim(),
          timestamp: new Date().toISOString(),
          items: config.items.map((i) => ({ id: i.id, label: i.label, icon: i.icon, status: state.itemState[i.id] })),
          notes: state.notes,
        };
        state.records = [record, ...state.records];
        cleanupOldRecords(); /* Изчистване на стари записи >7 дни */
        persist();
        /* Release location lock */
        if (state.currentSessionId) {
          releaseLock(state.currentSessionId);
          state.currentSessionId = null;
          _lockAcquiredAt = 0;
          sessionStorage.removeItem(LOCK_SESSION_KEY);
        }
        showToast(`Проверката на „${state.location}" е записана.`);
        if (isSheetsConfigured()) {
          const syncResult = await syncRecord(record);
          if (syncResult.success && syncResult.verified) {
            showToast("\u2713 \u0421\u0438\u043d\u0445\u0440\u043e\u043d\u0438\u0437\u0438\u0440\u0430\u043d\u043e \u0441 Google Sheets.");
          } else if (syncResult.success) {
            showToast("\u2713 \u0417\u0430\u044f\u0432\u043a\u0430\u0442\u0430 \u0435 \u0438\u0437\u043f\u0440\u0430\u0442\u0435\u043d\u0430 \u043a\u044a\u043c Google Sheets. \u0410\u043a\u043e \u0440\u0435\u0434\u044a\u0442 \u043d\u0435 \u0441\u0435 \u043f\u043e\u044f\u0432\u0438, \u043f\u0440\u043e\u0432\u0435\u0440\u0438 Apps Script \u043b\u043e\u0433\u043e\u0432\u0435\u0442\u0435.");
          } else {
            showToast("\u26a0 \u0417\u0430\u043f\u0438\u0441\u044c\u0442 \u0435 \u0437\u0430\u043f\u0430\u0437\u0435\u043d \u043b\u043e\u043a\u0430\u043b\u043d\u043e. Sheets sync \u043d\u0435\u0443\u0441\u043f\u0435\u0448\u0435\u043d: " + (syncResult.error || "\u043d\u0435\u0438\u0437\u0432\u0435\u0441\u0442\u043d\u0430 \u0433\u0440\u0435\u0448\u043a\u0430"), "error");
          }
        }
        if (sessionStorage.getItem(QR_MODE_KEY) === "1") {
          setQRCooldown(state.inspectionType, state.location);
          state.openedFromQR = false;
          setTimeout(() => {
            sessionStorage.removeItem(QR_SESSION_KEY);
            sessionStorage.removeItem(QR_MODE_KEY);
            sessionStorage.removeItem(QR_TYPE_KEY);
            sessionStorage.removeItem(QR_LOC_KEY);
            window.location.replace(QR_REDIRECT_URL);
          }, 1200);
          return;
        }
        state.screen = "home";
        render();
        } finally {
          _submitBusy = false;
        }
      }

        });

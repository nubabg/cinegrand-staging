        localStorage.setItem(STORAGE_KEYS.records, JSON.stringify(state.records));
        localStorage.setItem(STORAGE_KEYS.sync, JSON.stringify(state.syncHistory));
      }

      /* ── Auto-cleanup: изтрива локални записи по-стари от 7 дни ── */
      function cleanupOldRecords() {
        const cutoff = Date.now() - LOCAL_RETENTION_DAYS * 86400000;
        const before = state.records.length;
        state.records = state.records.filter((r) => new Date(r.timestamp).getTime() > cutoff);
        if (state.records.length < before) {
          persist();
          console.log(`[Cleanup] Изтрити ${before - state.records.length} стари записа (>7 дни)`);
        }
      }

      function showToast(msg, type = "success") {
        state.toast = { msg, type };
        render();
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { state.toast = null; render(); }, 4000);
      }

      /* ── Google Sheets Sync ── */
      function isSheetsConfigured() {
        return SHEETS_WEB_APP_URL && SHEETS_WEB_APP_URL !== "???????_????_WEB_APP_URL_???" && SHEETS_WEB_APP_URL.startsWith("https://");
      }

      function buildSheetsPayload(record) {
        const issues = dirtyItems(record);
        const config = getConfig(record.type);
        const status = issues.length ? "\u041c\u0420\u042a\u0421\u041d\u0410" : "\u0427\u0418\u0421\u0422\u0410";
        const typeLabel = config.shortTitle + " - " + record.location;
        const issueLabel = issues.length ? issues.map((item) => item.label).join(", ") : "";
        const notes = record.notes || "";

        return {
          entry_id: String(record.id),
          inspected_at: fmt(record.timestamp),
          inspection_type: typeLabel,
          inspector: record.inspector,
          status,
          issues: issueLabel,
          notes,
          row_values: JSON.stringify([
            record.id,
            fmt(record.timestamp),
            typeLabel,
            record.inspector,
            status,
            issueLabel,
            notes,
          ]),
          record_json: JSON.stringify(record),
        };
      }

      async function sendToSheets(record) {
        if (!isSheetsConfigured()) return { success: false, error: "Sheets URL \u043d\u0435 \u0435 \u043a\u043e\u043d\u0444\u0438\u0433\u0443\u0440\u0438\u0440\u0430\u043d" };
        const payload = JSON.stringify({ record, _token: SHEETS_SECRET_TOKEN });

        try {
          const response = await fetch(SHEETS_WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=UTF-8" },
            body: payload,
          });
          if (!response.ok) return { success: false, error: "HTTP " + response.status };
          return { success: true, verified: true };
        } catch (err) {
          try {
            await fetch(SHEETS_WEB_APP_URL, {
              method: "POST",
              mode: "no-cors",
              body: payload,
            });
            return { success: true, verified: false };
          } catch (fallbackErr) {
            return { success: false, error: fallbackErr.message || err.message };
          }
        }
      }

      async function syncRecord(record) {
        if (!isSheetsConfigured()) return { success: false, error: "Sheets URL \u043d\u0435 \u0435 \u043a\u043e\u043d\u0444\u0438\u0433\u0443\u0440\u0438\u0440\u0430\u043d" };
        state.syncHistory[record.id] = "syncing";
        persist(); render();
        const result = await sendToSheets(record);
        state.syncHistory[record.id] = result.success ? (result.verified ? "synced" : "sent") : "error";
        persist(); render();
        return result;
      }

      function getQRBaseUrl() {
        const saved = (localStorage.getItem(STORAGE_KEYS.qrBaseUrl) || "").trim();
        if (saved && saved.startsWith("http") && saved.length > 40) return saved.replace(/\/$/, "");
        if (typeof window !== "undefined" && window.location && window.location.href) {
          const href = window.location.href;
          if (href.startsWith("http") && (href.includes("github.io") || href.includes("vercel.app") || href.includes("netlify.app"))) {
            return href.split("?")[0].split("#")[0].replace(/\/$/, "");
          }
        }
        return QR_DEFAULT_URL;
      }

      function startInspection(type, locationOverride) {
        const config = getConfig(type);
        const loc = locationOverride && config.locations.includes(locationOverride) ? locationOverride : config.locations[0];
        Object.assign(state, {
          inspectionType: type,
          location: loc,
          inspector: "",
          itemState: {},
          notes: "",
          photoFile: null,
          photoPreview: null,
          photoError: "",
          showValidation: false,
          screen: "inspection",
        });
        render();
      }

      function lockAndStart(type, location) {
        state.screen = "locking";
        state.location = location;
        state.inspectionType = type;
        render();
        setTimeout(() => { startInspectionWithLock(type, location); }, 2000);
      }

      async function acquireLockFirstFree(type, locations, sessionId) {
        if (!isSheetsConfigured()) return { success: true, location: locations[0] };
        try {
          const res = await fetch(SHEETS_WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=UTF-8" },
            body: JSON.stringify({ action: "acquireLockFirstFree", type, locations, sessionId, _token: SHEETS_SECRET_TOKEN }),
          });
          if (!res.ok) return { success: true, location: locations[0], offline: true };
          try { return await res.json(); } catch (_) { return { success: true, location: locations[0], offline: true }; }
        } catch (err) {
          console.warn("[Lock] acquireLockFirstFree failed:", err.message);
          return { success: true, location: locations[0], offline: true };
        }
      }

      async function startInspectionWithLock(type, locationOverride) {
        if (_lockBusy) return false;
        _lockBusy = true;
        try {
          /* Ако вече има активен lock, освободи го */
          if (state.currentSessionId) {
            await releaseLock(state.currentSessionId);
            state.currentSessionId = null;
            _lockAcquiredAt = 0;
            sessionStorage.removeItem(LOCK_SESSION_KEY);
          }
          const config = getConfig(type);
          if (locationOverride) {
            const sessionId = generateSessionId();
            const lockResult = await acquireLock(type, locationOverride, sessionId);
            if (!lockResult.success) {
              showLocationLocked(locationOverride, lockResult.error);
              return false;
            }
            state.currentSessionId = sessionId;
            _lockAcquiredAt = Date.now();
            sessionStorage.setItem(LOCK_SESSION_KEY, sessionId);
            startInspection(type, locationOverride);
            return true;
          }
          /* Non-QR: 1 заявка — сървърът намира първата свободна локация */
          const sessionId = generateSessionId();
          const result = await acquireLockFirstFree(type, config.locations, sessionId);
          if (!result.success) {
            if (result.allLocked) {
              showToast("Всички " + config.shortTitle.toLowerCase() + " се проверяват в момента. Опитайте след няколко минути.", "error");
              return false;
            }
            /* Сървърна грешка — пропусни lock, отвори формата */
            console.warn("[Lock] acquireLockFirstFree error:", result.error);
            startInspection(type);
            return true;
          }
          state.currentSessionId = sessionId;
          _lockAcquiredAt = Date.now();
          sessionStorage.setItem(LOCK_SESSION_KEY, sessionId);
          startInspection(type, result.location);
          return true;
        } finally {
          _lockBusy = false;
        }
      }

      /* ── Photo Upload Utilities ── */
      function handlePhotoSelect(e) {
        const file = e.target.files[0];
        state.photoFile = null;
        state.photoPreview = null;
        state.photoError = "";
        state.notes = "";

        if (!file) {
          render();
          return;
        }

        // Validate file type
        const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
        if (!validTypes.includes(file.type)) {
          state.photoError = "Невалидна снимка. Приемат се само JPEG, PNG, WebP";
          render();
          return;
        }

        // Validate file size (max 10MB)
        const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB
        if (file.size > MAX_FILE_SIZE) {
          state.photoError = "Снимката трябва да бъде под 10MB";
          render();
          return;
        }

        // Create preview
        const reader = new FileReader();
        reader.onload = (event) => {
          state.photoFile = file;
          state.photoPreview = event.target.result;
          state.photoError = "";
          render();
        };
        reader.onerror = () => {
          state.photoError = "Грешка при четене на файла";
          render();
        };
        reader.readAsDataURL(file);
      }

      async function uploadPhotoToGoogleDrive() {
        if (!state.photoFile) return null;
        if (state.notes.length < 20) {
          showToast("Коментарът трябва да съдържа поне 20 символа", "error");
          return null;
        }

        try {
          const reader = new FileReader();
          return new Promise((resolve) => {
            reader.onload = async (event) => {
              const base64Data = event.target.result.split(',')[1];
              const timestamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, -4);

              try {
                const payload = JSON.stringify({
                  action: "uploadPhoto",
                  photoData: base64Data,
                  fileName: `photo_${timestamp}_${state.location.replace(/\s+/g, "_")}.jpg`,
                  comment: state.notes,
                  location: state.location,
                  inspector: state.inspector,
                  timestamp: new Date().toISOString(),
                  _token: SHEETS_SECRET_TOKEN,
                });

                const response = await fetch(SHEETS_WEB_APP_URL, {
                  method: "POST",
                  headers: { "Content-Type": "text/plain;charset=UTF-8" },
                  body: payload,
                });

                if (!response.ok) {
                  showToast("Грешка при качване на снимка (HTTP " + response.status + ")", "error");
                  resolve(null);
                  return;
                }

                const result = await response.json();
                if (result.success && result.photoUrl) {
                  resolve(result.photoUrl);
                } else {
                  showToast("Грешка при качване на снимка: " + (result.error || "неизвестна грешка"), "error");
                  resolve(null);
                }
              } catch (err) {
                showToast("Грешка при качване на снимка: " + err.message, "error");
                resolve(null);
              }
            };
            reader.readAsDataURL(state.photoFile);
          });
        } catch (err) {
          showToast("Грешка при подготовка на снимка: " + err.message, "error");
          return null;
        }
      }

      let _submitBusy = false;
      async function submitInspection() {
        if (_submitBusy) return;
        if (!state.currentSessionId) {
          showToast("Няма активно заключване. Моля изберете локация отново.", "error");
          return;
        }
        if (isLockExpired()) {
          showToast("Времето за проверка изтече (" + LOCK_TIMEOUT_MIN + " мин). Моля сканирайте QR кода отново.", "error");
          return;
        }

        // Validate photo comment if photo is selected
        if (state.photoFile && state.notes.length < 20) {
          showToast("Коментарът трябва да съдържа поне 20 символа", "error");
          render();
          return;
        }

        const config = getConfig(state.inspectionType);
        state.showValidation = true;
        const allFilled = config.items.every((i) => isFilled(state.itemState[i.id]));
        if (!state.inspector.trim()) { showToast("Моля въведи своето пълно име.", "error"); return; }
        if (!/^[\u0400-\u04FF ]+$/.test(state.inspector.trim())) { showToast("Името трябва да е само на кирилица, без специални символи.", "error"); return; }
        if (!allFilled) { showToast("Всички точки трябва да бъдат попълнени.", "error"); render(); return; }
        _submitBusy = true;
        try {
          // Upload photo if present
          let photoUrl = null;
          if (state.photoFile) {
            showToast("Качване на снимка...");
            photoUrl = await uploadPhotoToGoogleDrive();
            if (!photoUrl) {
              // Photo upload failed, but don't block the inspection submission
              showToast("Забележка: Снимката не е качена, но проверката ще бъде записана.", "error");
            }
          }

          const record = {
            id: Date.now(),
            type: state.inspectionType,
            location: state.location,
            inspector: state.inspector.trim(),
            timestamp: new Date().toISOString(),
            items: config.items.map((i) => ({ id: i.id, label: i.label, icon: i.icon, status: state.itemState[i.id] })),
            notes: state.notes,
            photoUrl: photoUrl || null,
          };
          state.records = [record, ...state.records];
          cleanupOldRecords(); /* Изчистване на стари записи >7 дни */
          persist();
          /* Release location lock */
          if (state.currentSessionId) {
            releaseLock(state.currentSessionId);
            state.currentSessionId = null;
            _lockAcquiredAt = 0;
            sessionStorage.removeItem(LOCK_SESSION_KEY);
          }
          showToast(`Проверката на „${state.location}" е записана.`);
          if (isSheetsConfigured()) {
            const syncResult = await syncRecord(record);
            if (syncResult.success && syncResult.verified) {
              showToast("\u2713 \u0421\u0438\u043d\u0445\u0440\u043e\u043d\u0438\u0437\u0438\u0440\u0430\u043d\u043e \u0441 Google Sheets.");
            } else if (syncResult.success) {
              showToast("\u2713 \u0417\u0430\u044f\u0432\u043a\u0430\u0442\u0430 \u0435 \u0438\u0437\u043f\u0440\u0430\u0442\u0435\u043d\u0430 \u043a\u044a\u043c Google Sheets. \u0410\u043a\u043e \u0440\u0435\u0434\u044a\u0442 \u043d\u0435 \u0441\u0435 \u043f\u043e\u044f\u0432\u0438, \u043f\u0440\u043e\u0432\u0435\u0440\u0438 Apps Script \u043b\u043e\u0433\u043e\u0432\u0435\u0442\u0435.");
            } else {
              showToast("\u26a0 \u0417\u0430\u043f\u0438\u0441\u044c\u0442 \u0435 \u0437\u0430\u043f\u0430\u0437\u0435\u043d \u043b\u043e\u043a\u0430\u043b\u043d\u043e. Sheets sync \u043d\u0435\u0443\u0441\u043f\u0435\u0448\u0435\u043d: " + (syncResult.error || "\u043d\u0435\u0438\u0437\u0432\u0435\u0441\u0442\u043d\u0430 \u0433\u0440\u0435\u0448\u043a\u0430"), "error");
            }
          }
          if (sessionStorage.getItem(QR_MODE_KEY) === "1") {
            setQRCooldown(state.inspectionType, state.location);
            state.openedFromQR = false;
            setTimeout(() => {
              sessionStorage.removeItem(QR_SESSION_KEY);
              sessionStorage.removeItem(QR_MODE_KEY);
              sessionStorage.removeItem(QR_TYPE_KEY);
              sessionStorage.removeItem(QR_LOC_KEY);
              window.location.replace(QR_REDIRECT_URL);
            }, 1200);
            return;
          }
          // Clear photo state
          state.photoFile = null;
          state.photoPreview = null;
          state.photoError = "";
          state.screen = "home";
          render();
        } finally {
          _submitBusy = false;
        }
      }

            status: issues.length ? "Проблем" : "Чисто",
            issues: issues.length ? issues.map((i) => i.label).join(", ") : "—",
            notes: r.notes || "", sheets: state.syncHistory[r.id] || "—",
          };
        });
      }

      function parseCSV(text) {
        const lines = (text || '').trim().split(/\r?\n/).filter(line => line.trim());
        if (lines.length === 0) return [];
        const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
        return lines.slice(1).filter(l => l && l.trim()).map(line => {
          const cols = [];
          let cur = '', inQ = false;
          for (const ch of line) {
            if (ch === '"') { inQ = !inQ; }
            else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
            else { cur += ch; }
          }
          cols.push(cur);
          return Object.fromEntries(headers.map((h, i) => [h, (cols[i] || '').trim().replace(/^"|"$/g, '')]));
        });
      }

      /* Намира колона по частично/case-insensitive съвпадение */
      function colVal(row, ...candidates) {
        if (!row || typeof row !== 'object') return '';
        const keys = Object.keys(row);
        for (const cand of candidates) {
          const match = keys.find(k => k.toUpperCase().includes(cand.toUpperCase()));
          if (match && row[match] !== undefined) return row[match] || '';
        }
        return '';
      }

      async function fetchSheetsData() {
        const url = SHEETS_WEB_APP_URL + '?action=getInfo&_token=' + encodeURIComponent(SHEETS_SECRET_TOKEN) + '&_cb=' + Date.now();
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        if (!json.success) throw new Error(json.error || 'Error');
        const data = json.data; // 2D array: row 0 = headers, rest = data
        if (!data || data.length < 2) return [];
        const headers = data[0].map(h => String(h || '').trim());
        return data.slice(1).map(row => {
          const obj = {};
          headers.forEach((h, i) => { obj[h] = String(row[i] != null ? row[i] : ''); });
          return obj;
        }).filter(r => Object.values(r).some(v => v !== ''));
      }

      /* Парсва дата от различни формати (включително bg-BG: "21.03.2026, 14:35") */
      function parseChartDate(str) {
        if (!str) return null;
        // dd.mm.yyyy[,] HH:MM[:SS]  — формат от bg-BG locale (запетая или интервал след датата)
        let m = str.match(/(\d{1,2})[.\/](\d{1,2})[.\/](\d{4})(?:[,\s]+(\d{1,2}):(\d{2})(?::(\d{2}))?)?/);
        if (m) return new Date(+m[3], +m[2]-1, +m[1], +(m[4]||0), +(m[5]||0), +(m[6]||0));
        // yyyy-mm-dd[T ]HH:MM[:SS]
        m = str.match(/(\d{4})-(\d{1,2})-(\d{1,2})(?:[T\s](\d{1,2}):(\d{2})(?::(\d{2}))?)?/);
        if (m) return new Date(+m[1], +m[2]-1, +m[3], +(m[4]||0), +(m[5]||0), +(m[6]||0));
        const d = new Date(str);
        return isNaN(d) ? null : d;
      }
      function fmtChartDate(d) {
        return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0');
      }

      /* Converts yyyy-mm-dd (from date input) → dd.mm (byDay key) */
      function isoToFmtChartDate(iso) {
        const [, m, d] = iso.split('-');
        return d + '.' + m;
      }
      /* Converts dd.mm key + year → Date object */
      function fmtKeyToDate(key, year) {
        const [d, m] = key.split('.');
        return new Date(year || new Date().getFullYear(), +m - 1, +d);
      }

      /* Re-renders only the day-chart bars without rebuilding the whole dashboard */
      function cgRenderDayChart(keys) {
        const bars = document.getElementById('day-chart-bars');
        const sub  = document.getElementById('day-chart-subtitle');
        if (!bars || !window._cgByDay) return;
        const byDay = window._cgByDay;
        if (!keys || !keys.length) keys = (window._cgAllDayKeys || []).slice(-7);
        const maxDay = Math.max(1, ...keys.map(k => byDay[k] || 0));
        bars.innerHTML = keys.map(k => {
          const v = byDay[k] || 0;
          const barH = v ? Math.max(8, Math.round(150 * v / maxDay)) : 8;
          const dimmed = v === 0 ? 'opacity:.35;' : '';
          return `<div class="charts-vertical-col" title="${k}: ${v} проверки">
            <div class="daily-bar-track"><div class="daily-bar-fill" style="height:${barH}px;${dimmed}"></div></div>
            <span style="font-size:11px;color:var(--muted);">${k}</span>
            <span style="font-weight:600;font-size:13px;${v===0?'color:var(--muted);':''}">${v}</span>
          </div>`;
        }).join('');
        if (sub) {
          if (keys.length === 1) sub.textContent = `Дневна активност · ${keys[0]}`;
          else sub.textContent = `Дневна активност · ${keys[0]} – ${keys[keys.length-1]} (${keys.length} дни)`;
        }
      }

      /* ── Mini calendar state & renderer ── */
      const _cal = {
        year: new Date().getFullYear(),
        month: new Date().getMonth(),   // 0-based
        rangeStart: null,  // Date | null
        rangeEnd:   null,  // Date | null
        step: 0            // 0 = picking start, 1 = picking end
      };

      function _calOpen() {
        const popup = document.getElementById('day-cal-popup');
        if (!popup) return;
        // Default to current year/month if no selection yet
        if (!_cal.rangeStart) {
          _cal.year  = new Date().getFullYear();
          _cal.month = new Date().getMonth();
        } else {
          _cal.year  = _cal.rangeStart.getFullYear();
          _cal.month = _cal.rangeStart.getMonth();
        }
        _cal.step = 0;
        _calRender();
        popup.classList.add('open');
        // Close on outside click
        setTimeout(() => {
          document.addEventListener('click', _calOutside, { once: false });
        }, 0);
      }

      function _calClose() {
        const popup = document.getElementById('day-cal-popup');
        if (popup) popup.classList.remove('open');
        document.removeEventListener('click', _calOutside);
      }

      function _calOutside(e) {
        const wrap = document.getElementById('day-cal-wrap');
        if (wrap && !wrap.contains(e.target)) _calClose();
      }

      function _calRender() {
        const popup = document.getElementById('day-cal-popup');
        if (!popup) return;
        const byDay = window._cgByDay || {};
        const MONTHS_BG = ['Яну','Фев','Мар','Апр','Май','Юни','Юли','Авг','Сеп','Окт','Ное','Дек'];
        const WDAYS = ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];
        const today = new Date(); today.setHours(0,0,0,0);
        const y = _cal.year, mo = _cal.month;
        const firstDay = new Date(y, mo, 1);
        const lastDay  = new Date(y, mo + 1, 0);
        // Monday-first offset
        let startOffset = firstDay.getDay() - 1; if (startOffset < 0) startOffset = 6;

        let cells = '';
        // Empty cells before 1st
        for (let i = 0; i < startOffset; i++) cells += `<div class="day-cal-cell empty"></div>`;
        for (let d = 1; d <= lastDay.getDate(); d++) {
          const date = new Date(y, mo, d);
          date.setHours(0,0,0,0);
          const key = fmtChartDate(date);
          const hasData = !!byDay[key];
          const isToday = date.getTime() === today.getTime();
          const isFuture = date > today;
          // Range highlighting
          const rs = _cal.rangeStart, re = _cal.rangeEnd;
          const isStart  = rs && date.getTime() === rs.getTime();
          const isEnd    = re && date.getTime() === re.getTime();
          const inRange  = rs && re && date > rs && date < re;
          let cls = 'day-cal-cell';
          if (isStart) cls += ' range-start';
          if (isEnd)   cls += ' range-end';
          if (inRange) cls += ' in-range';
          if (isToday) cls += ' today';
          if (isFuture) cls += ' disabled';
          if (hasData) cls += ' has-data';
          const dStr = `${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const clickAttr = isFuture ? '' : `data-action="day-cal-pick" data-date="${dStr}"`;
          cells += `<div class="${cls}" ${clickAttr}>${d}</div>`;
        }

        // Range label for trigger button
        let rangeLabel = '📅 Избери дати';
        if (_cal.rangeStart && _cal.rangeEnd) {
          rangeLabel = `${fmtChartDate(_cal.rangeStart)} – ${fmtChartDate(_cal.rangeEnd)}`;
        } else if (_cal.rangeStart) {
          rangeLabel = fmtChartDate(_cal.rangeStart);
        }
        const trigger = document.getElementById('day-cal-trigger');
        if (trigger) {
          trigger.textContent = rangeLabel;
          trigger.classList.toggle('has-range', !!(_cal.rangeStart));
        }

        // Range size warning
        let rangeSize = 0;
        if (_cal.rangeStart && _cal.rangeEnd) {
          rangeSize = Math.round((_cal.rangeEnd - _cal.rangeStart) / 86400000) + 1;
        }
        const maxNote = rangeSize > 7 ? `<div class="day-cal-max-note">⚠ Максимум 7 дни — показани първите 7</div>` : '';

        popup.innerHTML = `
          <div class="day-cal-header">
            <button class="day-cal-nav" data-action="day-cal-prev">&#8249;</button>
            <span class="day-cal-title">${MONTHS_BG[mo]} ${y}</span>
            <button class="day-cal-nav" data-action="day-cal-next">&#8250;</button>
          </div>
          <div class="day-cal-grid">
            ${WDAYS.map(w => `<div class="day-cal-wday">${w}</div>`).join('')}
            ${cells}
          </div>
          ${maxNote}
          <div style="font-size:10px;color:var(--muted);margin-top:6px;text-align:center;">
            ${_cal.step === 0 ? 'Избери начална дата' : 'Избери крайна дата (макс. 7 дни)'}
          </div>
          <div class="day-cal-actions">
            <button class="day-cal-clear" data-action="day-cal-clear">Изчисти</button>
            <button class="day-cal-apply" data-action="day-cal-apply">Приложи</button>
          </div>`;
      }


      let _chartsLoading = false;
      let _cachedChartRows = null;
      let _chartsFetchVersion = 0;

      async function refreshChartsData() {
        const btn = document.getElementById('charts-refresh-btn');
        if (btn) { btn.disabled = true; btn.textContent = 'Зарежда…'; }
        _cachedChartRows = null;
        _chartsLoading = false;
        await initChartsScreen(false);
        if (btn) { btn.disabled = false; btn.textContent = '⟳ Обнови'; }
      }

      async function initChartsScreen(skipFetch) {
        if (_chartsLoading && !skipFetch) return;
        const container = document.getElementById('charts-container');
        if (!container) return;

        /* При навигация (бутон Данни): само показвай кеш, НИКОГА не fetch-вай. Данните се обновяват само при F5. */
        if (skipFetch) {
          if (_cachedChartRows && _cachedChartRows.length > 0) {
            buildChartsFromData(container, _cachedChartRows);
          } else {
            container.innerHTML = `<div class="panel" style="text-align:center;padding:60px 20px;color:var(--muted);">
              <div style="font-size:28px;margin-bottom:12px;">&#128202;</div>
              <div style="font-weight:600;margin-bottom:8px;">Презареди страницата (F5)</div>
              <div style="font-size:13px;">за да заредиш данните от Google Sheets.</div>
            </div>`;
          }
          return;
        }

        /* Ако има кеширани данни — рисувай директно (само при page load) */
        if (_cachedChartRows) {
          buildChartsFromData(container, _cachedChartRows);
          return;
        }

        _chartsLoading = true;
        const thisVersion = ++_chartsFetchVersion;
        console.log('[Charts] Fetching data (v' + thisVersion + ')…');

        /* Don't destroy charts during loading — keep them visible */
        if (!_cachedChartRows) {
          container.innerHTML = '<div class="charts-loading"><div class="cg-bounce-dots" style="margin-right:4px;"><span></span><span></span><span></span></div><span>Зарежда от Sheets…</span></div>';
        }

        let rows;
        try {
          rows = await fetchSheetsData();
          console.log('[Charts] Fetched', rows ? rows.length : 0, 'raw rows (v' + thisVersion + ')');
        } catch(e) {
          console.warn('[Charts] Fetch failed (v' + thisVersion + '):', e.message);
          _chartsLoading = false;
          if (thisVersion !== _chartsFetchVersion) return;
          if (_cachedChartRows) return; /* Keep showing cached data */
          const c2 = document.getElementById('charts-container');
          if (c2) c2.innerHTML = `
            <div class="panel" style="text-align:center;padding:60px 20px;">
              <div style="font-size:32px;margin-bottom:16px;">&#9888;</div>
              <div style="color:var(--red);font-weight:700;margin-bottom:8px;">Грешка при зареждане</div>
              <div style="color:var(--muted);font-size:13px;">${escapeHtml(e.message)}</div>
            </div>`;
          return;
        }

        _chartsLoading = false;
        if (thisVersion !== _chartsFetchVersion) return;

        if (!rows || rows.length === 0) {
          if (_cachedChartRows) return; /* Keep showing cached data */
          const c2 = document.getElementById('charts-container');
          if (c2) c2.innerHTML = `<div class="panel" style="text-align:center;padding:60px 20px;color:var(--muted);">Няма данни в таблицата.</div>`;
          return;
        }

        _cachedChartRows = rows;
        const c2 = document.getElementById('charts-container');
        if (c2 && state.screen === "charts") buildChartsFromData(c2, rows);
      }

      function buildChartsFromData(container, rows) {

        /* ── Normalize rows ── */
        let skipped = 0;
        const normalized = [];
        rows.forEach(r => {
          try {
            if (!r || typeof r !== 'object') { skipped++; return; }
            const id = colVal(r, '№', 'ID', 'НОМЕР', 'ЗАПИС', 'A') || '';
            const insp = (colVal(r, 'ПРОВЕРЯВАЩ', 'INSPECTOR', 'EMPLOYEE', 'СЛУЖИТЕЛ', 'ИМЕ') || '').trim();
            const rawLoc = (colVal(r, 'ТИП', 'TYPE', 'ЛОКАЦИЯ', 'LOCATION', 'ЗАЛА') || '').trim();
            const stat = (colVal(r, 'СТАТУС', 'STATUS', 'РЕЗУЛТАТ') || '').trim();
            const dateStr = (colVal(r, 'ДАТА', 'DATE', 'TIMESTAMP', 'INSPECTED', 'ПРОВЕРКА') || '').trim();
            const issues = (colVal(r, 'ПРОБЛЕМИ', 'ISSUES') || '').trim();
            if (!insp && !rawLoc && !stat) { skipped++; return; }
            const loc = rawLoc.replace('Кинозала - ', 'Зала ').replace('Тоалетна - ', 'Тоал. ');
            const statUp = stat.toUpperCase();
            const status = statUp.includes('ЧИСТ') ? 'ЧИСТА'
              : (statUp.includes('МРЪСН') || statUp.includes('ПРОБЛЕМ')) ? 'МРЪСНА' : '';
            const date = parseChartDate(dateStr);
            normalized.push({ id, inspector: insp || '?', location: loc || '?', status, date,
              dateKey: date ? fmtChartDate(date) : null,
              hour: date ? date.getHours() : null,
              issues: issues && issues !== '—' && issues !== '-' ? issues : '' });
          } catch (_) { skipped++; }
        });
        console.log('[Charts] Normalized:', normalized.length, 'rows, skipped:', skipped);

        /* ── Derive aggregations from normalized data ── */
        const byInspector = {}, byIssue = {}, byLocation = {}, byDay = {}, byHour = {};
        const byStatus = { 'ЧИСТА': 0, 'МРЪСНА': 0 };
        const locationSet = new Set();

        normalized.forEach(r => {
          locationSet.add(r.location);
          byInspector[r.inspector] = (byInspector[r.inspector] || 0) + 1;
          byLocation[r.location]   = (byLocation[r.location]   || 0) + 1;
          if (r.status === 'ЧИСТА') byStatus['ЧИСТА']++;
          else if (r.status === 'МРЪСНА') byStatus['МРЪСНА']++;
          if (r.dateKey) byDay[r.dateKey] = (byDay[r.dateKey] || 0) + 1;
          if (r.hour !== null) {
            const hKey = String(r.hour).padStart(2,'0') + ':00';
            byHour[hKey] = (byHour[hKey] || 0) + 1;
          }
          if (r.issues) {
            r.issues.split(/[,;]+/).forEach(iss => {
              const k = iss.trim();
              if (k) byIssue[k] = (byIssue[k] || 0) + 1;
            });
          }
        });

        const total = normalized.length;
        const cleanCount   = byStatus['ЧИСТА'] || 0;
        const problemCount = byStatus['МРЪСНА'] || 0;
        const cleanPct   = total ? Math.round(cleanCount / total * 100) : 0;
        const problemPct = total ? Math.round(problemCount / total * 100) : 0;

        /* Дневен тренд (последни 30 дни) */
        const dayKeys = Object.keys(byDay).sort((a,b) => {
          const [da,ma] = a.split('.'); const [db,mb] = b.split('.');
          return (ma+da).localeCompare(mb+db);
        }).slice(-30);

        /* Store globally for filter re-renders */
        window._cgByDay = byDay;
        window._cgAllDayKeys = dayKeys;

        /* Часово разпределение — само последните 24 часа */
        const now24h = new Date();
        const cutoff24h = new Date(now24h.getTime() - 24 * 60 * 60 * 1000);
        const byHour24 = {};
        normalized.forEach(r => {
          if (r.date && r.date >= cutoff24h && r.hour !== null) {
            const hKey = String(r.hour).padStart(2,'0') + ':00';
            byHour24[hKey] = (byHour24[hKey] || 0) + 1;
          }
        });
        const hourLabels = [], hourData = [];
        for (let h = 0; h < 24; h++) {
          const hk = String(h).padStart(2,'0') + ':00';
          hourLabels.push(hk);
          hourData.push(byHour24[hk] || 0);
        }

        const inspEntries = Object.entries(byInspector).sort((a,b) => b[1]-a[1]);
        const issEntries  = Object.entries(byIssue).sort((a,b) => b[1]-a[1]).slice(0,10);
        const locEntries  = Object.entries(byLocation).sort((a,b) => b[1]-a[1]);

        const maxDay  = Math.max(1, ...dayKeys.map(k => byDay[k] || 0));
        const maxInsp = Math.max(1, inspEntries[0]?.[1] || 1);
        const maxLoc  = Math.max(1, ...locEntries.map(([,v]) => v));
        const maxHour = Math.max(1, ...hourData);
        const maxIss  = Math.max(1, issEntries[0]?.[1] || 1);
        const lastDay = dayKeys.length ? dayKeys[dayKeys.length - 1] : '—';
        const lastDayCount = lastDay !== '—' ? (byDay[lastDay] || 0) : 0;
        const totalIssues = issEntries.reduce((s, [,v]) => s + v, 0);
        const hallLocs = locEntries.filter(([l]) => l.startsWith('Зала'));
        const toiletLocs = locEntries.filter(([l]) => l.startsWith('Тоал'));
        const getInitials = (n) => (n || '').split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2) || '?';

        /* ── Dashboard с визуално разнообразие: KPI, Donut, Leaderboard, Issue, Zone, Heatmap ── */
        container.innerHTML = `
          <!-- Ред 1: KPI cards -->
          <div class="kpi-row" style="margin-bottom:16px;">
            <div class="kpi-card"><div class="kpi-value" style="color:var(--gold);">${total}</div><div class="kpi-label">Общо проверки</div><div class="kpi-badge" style="background:rgba(200,120,24,.15);color:var(--gold);">активност</div></div>
            <div class="kpi-card"><div class="kpi-value" style="color:var(--green);">${cleanPct}%</div><div class="kpi-label">Чисто</div><div class="kpi-badge" style="background:rgba(45,204,112,.15);color:var(--green);">${cleanCount} проверки</div></div>
            <div class="kpi-card"><div class="kpi-value" style="color:var(--red);">${problemCount}</div><div class="kpi-label">Проблеми</div><div class="kpi-badge" style="background:rgba(239,91,91,.15);color:var(--red);">${totalIssues} общо</div></div>
            <div class="kpi-card"><div class="kpi-value" style="color:var(--blue);">${inspEntries.length}</div><div class="kpi-label">Служители</div><div class="kpi-badge" style="background:rgba(98,169,255,.15);color:var(--blue);">активни</div></div>
            <div class="kpi-card"><div class="kpi-value" style="color:#a78bfa;">${lastDay}</div><div class="kpi-label">Последна активност</div><div class="kpi-badge" style="background:rgba(167,139,250,.15);color:#a78bfa;">${lastDayCount} проверки</div></div>
          </div>

          <!-- Ред 2: Donut + Daily activity -->
          <div class="charts-grid">
            <div class="chart-card card-donut">
              <div class="chart-title">Чисто vs Проблем</div>
              <div class="chart-subtitle">Обща оценка на всички проверки</div>
              <div class="chart-wrap" style="min-height:240px;">
                <div class="charts-donut-wrap">
                  <div class="charts-donut" style="background:conic-gradient(var(--green) 0% ${cleanPct}%, var(--red) ${cleanPct}% 100%);">
                    <div class="charts-donut-center" style="background:var(--panel-2);"><span style="font-size:32px;font-weight:700;color:var(--green);">${cleanPct}%</span><span style="font-size:10px;color:var(--muted);">ЧИСТО</span></div>
                  </div>
                  <div style="display:flex;flex-direction:column;gap:10px;">
                    <div style="display:flex;align-items:center;gap:8px;"><span style="width:12px;height:12px;border-radius:50%;background:var(--green);"></span><span>Чисто: ${cleanCount}</span></div>
                    <div style="display:flex;align-items:center;gap:8px;"><span style="width:12px;height:12px;border-radius:50%;background:var(--red);"></span><span>Проблем: ${problemCount}</span></div>
                  </div>
                </div>
                <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06);">${total} проверки общо · ${cleanCount} чисто / ${problemCount} проблем</div>
              </div>
            </div>
            <div class="chart-card card-time">
              <div class="chart-title">Проверки по дни</div>
              <div class="chart-subtitle" id="day-chart-subtitle">Дневна активност · последните 7 дни</div>
              <div class="chart-wrap" style="min-height:220px;">
                <!-- Filter bar -->
                <div class="day-filter-bar">
                  <button class="day-filter-btn" data-action="day-filter-today">Днес</button>
                  <button class="day-filter-btn active" data-action="day-filter-7d">7 дни</button>
                </div>
                <div class="charts-vertical-wrap" id="day-chart-bars"></div>
              </div>
            </div>
          </div>

          <!-- Ред 3: Leaderboard + Issue analysis -->
          <div class="charts-grid">
            <div class="chart-card">
              <div class="chart-title">Проверки по служител</div>
              <div class="chart-subtitle">Ранкинг по брой проверки</div>
              <div class="chart-wrap" style="min-height:240px;">
                <div>${inspEntries.map(([name, count], i) => {
                  const pct = Math.round(count/maxInsp*100);
                  const rankCls = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : 'other';
                  const colors = ['#c87818','#62a9ff','#2dcc70','#a78bfa','#38bdf8'];
                  const col = colors[i % colors.length];
                  return `<div class="leaderboard-item"><span class="leaderboard-rank ${rankCls}">${i+1}</span><span class="leaderboard-avatar">${getInitials(name)}</span><span style="flex:1;font-weight:600;">${escapeHtml(name)}</span><div class="leaderboard-bar"><div class="leaderboard-bar-fill" style="width:${pct}%;background:${col};"></div></div><span style="font-weight:700;min-width:28px;">${count}</span></div>`;
                }).join('')}</div>
              </div>
            </div>
            <div class="chart-card card-issues">
              <div class="chart-title">Топ проблеми</div>
              <div class="chart-subtitle">Най-често срещани нередности</div>
              <div class="chart-wrap" style="min-height:240px;">
                ${issEntries.length ? issEntries.map(([name, count], i) => {
                  const pctOfTotal = totalIssues ? Math.round(count/totalIssues*100) : 0;
                  const severity = count >= maxIss * 0.7 ? 'high' : count >= maxIss * 0.3 ? 'med' : 'low';
                  const barPct = Math.round(count/maxIss*100);
                  return `<div class="issue-item" title="${escapeHtml(name)}: ${count} пъти (${pctOfTotal}% от всички проблеми)"><span class="issue-severity ${severity}"></span><span style="flex:1;">${escapeHtml(name)}</span><span class="issue-pct">${pctOfTotal}%</span><span class="issue-count">${count}</span><div class="charts-bar-bg" style="width:80px;height:6px;"><div class="charts-bar-fill charts-bar-fill--red" style="width:${barPct}%;"></div></div></div>`;
                }).join('') : '<div class="chart-empty">Няма регистрирани проблеми</div>'}
              </div>
            </div>
          </div>

          <!-- Ред 4: Zone distribution + Hourly heatmap -->
          <div class="charts-grid">
            <div class="chart-card">
              <div class="chart-title">Проверки по локация</div>
              <div class="chart-subtitle">Разпределение по зали и тоалетни</div>
              <div class="chart-wrap" style="min-height:240px;">
                ${hallLocs.length ? `<div class="zone-group"><div class="zone-group-title">🎬 Кинозали</div>${hallLocs.map(([loc, count]) => { const pct = maxLoc ? Math.round(count/maxLoc*100) : 0; return `<div class="zone-item"><span style="min-width:100px;">${escapeHtml(loc)}</span><div class="charts-bar-bg"><div class="charts-bar-fill charts-bar-fill--blue" style="width:${pct}%;"></div></div><span style="font-weight:600;">${count}</span></div>`; }).join('')}</div>` : ''}
                ${toiletLocs.length ? `<div class="zone-group"><div class="zone-group-title">🚿 Тоалетни</div>${toiletLocs.map(([loc, count]) => { const pct = maxLoc ? Math.round(count/maxLoc*100) : 0; return `<div class="zone-item"><span style="min-width:100px;">${escapeHtml(loc)}</span><div class="charts-bar-bg"><div class="charts-bar-fill" style="width:${pct}%;background:#38bdf8;"></div></div><span style="font-weight:600;">${count}</span></div>`; }).join('')}</div>` : ''}
                ${!hallLocs.length && !toiletLocs.length ? '<div class="chart-empty">Няма данни по локации</div>' : ''}
              </div>
            </div>
            <div class="chart-card card-time">
              <div class="chart-title">Активност по часове</div>
              <div class="chart-subtitle">Последните 24 часа по часови диапазон (0–23 ч)</div>
              <div class="chart-wrap" style="min-height:240px;">
                <div class="hourly-histogram">${hourLabels.map((label, i) => {
                  const v = hourData[i] || 0;
                  const barH = maxHour ? Math.max(4, Math.round(160 * v / maxHour)) : 0;
                  const peak = v > 0 && v === maxHour;

                }).join('')}</div>

      let _modalTrapHandler = null;
      function setupModalFocusTrap() {
        if (_modalTrapHandler) document.removeEventListener("keydown", _modalTrapHandler);
        const modal = document.getElementById("modal-delete");
        if (!modal) return;
        const focusable = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
        const first = focusable[0];
        const last = focusable[focusable.length - 1];
        const prevActive = document.activeElement;
        if (first) first.focus();
        _modalTrapHandler = function(e) {
          if (e.key === "Escape") {
            state.showDeleteModal = false; state.deleteErr = ""; state.deletePass = ""; render();
            document.removeEventListener("keydown", _modalTrapHandler);
            _modalTrapHandler = null;
            if (prevActive && prevActive.focus) prevActive.focus();
            return;
          }
          if (e.key !== "Tab") return;
          if (e.shiftKey) {
            if (document.activeElement === first) { e.preventDefault(); if (last) last.focus(); }
          } else {
            if (document.activeElement === last) { e.preventDefault(); if (first) first.focus(); }
          }
        };
        document.addEventListener("keydown", _modalTrapHandler);
      }

      /* Parse "DD.MM.YYYY" (or "DD.MM.YYYY - Den") → Date (midnight local) */
      function crParseDate(str) {
        if (!str) return null;
        const m = str.match(/(\d{2})\.(\d{2})\.(\d{4})/);
        if (!m) return null;
        return new Date(parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]));
      }

      /* Format Date → "DD.MM.YYYY" */
      function crFmtDate(d) {
        if (!d) return "";
        const pad = (n) => String(n).padStart(2, "0");
        return pad(d.getDate()) + "." + pad(d.getMonth() + 1) + "." + d.getFullYear();
      }

      /* Today at midnight local */
      function crToday() {
        const t = new Date();
        t.setHours(0, 0, 0, 0);
        return t;
      }

      /* Fetch all rows from "Почистване съблекални" sheet via gviz */
      async function fetchChangingRoomData() {
        state.crLoading = true;
        state.crError = null;
        state.crData = null;
        render();
        try {
          const url = SHEETS_WEB_APP_URL + '?action=getChangingRooms&_token=' + encodeURIComponent(SHEETS_SECRET_TOKEN) + '&_cb=' + Date.now();
          const resp = await fetch(url, { cache: "no-store" });
          if (!resp.ok) throw new Error("HTTP " + resp.status);
          const json = await resp.json();
          if (!json.success) throw new Error(json.error || "Error");
          /* 2D array: row 0 = header, rest = data rows */
          const rows = json.data || [];

          const today = crToday();
          const futureRows = [];
          let found = null;

          for (let i = 0; i < rows.length; i++) {
            const cells  = rows[i];
            const dateStr = String(cells[0] != null ? cells[0] : "");
            const d = crParseDate(dateStr);
            if (!d) continue;
            if (d >= today) {
              const row = {
                dateStr:     dateStr,
                date:        d,
                sheetRow:    i + 1,
                maleEntry:   String(cells[1] != null ? cells[1] : "").trim(),
                femaleEntry: String(cells[2] != null ? cells[2] : "").trim(),
              };
              futureRows.push(row);
              if (!found) found = row;
            }
          }

          if (found) {
            found.allRows = futureRows; /* attach schedule for preview */
          }
          state.crData = found; /* null = no future date */
        } catch (err) {
          state.crError = "Грешка при връзка с таблицата. Опитайте отново.";
        }
        state.crLoading = false;
        render();
      }

      /* Write name to Sheets via Apps Script */
      async function submitChangingRoom() {
        const name = state.crName.trim();
        if (!name) { state.crNameErr = "Въведете вашето име."; render(); return; }
        if (!/^[\u0400-\u04FF ]+$/.test(name)) { state.crNameErr = "Само кирилица."; render(); return; }
        if (!state.crData) return;

        const col = state.crType === "male" ? "B" : "C";
        const alreadyFilled = state.crType === "male" ? state.crData.maleEntry : state.crData.femaleEntry;
        if (alreadyFilled) { showToast("Вече е отчетено за тази дата.", "error"); return; }

        state.crStep = "submitting";
        render();
        try {
          const payload = {
            action: "updateChangingRoom",
            sheet: CHANGING_ROOM_SHEET_NAME,
            dateStr: state.crData.dateStr,
            col: col,
            row: state.crData.sheetRow,
            name: name,
            _token: SHEETS_SECRET_TOKEN,
          };
          let ok = false;
          const r = await fetch(SHEETS_WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=UTF-8" },
            body: JSON.stringify(payload),
          });
          const j = await r.json().catch(() => ({}));
          ok = j.success === true;
          if (ok) {
            /* Update local mirror */
            if (state.crType === "male") state.crData.maleEntry = name;
            else state.crData.femaleEntry = name;
            state.crStep = "done";
            state.crName = "";
            showToast("Записано успешно!", "success");
          } else {
            throw new Error("server error");
          }
        } catch (_) {
          state.crStep = "started";
          showToast("Грешка при запис. Опитайте отново.", "error");
        }
        render();
      }

                onmouseover="this.style.background='rgba(255,255,255,.08)';this.style.borderColor='var(--gold)'"
                onmouseout="this.style.background='rgba(255,255,255,.04)';this.style.borderColor='var(--border)'">

              <button data-action="select-cr-type" data-crtype="female"
                style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:16px 10px 14px;cursor:pointer;text-align:center;color:var(--text);font-size:14px;font-weight:600;transition:background .15s,border-color .15s;"
                onmouseover="this.style.background='rgba(255,255,255,.08)';this.style.borderColor='var(--gold)'"
                onmouseout="this.style.background='rgba(255,255,255,.04)';this.style.borderColor='var(--border)'">

      /* ── Render: detail view for selected changing room ── */
      function renderChangingRoomDetail() {
        const typeLabel = state.crType === "male" ? "Мъжка съблекалня" : "Женска съблекалня";

          return `

        }

        if (state.crError) {

              </div>

                ⚠ ${escapeHtml(state.crError)}
              </div>

        /* No future date */
        if (!state.crData) {
          return `
            <div style="padding:14px 16px;max-width:480px;margin:0 auto;">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
                <button class="btn-back" data-action="cr-back-select">← Назад</button>

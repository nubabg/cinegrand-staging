      function parseCSV(text) {
        const lines = (text || '').trim().split(/\r?\n/).filter(line => line.trim());
        if (lines.length === 0) return [];
        const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
        return lines.slice(1).filter(l => l && l.trim()).map(line => {
          const cols = [];
          let cur = '', inQ = false;
          for (const ch of line) {
            if (ch === '"') { inQ = !inQ; }
            else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
            else { cur += ch; }
          }
          cols.push(cur);
          return Object.fromEntries(headers.map((h, i) => [h, (cols[i] || '').trim().replace(/^"|"$/g, '')]));
        });
      }

      /* Намира колона по частично/case-insensitive съвпадение */
      function colVal(row, ...candidates) {
        if (!row || typeof row !== 'object') return '';
        const keys = Object.keys(row);
        for (const cand of candidates) {
          const match = keys.find(k => k.toUpperCase().includes(cand.toUpperCase()));
          if (match && row[match] !== undefined) return row[match] || '';
        }
        return '';
      }

      async function fetchSheetsData() {
        const SHEET_ID = '17cuchNPS7ajySczy-Wc7eUlDFgAClaE8gsZrqCXAKcA';
        const cacheBust = '_cb=' + Date.now();

        async function tryGviz() {
          const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0&${cacheBust}`;
          const res = await fetch(url);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const text = await res.text();
          const start = text.indexOf('{');
          const end   = text.lastIndexOf('}');
          if (start === -1 || end === -1) throw new Error('Неочакван формат');
          const json = JSON.parse(text.slice(start, end + 1));
          if (!json.table) throw new Error('Липсва table');
          const cols = json.table.cols.map(c => (c.label || c.id || '').trim());
          return (json.table.rows || []).map(row => {
            if (!row || !row.c) return null;
            const obj = {};
            cols.forEach((col, i) => {
              const cell = row.c[i];
              obj[col] = cell ? (cell.f != null ? String(cell.f) : cell.v != null ? String(cell.v) : '') : '';
            });
            return obj;
          }).filter(r => r && Object.values(r).some(v => v !== ''));
        }

        async function tryCsv() {
          const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0&${cacheBust}`;
          const res = await fetch(url);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return parseCSV(await res.text());
        }

        /* Опит 1: gviz, Опит 2: gviz retry, Опит 3: CSV */
        for (let attempt = 0; attempt < 2; attempt++) {
          try { return await tryGviz(); } catch (e) {
            console.warn('[Charts] gviz опит ' + (attempt + 1) + ':', e.message);
            if (attempt === 0) await new Promise(r => setTimeout(r, 500));
          }
        }
        try { return await tryCsv(); } catch (e) {
          console.warn('[Charts] CSV:', e.message);
          throw e;
        }
      }

      /* Парсва дата от различни формати */
      function parseChartDate(str) {
        if (!str) return null;
        let m = str.match(/(\d{1,2})[.\/](\d{1,2})[.\/](\d{4})/);
        if (m) return new Date(+m[3], +m[2]-1, +m[1]);
        m = str.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
        if (m) return new Date(+m[1], +m[2]-1, +m[3]);
        const d = new Date(str);
        return isNaN(d) ? null : d;
      }
      function fmtChartDate(d) {
        return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0');
      }

      let _chartsLoading = false;
      let _cachedChartRows = null;
      let _chartsFetchVersion = 0;

      async function initChartsScreen(skipFetch) {
        if (_chartsLoading && !skipFetch) return;
        const container = document.getElementById('charts-container');
        if (!container) return;

        /* При навигация (бутон Данни): само показвай кеш, НИКОГА не fetch-вай. Данните се обновяват само при F5. */
        if (skipFetch) {
          if (_cachedChartRows && _cachedChartRows.length > 0) {
            buildChartsFromData(container, _cachedChartRows);
          } else {
            container.innerHTML = `<div class="panel" style="text-align:center;padding:60px 20px;color:var(--muted);">
              <div style="font-size:28px;margin-bottom:12px;">&#128202;</div>
              <div style="font-weight:600;margin-bottom:8px;">Презареди страницата (F5)</div>
              <div style="font-size:13px;">за да заредиш данните от Google Sheets.</div>
            </div>`;
          }
          return;
        }

        /* Ако има кеширани данни — рисувай директно (само при page load) */
        if (_cachedChartRows) {
          buildChartsFromData(container, _cachedChartRows);
          return;
        }

        _chartsLoading = true;
        const thisVersion = ++_chartsFetchVersion;
        console.log('[Charts] Fetching data (v' + thisVersion + ')…');

        /* Don't destroy charts during loading — keep them visible */
        if (!_cachedChartRows) {
          container.innerHTML = '<div class="charts-loading"><div class="spinner"></div><span>Зарежда от Sheets…</span></div>';
        }

        let rows;
        try {
          rows = await fetchSheetsData();
          console.log('[Charts] Fetched', rows ? rows.length : 0, 'raw rows (v' + thisVersion + ')');
        } catch(e) {
          console.warn('[Charts] Fetch failed (v' + thisVersion + '):', e.message);
          _chartsLoading = false;
          if (thisVersion !== _chartsFetchVersion) return;
          if (_cachedChartRows) return; /* Keep showing cached data */
          const c2 = document.getElementById('charts-container');
          if (c2) c2.innerHTML = `
            <div class="panel" style="text-align:center;padding:60px 20px;">
              <div style="font-size:32px;margin-bottom:16px;">&#9888;</div>
              <div style="color:var(--red);font-weight:700;margin-bottom:8px;">Грешка при зареждане</div>
              <div style="color:var(--muted);font-size:13px;">${escapeHtml(e.message)}</div>
            </div>`;
          return;
        }

        _chartsLoading = false;
        if (thisVersion !== _chartsFetchVersion) return;

        if (!rows || rows.length === 0) {
          if (_cachedChartRows) return; /* Keep showing cached data */
          const c2 = document.getElementById('charts-container');
          if (c2) c2.innerHTML = `<div class="panel" style="text-align:center;padding:60px 20px;color:var(--muted);">Няма данни в таблицата.</div>`;
          return;
        }

        _cachedChartRows = rows;
        const c2 = document.getElementById('charts-container');
        if (c2 && state.screen === "charts") buildChartsFromData(c2, rows);
      }

      function buildChartsFromData(container, rows) {

        /* ── Normalize rows ── */
        let skipped = 0;
        const normalized = [];
        rows.forEach(r => {
          try {
            if (!r || typeof r !== 'object') { skipped++; return; }
            const id = colVal(r, '№', 'ID', 'НОМЕР', 'ЗАПИС', 'A') || '';
            const insp = (colVal(r, 'ПРОВЕРЯВАЩ', 'INSPECTOR', 'EMPLOYEE', 'СЛУЖИТЕЛ', 'ИМЕ') || '').trim();
            const rawLoc = (colVal(r, 'ТИП', 'TYPE', 'ЛОКАЦИЯ', 'LOCATION', 'ЗАЛА') || '').trim();
            const stat = (colVal(r, 'СТАТУС', 'STATUS', 'РЕЗУЛТАТ') || '').trim();
            const dateStr = (colVal(r, 'ДАТА', 'DATE', 'TIMESTAMP', 'INSPECTED', 'ПРОВЕРКА') || '').trim();
            const issues = (colVal(r, 'ПРОБЛЕМИ', 'ISSUES') || '').trim();
            if (!insp && !rawLoc && !stat) { skipped++; return; }
            const loc = rawLoc.replace('Кинозала - ', 'Зала ').replace('Тоалетна - ', 'Тоал. ');
            const statUp = stat.toUpperCase();
            const status = statUp.includes('ЧИСТ') ? 'ЧИСТА'
              : (statUp.includes('МРЪСН') || statUp.includes('ПРОБЛЕМ')) ? 'МРЪСНА' : '';
            const date = parseChartDate(dateStr);
            normalized.push({ id, inspector: insp || '?', location: loc || '?', status, date,
              dateKey: date ? fmtChartDate(date) : null,
              hour: date ? date.getHours() : null,
              issues: issues && issues !== '—' && issues !== '-' ? issues : '' });
          } catch (_) { skipped++; }
        });
        console.log('[Charts] Normalized:', normalized.length, 'rows, skipped:', skipped);

        /* ── Derive aggregations from normalized data ── */
        const byInspector = {}, byIssue = {}, byLocation = {}, byDay = {}, byHour = {};
        const byStatus = { 'ЧИСТА': 0, 'МРЪСНА': 0 };
        const locationSet = new Set();

        normalized.forEach(r => {
          locationSet.add(r.location);
          byInspector[r.inspector] = (byInspector[r.inspector] || 0) + 1;
          byLocation[r.location]   = (byLocation[r.location]   || 0) + 1;
          if (r.status === 'ЧИСТА') byStatus['ЧИСТА']++;
          else if (r.status === 'МРЪСНА') byStatus['МРЪСНА']++;
          if (r.dateKey) byDay[r.dateKey] = (byDay[r.dateKey] || 0) + 1;
          if (r.hour !== null) {
            const hKey = String(r.hour).padStart(2,'0') + ':00';
            byHour[hKey] = (byHour[hKey] || 0) + 1;
          }
          if (r.issues) {
            r.issues.split(/[,;]+/).forEach(iss => {
              const k = iss.trim();
              if (k) byIssue[k] = (byIssue[k] || 0) + 1;
            });
          }
        });

        const total = normalized.length;
        const cleanCount   = byStatus['ЧИСТА'] || 0;
        const problemCount = byStatus['МРЪСНА'] || 0;
        const cleanPct   = total ? Math.round(cleanCount / total * 100) : 0;
        const problemPct = total ? Math.round(problemCount / total * 100) : 0;

        /* Дневен тренд (последни 30 дни) */
        const dayKeys = Object.keys(byDay).sort((a,b) => {
          const [da,ma] = a.split('.'); const [db,mb] = b.split('.');
          return (ma+da).localeCompare(mb+db);
        }).slice(-30);

        /* Часово разпределение */
        const hourLabels = [], hourData = [];
        for (let h = 0; h < 24; h++) {
          const hk = String(h).padStart(2,'0') + ':00';
          hourLabels.push(hk);
          hourData.push(byHour[hk] || 0);
        }

        const inspEntries = Object.entries(byInspector).sort((a,b) => b[1]-a[1]);
        const issEntries  = Object.entries(byIssue).sort((a,b) => b[1]-a[1]).slice(0,10);
        const locEntries  = Object.entries(byLocation).sort((a,b) => b[1]-a[1]);

        const maxDay = Math.max(1, ...dayKeys.map(k => byDay[k] || 0));
        const maxInsp = Math.max(1, inspEntries[0]?.[1] || 1);
        const maxLoc = Math.max(1, ...locEntries.map(([,v]) => v));
        const maxHour = Math.max(1, ...hourData);
        const lastDay = dayKeys.length ? dayKeys[dayKeys.length - 1] : '—';
        const lastDayCount = lastDay !== '—' ? (byDay[lastDay] || 0) : 0;
        const totalIssues = issEntries.reduce((s, [,v]) => s + v, 0);
        const hallLocs = locEntries.filter(([l]) => l.startsWith('Зала'));
        const toiletLocs = locEntries.filter(([l]) => l.startsWith('Тоал'));
        const getInitials = (n) => (n || '').split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2) || '?';

        /* ── Dashboard с визуално разнообразие: KPI, Donut, Leaderboard, Issue, Zone, Heatmap ── */
        container.innerHTML = `
          <!-- Ред 1: KPI cards -->
          <div class="kpi-row" style="margin-bottom:16px;">
            <div class="kpi-card"><div class="kpi-value" style="color:var(--gold);">${total}</div><div class="kpi-label">Общо проверки</div><div class="kpi-badge" style="background:rgba(200,120,24,.15);color:var(--gold);">активност</div></div>
            <div class="kpi-card"><div class="kpi-value" style="color:var(--green);">${cleanPct}%</div><div class="kpi-label">Чисто</div><div class="kpi-badge" style="background:rgba(45,204,112,.15);color:var(--green);">${cleanCount} проверки</div></div>
            <div class="kpi-card"><div class="kpi-value" style="color:var(--red);">${problemCount}</div><div class="kpi-label">Проблеми</div><div class="kpi-badge" style="background:rgba(239,91,91,.15);color:var(--red);">${totalIssues} общо</div></div>
            <div class="kpi-card"><div class="kpi-value" style="color:var(--blue);">${inspEntries.length}</div><div class="kpi-label">Служители</div><div class="kpi-badge" style="background:rgba(98,169,255,.15);color:var(--blue);">активни</div></div>
            <div class="kpi-card"><div class="kpi-value" style="color:#a78bfa;">${lastDay}</div><div class="kpi-label">Последна активност</div><div class="kpi-badge" style="background:rgba(167,139,250,.15);color:#a78bfa;">${lastDayCount} проверки</div></div>
          </div>

          <!-- Ред 2: Donut + Daily activity -->
          <div class="charts-grid">
            <div class="chart-card card-donut">
              <div class="chart-title">Чисто vs Проблем</div>
              <div class="chart-subtitle">Обща оценка на всички проверки</div>
              <div class="chart-wrap" style="min-height:240px;">
                <div class="charts-donut-wrap">
                  <div class="charts-donut" style="background:conic-gradient(var(--green) 0% ${cleanPct}%, var(--red) ${cleanPct}% 100%);">
                    <div class="charts-donut-center" style="background:var(--panel-2);"><span style="font-size:32px;font-weight:700;color:var(--green);">${cleanPct}%</span><span style="font-size:10px;color:var(--muted);">ЧИСТО</span></div>
                  </div>
                  <div style="display:flex;flex-direction:column;gap:10px;">
                    <div style="display:flex;align-items:center;gap:8px;"><span style="width:12px;height:12px;border-radius:50%;background:var(--green);"></span><span>Чисто: ${cleanCount}</span></div>
                    <div style="display:flex;align-items:center;gap:8px;"><span style="width:12px;height:12px;border-radius:50%;background:var(--red);"></span><span>Проблем: ${problemCount}</span></div>
                  </div>
                </div>
                <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06);">${total} проверки общо · ${cleanCount} чисто / ${problemCount} проблем</div>
              </div>
            </div>
            <div class="chart-card card-time">
              <div class="chart-title">Проверки по дни</div>
              <div class="chart-subtitle">Дневна активност (последни ${dayKeys.length} дни)</div>
              <div class="chart-wrap" style="min-height:220px;">
                <div class="charts-vertical-wrap">${dayKeys.map(k => {
                  const v = byDay[k] || 0;
                  const barH = maxDay ? Math.max(12, Math.round(150 * v / maxDay)) : 0;
                  return `<div class="charts-vertical-col" title="${k}: ${v} проверки"><div class="daily-bar-track"><div class="daily-bar-fill" style="height:${barH}px;"></div></div><span style="font-size:11px;color:var(--muted);">${k}</span><span style="font-weight:600;font-size:13px;">${v}</span></div>`;
                }).join('')}</div>
              </div>
            </div>
          </div>

          <!-- Ред 3: Leaderboard + Issue analysis -->
          <div class="charts-grid">
            <div class="chart-card">
              <div class="chart-title">Проверки по служител</div>
              <div class="chart-subtitle">Ранкинг по брой проверки</div>
              <div class="chart-wrap" style="min-height:240px;">
                <div>${inspEntries.map(([name, count], i) => {
                  const pct = Math.round(count/maxInsp*100);
                  const rankCls = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : 'other';
                  const colors = ['#c87818','#62a9ff','#2dcc70','#a78bfa','#38bdf8'];
                  const col = colors[i % colors.length];
                  return `<div class="leaderboard-item"><span class="leaderboard-rank ${rankCls}">${i+1}</span><span class="leaderboard-avatar">${getInitials(name)}</span><span style="flex:1;font-weight:600;">${escapeHtml(name)}</span><div class="leaderboard-bar"><div class="leaderboard-bar-fill" style="width:${pct}%;background:${col};"></div></div><span style="font-weight:700;min-width:28px;">${count}</span></div>`;
                }).join('')}</div>
              </div>
            </div>
            <div class="chart-card card-issues">
              <div class="chart-title">Топ проблеми</div>
              <div class="chart-subtitle">Най-често срещани нередности</div>
              <div class="chart-wrap" style="min-height:240px;">
                ${issEntries.length ? issEntries.map(([name, count], i) => {
                  const pctOfTotal = totalIssues ? Math.round(count/totalIssues*100) : 0;
                  const maxIss = Math.max(1, ...issEntries.map(([,v]) => v));
                  const severity = count >= maxIss * 0.7 ? 'high' : count >= maxIss * 0.3 ? 'med' : 'low';
                  const barPct = Math.round(count/maxIss*100);
                  return `<div class="issue-item" title="${escapeHtml(name)}: ${count} пъти (${pctOfTotal}% от всички проблеми)"><span class="issue-severity ${severity}"></span><span style="flex:1;">${escapeHtml(name)}</span><span class="issue-pct">${pctOfTotal}%</span><span class="issue-count">${count}</span><div class="charts-bar-bg" style="width:80px;height:6px;"><div class="charts-bar-fill charts-bar-fill--red" style="width:${barPct}%;"></div></div></div>`;
                }).join('') : '<div class="chart-empty">Няма регистрирани проблеми</div>'}
              </div>
            </div>
          </div>

          <!-- Ред 4: Zone distribution + Hourly heatmap -->
          <div class="charts-grid">
            <div class="chart-card">
              <div class="chart-title">Проверки по локация</div>
              <div class="chart-subtitle">Разпределение по зали и тоалетни</div>
              <div class="chart-wrap" style="min-height:240px;">
                ${hallLocs.length ? `<div class="zone-group"><div class="zone-group-title">🎬 Кинозали</div>${hallLocs.map(([loc, count]) => { const pct = maxLoc ? Math.round(count/maxLoc*100) : 0; return `<div class="zone-item"><span style="min-width:100px;">${escapeHtml(loc)}</span><div class="charts-bar-bg"><div class="charts-bar-fill charts-bar-fill--blue" style="width:${pct}%;"></div></div><span style="font-weight:600;">${count}</span></div>`; }).join('')}</div>` : ''}
                ${toiletLocs.length ? `<div class="zone-group"><div class="zone-group-title">🚿 Тоалетни</div>${toiletLocs.map(([loc, count]) => { const pct = maxLoc ? Math.round(count/maxLoc*100) : 0; return `<div class="zone-item"><span style="min-width:100px;">${escapeHtml(loc)}</span><div class="charts-bar-bg"><div class="charts-bar-fill" style="width:${pct}%;background:#38bdf8;"></div></div><span style="font-weight:600;">${count}</span></div>`; }).join('')}</div>` : ''}
                ${!hallLocs.length && !toiletLocs.length ? '<div class="chart-empty">Няма данни по локации</div>' : ''}
              </div>
            </div>
            <div class="chart-card card-time">
              <div class="chart-title">Активност по часове</div>
              <div class="chart-subtitle">Разпределение в денонощието (0–23 ч)</div>
              <div class="chart-wrap" style="min-height:240px;">
                <div class="hourly-histogram">${hourLabels.map((label, i) => {
                  const v = hourData[i] || 0;
                  const barH = maxHour ? Math.max(4, Math.round(160 * v / maxHour)) : 0;
                  const peak = maxHour && v === Math.max(...hourData) && v > 0;
                  return `<div class="hourly-col" title="${label}: ${v} проверки"><div class="hourly-bar-track"><div class="hourly-bar-fill" style="height:${barH}px;${peak ? 'background:var(--gold);box-shadow:0 0 8px rgba(200,120,24,.5);' : ''}"></div></div>${v > 0 ? `<span class="hourly-value">${v}</span>` : ''}</div>`;
                }).join('')}</div>
                <div class="heatmap-legend"><span>00</span><span>06</span><span>12</span><span>18</span><span>23</span></div>
              </div>
            </div>
          </div>

          <!-- Детайли по служители -->
          <div class="chart-card" style="margin-bottom:16px;">
            <div class="chart-title">Детайли по служители</div>
            <div class="chart-subtitle">Брой проверки и процент от общите</div>
            <table class="charts-table">
              <thead><tr><th>#</th><th>Служител</th><th>Проверки</th><th>% от общо</th><th>Визуализация</th></tr></thead>
              <tbody>
                ${inspEntries.map(([name, count], i) => {
                  const maxC = (inspEntries[0] && inspEntries[0][1]) || 1;
                  return `<tr>
                  <td style="color:var(--muted-2);">${i+1}</td>
                  <td style="color:var(--text);font-weight:600;">${escapeHtml(name)}</td>
                  <td>${count}</td>
                  <td>${total ? Math.round(count/total*100) : 0}%</td>
                  <td><div class="charts-bar-bg"><div class="charts-bar-fill" style="width:${Math.round(count/maxC*100)}%;"></div></div></td>
                </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>`;
        console.log('[Charts] Rendered', rows.length, 'rows (HTML)');
      }

      function renderInspection() {
        const config = getConfig(state.inspectionType);
        const filledCount = config.items.filter((i) => isFilled(state.itemState[i.id])).length;
        const allFilled = filledCount === config.items.length;
        const progress = Math.round((filledCount / config.items.length) * 100);
        const dirtyCount = Object.values(state.itemState).filter((v) => v === STATUS.DIRTY).length;

        return `<div class="page">
          <div class="progress" style="margin:-24px -24px 24px;"><div style="width:${progress}%;"></div></div>
          <div class="toolbar">
            <div>
              <h1 class="hero-title" style="display:flex;align-items:center;gap:12px;">
                <span style="font-size:32px;">${state.inspectionType === "hall" ? "🎬" : "🚿"}</span>
                ${config.title}
              </h1>
              <div class="muted">${isSheetsConfigured() ? "Данните ще се изпратят автоматично към Google Sheets след запис." : "Локален запис в браузъра."}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <span class="muted"><strong style="color:var(--green);">${filledCount}</strong>/${config.items.length} попълнени</span>
              ${dirtyCount ? `<span class="pill bad">⚠ ${dirtyCount} проблема</span>` : ""}
            </div>
          </div>

          <div class="panel" style="margin-bottom:16px;">
            <div class="grid cards-2">
              <div class="field"><label>Локация *${!state.currentSessionId && !isQROnlySession() ? ' <span style="color:var(--red);font-size:11px;">(няма заключване)</span>' : ""}</label><select id="location-select" ${isQROnlySession() ? "disabled" : ""}>${config.locations.map((l) => `<option value="${l}" ${l === state.location ? "selected" : ""}>${l}</option>`).join("")}</select></div>
              <div class="field"><label>Проверяващ *</label><input id="inspector-input" value="${escapeHtml(state.inspector)}" placeholder="Пълно име…" />${state.showValidation && !state.inspector.trim() ? `<div style="color:var(--red);font-size:12px;">Задължително поле</div>` : state.showValidation && !/^[\u0400-\u04FF ]+$/.test(state.inspector.trim()) ? `<div style="color:var(--red);font-size:12px;">Само кирилица, без специални символи</div>` : ""}</div>
            </div>
            <div class="muted" style="font-size:13px;">Дата и час: ${fmt(new Date().toISOString())}</div>
          </div>

          <div class="panel" style="margin-bottom:16px;">
            <div class="toolbar">
              <h3 class="section-title" style="margin:0;">${config.sectionTitle}</h3>
              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button class="btn btn-green" data-action="fill-all" data-value="clean">Всичко чисто</button>
                <button class="btn btn-red" data-action="fill-all" data-value="dirty">Всичко нечисто</button>
              </div>
            </div>
            <div class="items" id="items-container">
              ${config.items.map((item) => renderItemRow(item)).join("")}
            </div>
            ${state.showValidation && !allFilled ? `<div style="margin-top:12px;padding:12px 14px;border:1px solid rgba(239,68,68,.35);border-radius:12px;background:rgba(239,68,68,.12);color:#fca5a5;">Маркирай всяка точка като Чисто или Нечисто преди да запишеш.</div>` : ""}
          </div>

          <div class="panel" style="margin-bottom:16px;">
            <div class="field" style="margin:0;"><label>Бележки</label><textarea id="notes-input" rows="4" placeholder="Допълнителни коментари…">${escapeHtml(state.notes)}</textarea></div>
          </div>

          <button class="btn btn-gold" data-action="submit-inspection" style="width:100%;padding:16px;font-size:16px;">
            ${allFilled && state.inspector.trim() ? `Запази${isSheetsConfigured() ? " и изпрати" : ""}` : `Попълни всички полета (${filledCount}/${config.items.length})`}
          </button>
        </div>`;
      }

      function renderItemRow(item) {
        const value = state.itemState[item.id];
        const cls = value === STATUS.CLEAN ? "clean" : value === STATUS.DIRTY ? "dirty" : state.showValidation ? "missing" : "";
        return `
          <div class="item-row ${cls}" data-item-id="${item.id}">
            <div>
              <div class="item-title">${item.icon} ${item.label}</div>
              <div class="muted">${item.desc}</div>
              ${state.showValidation && !value ? `<div style="color:#f59e0b;font-size:12px;margin-top:4px;">Задължително поле</div>` : ""}
            </div>
            <div class="status-buttons">
              <button class="status-btn ${value === STATUS.CLEAN ? "active clean" : ""}" data-action="set-item" data-id="${item.id}" data-value="clean">✓ Чисто</button>
              <button class="status-btn ${value === STATUS.DIRTY ? "active dirty" : ""}" data-action="set-item" data-id="${item.id}" data-value="dirty">✗ Нечисто</button>
            </div>
          </div>`;
      }

      /* ── Targeted DOM update for item status (avoids full re-render) ── */
      function updateItemRow(itemId) {
        const config = getConfig(state.inspectionType);
        const item = config.items.find((i) => i.id === itemId);
        if (!item) return;
        const row = document.querySelector(`.item-row[data-item-id="${itemId}"]`);
        if (!row) return;
        row.outerHTML = renderItemRow(item);

        /* Update progress bar & counters */
        const filledCount = config.items.filter((i) => isFilled(state.itemState[i.id])).length;
        const progress = Math.round((filledCount / config.items.length) * 100);
        const progressBar = document.querySelector(".progress > div");
        if (progressBar) progressBar.style.width = progress + "%";
      }

      function renderModals() {
        let html = "";
        if (state.showDeleteModal) {
          html += `<div class="modal-backdrop" data-action="close-delete" role="presentation">
            <div class="modal" id="modal-delete" role="dialog" aria-modal="true" onclick="event.stopPropagation()">
              <div style="text-align:center;padding:20px 0;">
                <div style="font-size:36px;margin-bottom:12px;">&#9940;</div>
                <h2 class="section-title" style="color:var(--red);margin-bottom:8px;">Функцията е деактивирана</h2>
                <p class="muted">Изтриването на данни не е позволено.</p>
                <button type="button" class="btn btn-outline" data-action="close-delete" style="margin-top:16px;">Затвори</button>
              </div>
            </div>
          </div>`;
        }
        if (state.showQRModal) html += renderQRModal();
        if (state.toast) html += `<div class="toast ${state.toast.type}" role="status" aria-live="polite">${state.toast.msg}</div>`;
        return html;
      }

      function renderQRModal() {
        const base = getQRBaseUrl();
        const items = QR_LOCATIONS;
        const qrUrl = (type, loc) => {
          const b = base.replace(/\/?$/, "");
          const sep = b.includes("?") ? "&" : "?";
          return b + sep + "open=inspection&type=" + encodeURIComponent(type) + "&location=" + encodeURIComponent(loc);
        };
        const imgSrc = (url) => "https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=2&data=" + encodeURIComponent(url);
        return `
          <div class="modal-backdrop" id="qr-modal-backdrop" data-action="close-qr" role="presentation">
            <div class="modal qr-modal" role="dialog" aria-modal="true" aria-labelledby="qr-modal-title" onclick="if(!event.target.closest('[data-action]'))event.stopPropagation()" style="max-width:720px;">
              <h2 id="qr-modal-title" class="section-title" style="margin:0 0 20px;">QR кодове по локация</h2>
              <div class="grid cards-2" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:16px; max-height:60vh; overflow-y:auto;">
                ${items.map(({ type, location, icon }) => {
                  const url = qrUrl(type, location);
                  return `<div class="panel" style="text-align:center; padding:16px;">
                    <div style="font-size:24px; margin-bottom:8px;">${icon}</div>
                    <div style="font-weight:700; font-size:14px; margin-bottom:12px;">${escapeHtml(location)}</div>
                    <img src="${imgSrc(url)}" width="160" height="160" alt="QR код: ${escapeHtml(location)}" style="display:block; margin:0 auto; border-radius:12px;" />
                  </div>`;
                }).join("")}
              </div>
              <div style="margin-top:20px;">
                <button type="button" class="btn btn-outline" data-action="close-qr">Затвори</button>
              </div>
            </div>
          </div>`;
      }

      let _modalTrapHandler = null;
      function setupModalFocusTrap() {
        if (_modalTrapHandler) document.removeEventListener("keydown", _modalTrapHandler);
        const modal = document.getElementById("modal-delete");
        if (!modal) return;
        const focusable = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
        const first = focusable[0];
        const last = focusable[focusable.length - 1];
        const prevActive = document.activeElement;
        if (first) first.focus();
        _modalTrapHandler = function(e) {
          if (e.key === "Escape") {
            state.showDeleteModal = false; state.deleteErr = ""; state.deletePass = ""; render();
            document.removeEventListener("keydown", _modalTrapHandler);
            _modalTrapHandler = null;
            if (prevActive && prevActive.focus) prevActive.focus();
            return;
          }
          if (e.key !== "Tab") return;
          if (e.shiftKey) {
            if (document.activeElement === first) { e.preventDefault(); if (last) last.focus(); }
          } else {
            if (document.activeElement === last) { e.preventDefault(); if (first) first.focus(); }
          }
        };
        document.addEventListener("keydown", _modalTrapHandler);
      }


      function updateModals() {
        const el = document.getElementById('modals');
        if (el) el.innerHTML = renderModals();
        if (state.showDeleteModal) setupModalFocusTrap();
      }

      function render() {
        const content =
          state.screen === "home" ? renderHome() :
          state.screen === "inspection" ? renderInspection() :
          state.screen === "history" ? renderHistory() :
          state.screen === "charts" ? renderCharts() :
          renderHome();
        app.innerHTML = renderShell(content);
        updateModals();
        bindInputs();
        /* Charts: HTML визуализации (без Chart.js) — синхронно от кеш */
        if (state.screen === "charts" && _cachedChartRows && _cachedChartRows.length > 0) {
          const c = document.getElementById('charts-container');
          if (c) buildChartsFromData(c, _cachedChartRows);
        }
        applyPerfMode();
      }

      function bindInputs() {
        const el = (id) => document.getElementById(id);
        const bind = (id, event, fn) => { const e = el(id); if (e) e["on" + event] = fn; };
        bind("location-select", "change", async (e) => {
          const newLoc = e.target.value;
          const oldLoc = state.location;
          if (newLoc === oldLoc) return;
          if (_lockBusy) { e.target.value = oldLoc; return; }
          if (!isQROnlySession()) {
            const oldSid = state.currentSessionId;
            const sessionId = generateSessionId();
            const lockResult = await acquireLock(state.inspectionType, newLoc, sessionId);
            if (!lockResult.success) {
              const locName = escapeHtml(newLoc);
              const msg = lockResult.minutesLeft
                ? locName + " се проверява в момента. Опитайте след ~" + lockResult.minutesLeft + " мин."
                : locName + " се проверява. Изберете друга локация.";
              showToast(msg, "error");
              e.target.value = oldLoc;
              return;
            }
            if (oldSid) await releaseLock(oldSid);
            state.currentSessionId = sessionId;
            _lockAcquiredAt = Date.now();
            sessionStorage.setItem(LOCK_SESSION_KEY, sessionId);
          }
          state.location = newLoc;
        });
        bind("inspector-input", "input", (e) => { const filtered = e.target.value.replace(/[^\u0400-\u04FF ]/g, ""); e.target.value = filtered; state.inspector = filtered; });
        bind("notes-input", "input", (e) => { state.notes = e.target.value; });
        bind("delete-pass-input", "input", (e) => { state.deletePass = e.target.value; state.deleteErr = ""; });
        bind("export-range-select", "change", (e) => { state.exportRange = e.target.value; render(); });
        bind("history-type-filter", "change", (e) => { state.historyTypeFilter = e.target.value; render(); });
        bind("history-location-filter", "change", (e) => { state.historyLocationFilter = e.target.value; render(); });
}

      /* ── Event Delegation ── */
      document.addEventListener("click", async (e) => {
        const btn = e.target.closest("[data-action]");
        if (!btn) return;
        const action = btn.dataset.action;

        /* Navigation — blocked for QR-only sessions */
        if (isQROnlySession() && (action === "go-home" || action === "go-history" || action === "open-qr" || action === "start-inspection")) return;
        if (action === "toggle-perf") {
          const next = localStorage.getItem(PERF_KEY) === "1" ? "0" : "1";
          localStorage.setItem(PERF_KEY, next);
          applyPerfMode();
          return;
        }
        if (action === "go-home") { cleanupSessionLock(); state.screen = "home"; render(); return; }
        if (action === "go-history") { state.screen = "history"; render(); return; }
        if (action === "go-charts") {
          if (Date.now() < chartsCooldownUntil) {
            showToast("Моля да не спамиш. След няколко секунди опитай пак.", "error");
            return;
          }
          chartsCooldownUntil = Date.now() + CHARTS_COOLDOWN_SEC * 1000;
          if (!chartsCooldownInterval) {
            chartsCooldownInterval = setInterval(() => {
              if (Date.now() >= chartsCooldownUntil) {
                chartsCooldownUntil = 0;
                clearInterval(chartsCooldownInterval);
                chartsCooldownInterval = null;
              }
              /* Само обновяваме текста на бутона — НИКОГА не render(), за да не мига QR модал и останалите прозорци */
              const btn = document.querySelector('[data-action="go-charts"]');
              if (btn) {
                const inCooldown = chartsCooldownUntil > Date.now();
                btn.innerHTML = inCooldown ? "&#128202; Данни (" + Math.ceil((chartsCooldownUntil - Date.now()) / 1000) + ")" : "&#128202; Данни";
                btn.classList.toggle('cooldown', inCooldown);
                btn.disabled = inCooldown;
              }
            }, 1000);
          }
          cleanupSessionLock();
          if (state.screen === "charts") {
            /* Вече сме на Данни — не презареждаме, данните остават; само обновяваме бутона */
            const btn = document.querySelector('[data-action="go-charts"]');
            if (btn) { btn.classList.add('cooldown'); btn.disabled = true; btn.innerHTML = "&#128202; Данни (" + CHARTS_COOLDOWN_SEC + ")"; }
            return;
          }
          state.screen = "charts"; render();
          return;
        }

        /* Inspection item status — targeted update, no full re-render */
        if (action === "set-item") {
          state.itemState[btn.dataset.id] = btn.dataset.value;
          updateItemRow(btn.dataset.id);
          return;
        }

        /* Fill all items */
        if (action === "fill-all") {
          getConfig(state.inspectionType).items.forEach((i) => { state.itemState[i.id] = btn.dataset.value; });
          render(); return;
        }

        if (action === "submit-inspection") { await submitInspection(); return; }
        if (action === "start-inspection") { await startInspectionWithLock(btn.dataset.type); return; }

        /* Sync */
        if (action === "retry-sync") {
          const rec = state.records.find((r) => String(r.id) === btn.dataset.id);
          if (rec) await syncRecord(rec);
          return;
        }

        /* Delete modal */
        if (action === "close-delete") {
          if (_modalTrapHandler) { document.removeEventListener("keydown", _modalTrapHandler); _modalTrapHandler = null; }
          state.showDeleteModal = false; state.deleteErr = ""; state.deletePass = ""; render(); return;
        }
        if (action === "toggle-pass" || action === "confirm-delete") { return; }

        /* Export */
        if (action === "export-pdf") { exportPdf(); return; }

        /* QR modal — само updateModals(), не презареждаме съдържанието, данните остават */
        if (action === "open-qr") { state.showQRModal = true; updateModals(); return; }
        if (action === "close-qr") { state.showQRModal = false; updateModals(); return; }
      });

      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        if (state.showDeleteModal) {
          state.showDeleteModal = false; state.deleteErr = ""; state.deletePass = "";
          render();
        } else if (state.showQRModal) {
          state.showQRModal = false;
          updateModals();
        }
      });

      /* ── Prevent closing the page + release lock if they force-close ── */
      function _releaseLockOnExit() {
        const sid = state.currentSessionId || sessionStorage.getItem(LOCK_SESSION_KEY);
        if (sid) releaseLockBeacon(sid);
      }
      window.addEventListener("beforeunload", (e) => {
        e.preventDefault();
        e.returnValue = "";
      });
      window.addEventListener("pagehide", (e) => { if (!e.persisted) _releaseLockOnExit(); });

      /* ── Kick user out if they leave/minimize during inspection (mobile only) ── */
      const _isMobileDevice = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
        || ("ontouchstart" in window && navigator.maxTouchPoints > 1 && window.innerWidth <= 1024);
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState !== "hidden") return;
        if (state.screen !== "inspection") return;
        if (!_isMobileDevice) return;
        const sid = state.currentSessionId || sessionStorage.getItem(LOCK_SESSION_KEY);
        if (sid) releaseLockBeacon(sid);
        state.currentSessionId = null;
        _lockAcquiredAt = 0;
        sessionStorage.removeItem(LOCK_SESSION_KEY);
        sessionStorage.removeItem(QR_SESSION_KEY);
        sessionStorage.removeItem(QR_MODE_KEY);
        sessionStorage.removeItem(QR_TYPE_KEY);
        sessionStorage.removeItem(QR_LOC_KEY);
        window.location.replace("https://google.com");
      });

      /* ── Initial Render ── */
      cleanupOldRecords();
      if (getAccessBlock()) { showAccessBlocked(); } else {
      showAccessLoading();
      checkAccess().then(async (allowed) => {
        if (allowed === "outside") { recordFailedAttempt(); showOutsideCinema(); return; }
        if (!allowed) { const blocked = recordFailedAttempt(); if (blocked) { showAccessBlocked(); return; } showAccessDenied(); return; }
        /* Preload charts data — единствено при зареждане на страницата (F5). Бутонът Данни само показва кеша. */
        fetchSheetsData().then(r => {
          _cachedChartRows = r;
          if (state.screen === "charts") {
            const c = document.getElementById('charts-container');
            if (c && r && r.length) buildChartsFromData(c, r);
          }
        }).catch(() => {});
        /* Обработи URL параметри от QR сканиране */
        const search = window.location.search || "";
        const hash = window.location.hash || "";
        const params = new URLSearchParams(search || (hash.startsWith("#") ? hash.slice(1) : ""));
        if (params.get("open") === "inspection") {
          const type = params.get("type");
          const loc = params.get("location");
          if ((type === "hall" || type === "bathroom") && loc) {
            const decodedLoc = decodeURIComponent(loc.replace(/\+/g, "%20"));
            const config = getConfig(type);
            const resolvedLoc = config.locations.includes(decodedLoc) ? decodedLoc : config.locations[0];
            /* Acquire location lock before showing the form */
            updateLoadingText("Заключване на локация…");
            const sessionId = generateSessionId();
            const lockResult = await acquireLock(type, resolvedLoc, sessionId);
            if (!lockResult.success) {
              showLocationLocked(resolvedLoc, lockResult.error);
              return;
            }
            state.currentSessionId = sessionId;
            _lockAcquiredAt = Date.now();
            sessionStorage.setItem(LOCK_SESSION_KEY, sessionId);
            state.openedFromQR = true;
            Object.assign(state, { inspectionType: type, location: resolvedLoc, inspector: "", itemState: {}, notes: "", showValidation: false, screen: "inspection" });
            try { history.replaceState({}, "", window.location.origin + window.location.pathname); } catch (_) {}
          }
        } else if (sessionStorage.getItem(QR_MODE_KEY) === "1") {
          /* QR сесия след reload (pull-to-refresh) — винаги re-acquire lock */
          const savedType = sessionStorage.getItem(QR_TYPE_KEY) || "hall";
          const savedLoc  = sessionStorage.getItem(QR_LOC_KEY)  || "";
          const config = getConfig(savedType);
          const decodedLoc = decodeURIComponent(savedLoc.replace(/\+/g, "%20"));
          const resolvedLoc = config.locations.includes(decodedLoc) ? decodedLoc : config.locations[0];
          const sessionId = generateSessionId();
          const lockResult = await acquireLock(savedType, resolvedLoc, sessionId);
          if (!lockResult.success) {
            showLocationLocked(resolvedLoc, lockResult.error);
            return;
          }
          state.currentSessionId = sessionId;
          _lockAcquiredAt = Date.now();
          sessionStorage.setItem(LOCK_SESSION_KEY, sessionId);
          state.openedFromQR = true;
          Object.assign(state, { inspectionType: savedType, location: resolvedLoc, inspector: "", itemState: {}, notes: "", showValidation: false, screen: "inspection" });
        }
        render();
        /* Периодична проверка за изтекла QR сесия (всяка минута) */
        setInterval(function() {
          if (sessionStorage.getItem(QR_MODE_KEY) !== "1") return;
          const sessionTs = parseInt(sessionStorage.getItem(QR_SESSION_KEY) || "0", 10);
          if (!sessionTs || Date.now() - sessionTs >= QR_SESSION_TTL_MS) {
            const sid = state.currentSessionId || sessionStorage.getItem(LOCK_SESSION_KEY);
            if (sid) releaseLockBeacon(sid);
            state.currentSessionId = null;
            sessionStorage.removeItem(LOCK_SESSION_KEY);
            sessionStorage.removeItem(QR_SESSION_KEY);
            sessionStorage.removeItem(QR_MODE_KEY);
            sessionStorage.removeItem(QR_TYPE_KEY);
            sessionStorage.removeItem(QR_LOC_KEY);
            window.location.replace(QR_REDIRECT_URL);
          }
        }, 60 * 1000);
        /* Проверка за изтичане на lock (всяка минута) */
        setInterval(function() {
          if (!_lockAcquiredAt || state.screen !== "inspection") return;
          const elapsed = Date.now() - _lockAcquiredAt;
          const remaining = LOCK_TIMEOUT_MS - elapsed;
          if (remaining <= 0) {
            showToast("Времето за проверка изтече. Моля сканирайте QR кода отново.", "error");
            state.currentSessionId = null;
            _lockAcquiredAt = 0;
            sessionStorage.removeItem(LOCK_SESSION_KEY);
            if (isQROnlySession()) {
              setTimeout(() => window.location.replace(QR_REDIRECT_URL), 2000);
            } else {
              state.screen = "home"; render();
            }
          } else if (remaining <= 120000 && remaining > 60000) {
            showToast("Остават по-малко от 2 мин за тази проверка.", "error");
          }
        }, 60 * 1000);
        /* Периодична проверка на геолокация за QR сесии (всеки 5 минути) */
        /* Whitelisted IP-та се пропускат — могат да работят отвсякъде */
        setInterval(async function() {
          if (sessionStorage.getItem(QR_MODE_KEY) !== "1") return;
          if (sessionStorage.getItem(LOCK_WHITELISTED_KEY) === "1") return;
          const pos = await getGeolocation();
          if (!pos || !isNearCinema(pos.lat, pos.lng)) {
            const sid = state.currentSessionId || sessionStorage.getItem(LOCK_SESSION_KEY);
            if (sid) releaseLockBeacon(sid);
            state.currentSessionId = null;
            sessionStorage.removeItem(LOCK_SESSION_KEY);
            sessionStorage.removeItem(QR_SESSION_KEY);
            sessionStorage.removeItem(QR_MODE_KEY);
            sessionStorage.removeItem(QR_TYPE_KEY);
            sessionStorage.removeItem(QR_LOC_KEY);
            window.location.replace(QR_REDIRECT_URL);
          }
        }, GEO_RECHECK_MS);
      });
      } /* end getAccessBlock check */

    </script>
  </body>
</html>

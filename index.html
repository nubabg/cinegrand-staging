              <div style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;color:var(--muted);">
                <div style="font-size:26px;margin-bottom:8px;">📅</div>
                <div style="font-size:14px;">Няма планирано почистване</div>
              </div>
            </div>`;
        }

        const { dateStr, date, maleEntry, femaleEntry } = state.crData;
        const today        = crToday();
        const isToday      = date.getTime() === today.getTime();
        const myEntry      = state.crType === "male" ? maleEntry : femaleEntry;
        const alreadyDone  = Boolean(myEntry);

        /* Status pill */
        let statusPill = "";
        if (alreadyDone) {
          statusPill = `<span style="display:inline-block;background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.3);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:600;">✓ Изпълнено</span>`;
        } else if (isToday) {
          statusPill = `<span style="display:inline-block;background:rgba(201,162,39,.12);color:var(--gold);border:1px solid rgba(201,162,39,.3);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:600;">⬤ Предстои днес</span>`;
        } else {
          statusPill = `<span style="display:inline-block;background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:600;">Предстоящо</span>`;
        }

        /* Action area */
        let actionArea = "";
        if (alreadyDone) {
          actionArea = `
            <div style="background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:11px 14px;color:var(--muted);font-size:13px;">
              ✓ Почистването е отчетено от: <strong style="color:var(--text);">${escapeHtml(myEntry)}</strong>
            </div>`;
        } else if (!isToday) {
          actionArea = `
            <div style="background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--muted);font-size:12px;text-align:center;">
              Може да се отчита само в деня на почистването.
            </div>`;
        } else if (state.crStep === "idle") {
          actionArea = `
            <button class="btn btn-gold" data-action="cr-start" style="width:100%;font-size:14px;padding:12px;">
              Започни почистване
            </button>`;
        } else if (state.crStep === "started") {
          actionArea = `
            <div style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:14px;">
              <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">Въведи твоето име:</div>
              <input id="cr-name-input" type="text" value="${escapeHtml(state.crName)}"
                placeholder="Само на кирилица"
                style="width:100%;box-sizing:border-box;background:rgba(255,255,255,.05);border:1px solid ${state.crNameErr ? "rgba(239,68,68,.6)" : "var(--border)"};border-radius:8px;padding:8px 10px;color:var(--text);font-size:14px;outline:none;margin-bottom:${state.crNameErr ? "5px" : "10px"};">
              ${state.crNameErr ? `<div style="color:#f87171;font-size:11px;margin-bottom:8px;">${escapeHtml(state.crNameErr)}</div>` : ""}
              <button class="btn btn-gold" data-action="cr-submit" style="width:100%;font-size:14px;padding:11px;">
                Завърши и запиши
              </button>
            </div>`;
        } else if (state.crStep === "submitting") {
          actionArea = `
            <div style="text-align:center;padding:16px;color:var(--muted);font-size:13px;">
              <div class="cg-bounce-dots sm" style="margin:0 auto 10px;"><span></span><span></span><span></span></div>
              Записване…
            </div>`;
        } else if (state.crStep === "done") {
          actionArea = `
            <div style="background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:11px 14px;color:var(--muted);font-size:13px;text-align:center;">
              ✓ Записано успешно!
            </div>`;
        }

        /* Schedule preview — all future rows (loaded from crData.allRows if available) */
        const scheduleSection = state.crData.allRows && state.crData.allRows.length > 1 ? `
          <div style="margin-top:14px;">
            <div style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;">График (само четене)</div>
            <div style="background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;overflow:hidden;">
              <table style="width:100%;border-collapse:collapse;font-size:12px;">
                <thead><tr style="background:rgba(255,255,255,.04);">
                  <th style="padding:6px 10px;text-align:left;color:var(--muted);font-weight:600;">Дата</th>
                  <th style="padding:6px 10px;text-align:left;color:var(--muted);font-weight:600;">🚹 Мъжка</th>
                  <th style="padding:6px 10px;text-align:left;color:var(--muted);font-weight:600;">🚺 Женска</th>
                </tr></thead>
                <tbody>
                  ${state.crData.allRows.map((r, idx) => `
                    <tr style="border-top:1px solid var(--border);${idx === 0 ? "background:rgba(201,162,39,.06);" : ""}">
                      <td style="padding:6px 10px;color:${idx === 0 ? "var(--gold)" : "var(--text)"};">${escapeHtml(r.dateStr)}</td>
                      <td style="padding:6px 10px;color:var(--muted);">${r.maleEntry ? "✓ " + escapeHtml(r.maleEntry) : "—"}</td>
                      <td style="padding:6px 10px;color:var(--muted);">${r.femaleEntry ? "✓ " + escapeHtml(r.femaleEntry) : "—"}</td>
                    </tr>`).join("")}
                </tbody>
              </table>
            </div>
          </div>` : "";

        return `
          <div style="padding:14px 16px;max-width:480px;margin:0 auto;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
              <button class="btn-back" data-action="cr-back-select">← Назад</button>
              <h2 style="font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;letter-spacing:.06em;margin:0;">${typeIcon} ${typeLabel}</h2>
            </div>

            <!-- Date card -->
            <div style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;">
              <div style="font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;">Следващо почистване</div>
              <div style="font-size:20px;font-weight:700;font-family:'Oswald',sans-serif;letter-spacing:.04em;margin-bottom:8px;">${escapeHtml(dateStr)}</div>
              ${statusPill}
            </div>

            <!-- Action area -->
            ${actionArea}

            ${scheduleSection}
          </div>`;
      }

      /* ════════════════════════════════════════════════════════ */

      function render() {
        const content =
          state.screen === "home" ? renderHome() :
          state.screen === "select-hall" ? renderHallSelect() :
          state.screen === "locking" ? renderLocking() :
          state.screen === "inspection" ? renderInspection() :
          state.screen === "history" ? renderHistory() :
          state.screen === "charts" ? renderCharts() :
          state.screen === "select-cr" ? renderChangingRoomSelect() :
          state.screen === "cr-detail" ? renderChangingRoomDetail() :
          renderHome();
        app.innerHTML = renderShell(content);
        updateModals();
        bindInputs();
        decorateHallSelectionIcons();
        /* Charts: HTML визуализации (без Chart.js) — синхронно от кеш */
        if (state.screen === "charts" && _cachedChartRows && _cachedChartRows.length > 0) {
          const c = document.getElementById('charts-container');
          if (c) buildChartsFromData(c, _cachedChartRows);
        }
        applyPerfMode();
        if (state.screen === "home" && typeof cgUpdateReviews === 'function') cgUpdateReviews();
        initSearchBar();
      }

      /* ── Search Bar ── */
      const SEARCH_ITEMS = [
        { icon: "🎬", label: "Проверка на зали", sub: "Кинозала — Зали 1–6", action: "start-inspection", type: "hall" },
        { icon: "🚿", label: "Проверка на тоалетни", sub: "Санитарен Възел — WC", action: "start-inspection", type: "bathroom" },
        { icon: "👗", label: "Почистване на съблекалня", sub: "Мъжка / Женска съблекалня", action: "start-changing-room" },
        { icon: "📊", label: "Данни и статистики", sub: "Графики от Sheets", action: "go-charts" },
        { icon: "🏠", label: "Начало", sub: "Главен екран", action: "go-home" },
        { icon: "🔗", label: "QR кодове", sub: "Генерирай и принтирай QR", action: "open-qr" },
      ];

      let _searchBarInited = false;
      function initSearchBar() {
        const openBtn = document.getElementById("search-open-btn");
        const fieldWrap = document.getElementById("search-field-wrap");
        const input = document.getElementById("search-input");
        const clearBtn = document.getElementById("search-clear");
        const dropdown = document.getElementById("search-dropdown");
        if (!openBtn || !fieldWrap || !input || !clearBtn || !dropdown) return;

        let focusedIdx = -1;

        function openSearch() {
          fieldWrap.classList.add("open");
          openBtn.style.display = "none";
          input.focus();
          showResults(input.value);
        }

        function closeSearch() {
          fieldWrap.classList.remove("open");
          openBtn.style.display = "";
          input.value = "";
          dropdown.style.display = "none";
          focusedIdx = -1;
        }

        function showResults(q) {
          const query = q.trim().toLowerCase();
          const items = query
            ? SEARCH_ITEMS.filter(i =>
                i.label.toLowerCase().includes(query) ||
                (i.sub && i.sub.toLowerCase().includes(query))
              )
            : SEARCH_ITEMS;
          focusedIdx = -1;
          if (items.length === 0) {
            dropdown.innerHTML = `<div class="search-no-results">Няма намерени резултати</div>`;
          } else {
            dropdown.innerHTML = items.map((item, idx) => `
              <div class="search-item" data-idx="${idx}" data-search-action="${item.action}" ${item.type ? `data-search-type="${item.type}"` : ""} role="option" tabindex="-1">
                <span class="search-item-icon">${item.icon}</span>
                <div>
                  <div class="search-item-label">${item.label}</div>
                  <div class="search-item-sub">${item.sub || ""}</div>
                </div>
                <span class="search-item-arrow">›</span>
              </div>`).join("");
            dropdown.querySelectorAll(".search-item").forEach(el => {
              el.addEventListener("mousedown", (e) => {
                e.preventDefault();
                triggerSearchAction(el.dataset.searchAction, el.dataset.searchType);
              });
            });
          }
          dropdown.style.display = "block";
        }

        function dispatchAction(action, type) {
          /* Create a fake element and dispatch a real click so the global listener handles it */
          const fake = document.createElement("button");
          fake.dataset.action = action;
          if (type) fake.dataset.type = type;
          fake.style.display = "none";
          document.body.appendChild(fake);
          fake.click();
          document.body.removeChild(fake);
        }

        function triggerSearchAction(action, type) {
          closeSearch();
          dispatchAction(action, type || "");
        }

        function moveFocus(dir) {
          const items = dropdown.querySelectorAll(".search-item");
          if (!items.length) return;
          items[focusedIdx]?.classList.remove("focused");
          focusedIdx = (focusedIdx + dir + items.length) % items.length;
          items[focusedIdx]?.classList.add("focused");
          items[focusedIdx]?.scrollIntoView({ block: "nearest" });
        }

        openBtn.addEventListener("click", openSearch);
        clearBtn.addEventListener("click", closeSearch);
        input.addEventListener("input", () => showResults(input.value));
        input.addEventListener("keydown", (e) => {
          if (e.key === "ArrowDown") { e.preventDefault(); moveFocus(1); }
          else if (e.key === "ArrowUp") { e.preventDefault(); moveFocus(-1); }
          else if (e.key === "Enter") {
            e.preventDefault();
            const focused = dropdown.querySelector(".search-item.focused");
            const target = focused || dropdown.querySelector(".search-item");
            if (target) triggerSearchAction(target.dataset.searchAction, target.dataset.searchType);
          }
          else if (e.key === "Escape") closeSearch();
        });

        if (!_searchBarInited) {
          _searchBarInited = true;
          document.addEventListener("mousedown", (e) => {
            if (!document.getElementById("search-wrap")?.contains(e.target)) {
              const iw = document.getElementById("search-field-wrap");
              if (iw && iw.classList.contains("open")) {
                iw.classList.remove("open");
                document.getElementById("search-open-btn").style.display = "";
                document.getElementById("search-input").value = "";
                document.getElementById("search-dropdown").style.display = "none";
              }
            }
          });
        }
      }

      function bindInputs() {
        const el = (id) => document.getElementById(id);
        const bind = (id, event, fn) => { const e = el(id); if (e) e["on" + event] = fn; };
        bind("location-select", "change", async (e) => {
          const newLoc = e.target.value;
          const oldLoc = state.location;
          if (newLoc === oldLoc) return;
          if (_lockBusy) { e.target.value = oldLoc; return; }
          if (!isQROnlySession()) {
            const oldSid = state.currentSessionId;
            const sessionId = generateSessionId();
            const lockResult = await acquireLock(state.inspectionType, newLoc, sessionId);
            if (!lockResult.success) {
              const locName = escapeHtml(newLoc);
              const msg = lockResult.minutesLeft
                ? locName + " се проверява в момента. Опитайте след ~" + lockResult.minutesLeft + " мин."
                : locName + " се проверява. Изберете друга локация.";
              showToast(msg, "error");
              e.target.value = oldLoc;
              return;
            }
            if (oldSid) await releaseLock(oldSid);
            state.currentSessionId = sessionId;
            _lockAcquiredAt = Date.now();
            sessionStorage.setItem(LOCK_SESSION_KEY, sessionId);
          }
          state.location = newLoc;
        });
        bind("inspector-input", "input", (e) => { const filtered = e.target.value.replace(/[^\u0400-\u04FF ]/g, ""); e.target.value = filtered; state.inspector = filtered; });
        bind("notes-input", "input", (e) => { state.notes = e.target.value; render(); });
        bind("photo-input", "change", (e) => { handlePhotoSelect(e); });
        bind("photo-comment-input", "input", (e) => { state.notes = e.target.value; render(); });
        bind("delete-pass-input", "input", (e) => { state.deletePass = e.target.value; state.deleteErr = ""; });
        bind("export-range-select", "change", (e) => { state.exportRange = e.target.value; render(); });
        bind("history-type-filter", "change", (e) => { state.historyTypeFilter = e.target.value; render(); });
        bind("history-location-filter", "change", (e) => { state.historyLocationFilter = e.target.value; render(); });
        bind("cr-name-input", "input", (e) => {
          const filtered = e.target.value.replace(/[^\u0400-\u04FF ]/g, "");
          e.target.value = filtered;
          state.crName = filtered;
          state.crNameErr = "";
        });
      }

      /* ── Close ann modal on outside click ── */
      document.addEventListener("click", (e) => {
        const modal = document.getElementById('cg-ann-modal');
        if (!modal || modal.hidden) return;
        if (!e.target.closest('#cg-ann-modal-box')) cgAnnClose();
      });

      /* ── Event Delegation ── */
      document.addEventListener("click", async (e) => {
        const btn = e.target.closest("[data-action]");
        if (!btn) return;
        const action = btn.dataset.action;

        /* Navigation — blocked during locking animation */
        if (state.screen === "locking") return;

        /* Navigation — blocked for QR-only sessions */
        if (isQROnlySession() && (action === "go-home" || action === "go-history" || action === "open-qr" || action === "start-inspection")) return;
        /* ── Announcement actions ── */
        if (action === "announce-add")    { cgAnnShow('add-pass');    return; }
        if (action === "announce-edit")   { cgAnnShow('edit-pass');   return; }
        if (action === "announce-delete") { cgAnnShow('delete-pass'); return; }
        if (action === "ann-modal-close") { cgAnnClose(); return; }
        if (action === "ann-pass-submit") { _cgAnnPassSubmit(); return; }
        if (action === "ann-save")        { _cgAnnSave(); return; }

        if (action === "toggle-perf") {
          const next = localStorage.getItem(PERF_KEY) === "1" ? "0" : "1";
          localStorage.setItem(PERF_KEY, next);
          applyPerfMode();
          return;
        }

        /* ── Day filter actions ── */
        if (action === "day-filter-today") {
          document.querySelectorAll('.day-filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const todayKey = fmtChartDate(new Date());
          cgRenderDayChart([todayKey]);
          return;
        }
        if (action === "day-filter-7d") {
          document.querySelectorAll('.day-filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          cgRenderDayChart((window._cgAllDayKeys || []).slice(-7));
          return;
        }
        if (action === "day-cal-open") {
          const popup = document.getElementById('day-cal-popup');
          if (popup && popup.classList.contains('open')) { _calClose(); } else { _calOpen(); }
          return;
        }
        if (action === "day-cal-prev") {
          _cal.month--;
          if (_cal.month < 0) { _cal.month = 11; _cal.year--; }
          _calRender(); return;
        }
        if (action === "day-cal-next") {
          _cal.month++;
          if (_cal.month > 11) { _cal.month = 0; _cal.year++; }
          _calRender(); return;
        }
        if (action === "day-cal-pick") {
          const dateStr = btn.dataset.date;
          if (!dateStr) return;
          const picked = new Date(dateStr); picked.setHours(0,0,0,0);
          if (_cal.step === 0) {
            _cal.rangeStart = picked; _cal.rangeEnd = null; _cal.step = 1;
          } else {
            if (picked < _cal.rangeStart) { _cal.rangeEnd = _cal.rangeStart; _cal.rangeStart = picked; }
            else _cal.rangeEnd = picked;
            _cal.step = 0;
          }
          _calRender(); return;
        }
        if (action === "day-cal-clear") {
          _cal.rangeStart = null; _cal.rangeEnd = null; _cal.step = 0;
          _calRender(); return;
        }
        if (action === "day-cal-apply") {
          if (!_cal.rangeStart) { _calClose(); return; }
          const end = _cal.rangeEnd || _cal.rangeStart;
          const keys = [];
          for (let d = new Date(_cal.rangeStart); d <= end && keys.length < 7; d.setDate(d.getDate() + 1)) {
            keys.push(fmtChartDate(new Date(d)));
          }
          document.querySelectorAll('.day-filter-btn').forEach(b => b.classList.remove('active'));
          cgRenderDayChart(keys);
          _calClose();
          return;
        }

        /* ── Changing Room module ── */
        if (action === "start-changing-room") {
          state.screen = "select-cr";
          state.crType = null;
          state.crData = null;
          state.crError = null;
          state.crStep = "idle";
          state.crName = "";
          state.crNameErr = "";
          render();
          return;
        }
        if (action === "select-cr-type") {
          state.crType = btn.dataset.crtype; /* "male" | "female" */
          state.crStep = "idle";
          state.crName = "";
          state.crNameErr = "";
          state.screen = "cr-detail";
          fetchChangingRoomData(); /* async — will re-render when done */
          return;
        }
        if (action === "cr-back-select") {
          state.screen = "select-cr";
          state.crData = null;
          state.crError = null;
          state.crStep = "idle";
          render();
          return;
        }
        if (action === "cr-reload") {
          fetchChangingRoomData();
          return;
        }
        if (action === "cr-start") {
          state.crStep = "started";
          state.crName = "";
          state.crNameErr = "";
          render();
          /* Auto-focus the name input */
          setTimeout(() => { const el = document.getElementById("cr-name-input"); if (el) el.focus(); }, 50);
          return;
        }
        if (action === "cr-submit") {
          /* Read the live input value before submitting */
          const inp = document.getElementById("cr-name-input");
          if (inp) state.crName = inp.value;
          submitChangingRoom();
          return;
        }

        if (action === "go-home") { cleanupSessionLock(); state.screen = "home"; render(); return; }
        if (action === "go-history") { state.screen = "history"; render(); return; }
        if (action === "go-charts") {
          if (Date.now() < chartsCooldownUntil) {
            showToast("Моля да не спамиш. След няколко секунди опитай пак.", "error");
            return;
          }
          chartsCooldownUntil = Date.now() + CHARTS_COOLDOWN_SEC * 1000;
          if (!chartsCooldownInterval) {
            chartsCooldownInterval = setInterval(() => {
              if (Date.now() >= chartsCooldownUntil) {
                chartsCooldownUntil = 0;
                clearInterval(chartsCooldownInterval);
                chartsCooldownInterval = null;
              }
              /* Само обновяваме текста на бутона — НИКОГА не render(), за да не мига QR модал и останалите прозорци */
              const btn = document.querySelector('[data-action="go-charts"]');
              if (btn) {
                const inCooldown = chartsCooldownUntil > Date.now();
                btn.innerHTML = inCooldown ? "&#128202; Данни (" + Math.ceil((chartsCooldownUntil - Date.now()) / 1000) + ")" : "&#128202; Данни";
                btn.classList.toggle('cooldown', inCooldown);
                btn.disabled = inCooldown;
              }
            }, 1000);
          }
          cleanupSessionLock();
          if (state.screen === "charts") {
            /* Вече сме на Данни — не презареждаме, данните остават; само обновяваме бутона */
            const btn = document.querySelector('[data-action="go-charts"]');
            if (btn) { btn.classList.add('cooldown'); btn.disabled = true; btn.innerHTML = "&#128202; Данни (" + CHARTS_COOLDOWN_SEC + ")"; }
            return;
          }
          state.screen = "charts"; render();
          return;
        }

        /* Inspection item status — targeted update, no full re-render */
        if (action === "set-item") {
          state.itemState[btn.dataset.id] = btn.dataset.value;
          updateItemRow(btn.dataset.id);
          return;
        }

        /* Fill all items */
        if (action === "fill-all") {
          getConfig(state.inspectionType).items.forEach((i) => { state.itemState[i.id] = btn.dataset.value; });
          render(); return;
        }

        if (action === "submit-inspection") { await submitInspection(); return; }
        if (action === "start-inspection") {
          state.screen = "select-hall";
          state.inspectionType = btn.dataset.type;
          render();
          return;
        }
        if (action === "select-hall-location") {
          lockAndStart(state.inspectionType, btn.dataset.location);
          return;
        }

        /* Sync */
        if (action === "retry-sync") {
          const rec = state.records.find((r) => String(r.id) === btn.dataset.id);
          if (rec) await syncRecord(rec);
          return;
        }

        /* Delete modal */
        if (action === "close-delete") {
          if (_modalTrapHandler) { document.removeEventListener("keydown", _modalTrapHandler); _modalTrapHandler = null; }
          state.showDeleteModal = false; state.deleteErr = ""; state.deletePass = ""; render(); return;
        }
        if (action === "toggle-pass" || action === "confirm-delete") { return; }

        /* Export */
        if (action === "export-pdf") { exportPdf(); return; }

        /* QR modal — само updateModals(), не презареждаме съдържанието, данните остават */
        if (action === "open-qr") { state.showQRModal = true; updateModals(); return; }
        if (action === "close-qr") { state.showQRModal = false; updateModals(); return; }
      });

      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        if (state.showDeleteModal) {
          state.showDeleteModal = false; state.deleteErr = ""; state.deletePass = "";
          render();
        } else if (state.showQRModal) {
          state.showQRModal = false;
          updateModals();
        }
      });

      /* ── Prevent closing the page + release lock if they force-close ── */
      function _releaseLockOnExit() {
        const sid = state.currentSessionId || sessionStorage.getItem(LOCK_SESSION_KEY);
        if (sid) releaseLockBeacon(sid);
      }
      window.addEventListener("beforeunload", (e) => {
        e.preventDefault();
        e.returnValue = "";
      });
      window.addEventListener("pagehide", (e) => { if (!e.persisted) _releaseLockOnExit(); });

      /* ── Kick user out if they leave/minimize during inspection (mobile only) ── */
      const _isMobileDevice = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
        || ("ontouchstart" in window && navigator.maxTouchPoints > 1 && window.innerWidth <= 1024);
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState !== "hidden") return;
        if (state.screen !== "inspection") return;
        if (!_isMobileDevice) return;
        const sid = state.currentSessionId || sessionStorage.getItem(LOCK_SESSION_KEY);
        if (sid) releaseLockBeacon(sid);
        state.currentSessionId = null;
        _lockAcquiredAt = 0;
        sessionStorage.removeItem(LOCK_SESSION_KEY);
        sessionStorage.removeItem(QR_SESSION_KEY);
        sessionStorage.removeItem(QR_MODE_KEY);
        sessionStorage.removeItem(QR_TYPE_KEY);
        sessionStorage.removeItem(QR_LOC_KEY);
        window.location.replace("https://google.com");
      });

      /* ── Initial Render ── */
      cleanupOldRecords();
      if (getAccessBlock()) { showAccessBlocked(); } else {
      showAccessLoading();
      checkAccess().then(async (allowed) => {
        if (allowed === "outside") { recordFailedAttempt(); showOutsideCinema(); return; }
        if (!allowed) { const blocked = recordFailedAttempt(); if (blocked) { showAccessBlocked(); return; } showAccessDenied(); return; }
        /* Preload charts data — единствено при зареждане на страницата (F5). Бутонът Данни само показва кеша. */
        fetchSheetsData().then(r => {
          _cachedChartRows = r;
          if (state.screen === "charts") {
            const c = document.getElementById('charts-container');
            if (c && r && r.length) buildChartsFromData(c, r);
          }
        }).catch(() => {});
        /* Обработи URL параметри от QR сканиране */
        const search = window.location.search || "";
        const hash = window.location.hash || "";
        const params = new URLSearchParams(search || (hash.startsWith("#") ? hash.slice(1) : ""));
        if (params.get("open") === "inspection") {
          const type = params.get("type");
          const loc = params.get("location");
          if ((type === "hall" || type === "bathroom") && loc) {
            const decodedLoc = decodeURIComponent(loc.replace(/\+/g, "%20"));
            const config = getConfig(type);
            const resolvedLoc = config.locations.includes(decodedLoc) ? decodedLoc : config.locations[0];
            /* Acquire location lock before showing the form */
            updateLoadingText("Заключване на локация…");
            const sessionId = generateSessionId();
            const lockResult = await acquireLock(type, resolvedLoc, sessionId);
            if (!lockResult.success) {
              showLocationLocked(resolvedLoc, lockResult.error);
              return;
            }
            state.currentSessionId = sessionId;
            _lockAcquiredAt = Date.now();
            sessionStorage.setItem(LOCK_SESSION_KEY, sessionId);
            state.openedFromQR = true;
            Object.assign(state, { inspectionType: type, location: resolvedLoc, inspector: "", itemState: {}, notes: "", showValidation: false, screen: "inspection" });
            try { history.replaceState({}, "", window.location.origin + window.location.pathname); } catch (_) {}
          }
        } else if (sessionStorage.getItem(QR_MODE_KEY) === "1") {
          /* QR сесия след reload (pull-to-refresh) — винаги re-acquire lock */
          const savedType = sessionStorage.getItem(QR_TYPE_KEY) || "hall";
          const savedLoc  = sessionStorage.getItem(QR_LOC_KEY)  || "";
          const config = getConfig(savedType);
          const decodedLoc = decodeURIComponent(savedLoc.replace(/\+/g, "%20"));
          const resolvedLoc = config.locations.includes(decodedLoc) ? decodedLoc : config.locations[0];
          const sessionId = generateSessionId();
          const lockResult = await acquireLock(savedType, resolvedLoc, sessionId);
          if (!lockResult.success) {
            showLocationLocked(resolvedLoc, lockResult.error);
            return;
          }
          state.currentSessionId = sessionId;
          _lockAcquiredAt = Date.now();
          sessionStorage.setItem(LOCK_SESSION_KEY, sessionId);
          state.openedFromQR = true;
          Object.assign(state, { inspectionType: savedType, location: resolvedLoc, inspector: "", itemState: {}, notes: "", showValidation: false, screen: "inspection" });
        }
        render();
        /* Периодична проверка за изтекла QR сесия (всяка минута) */
        setInterval(function() {
          if (sessionStorage.getItem(QR_MODE_KEY) !== "1") return;
          const sessionTs = parseInt(sessionStorage.getItem(QR_SESSION_KEY) || "0", 10);
          if (!sessionTs || Date.now() - sessionTs >= QR_SESSION_TTL_MS) {
            const sid = state.currentSessionId || sessionStorage.getItem(LOCK_SESSION_KEY);
            if (sid) releaseLockBeacon(sid);
            state.currentSessionId = null;
            sessionStorage.removeItem(LOCK_SESSION_KEY);
            sessionStorage.removeItem(QR_SESSION_KEY);
            sessionStorage.removeItem(QR_MODE_KEY);
            sessionStorage.removeItem(QR_TYPE_KEY);
            sessionStorage.removeItem(QR_LOC_KEY);
            window.location.replace(QR_REDIRECT_URL);
          }
        }, 60 * 1000);
        /* Проверка за изтичане на lock (всяка минута) */
        setInterval(function() {
          if (!_lockAcquiredAt || state.screen !== "inspection") return;
          const elapsed = Date.now() - _lockAcquiredAt;
          const remaining = LOCK_TIMEOUT_MS - elapsed;
          if (remaining <= 0) {
            showToast("Времето за проверка изтече. Моля сканирайте QR кода отново.", "error");
            state.currentSessionId = null;
            _lockAcquiredAt = 0;
            sessionStorage.removeItem(LOCK_SESSION_KEY);
            if (isQROnlySession()) {
              setTimeout(() => window.location.replace(QR_REDIRECT_URL), 2000);
            } else {
              state.screen = "home"; render();
            }
          } else if (remaining <= 120000 && remaining > 60000) {
            showToast("Остават по-малко от 2 мин за тази проверка.", "error");
          }
        }, 60 * 1000);
        /* Периодична проверка на геолокация за QR сесии (всеки 5 минути) */
        /* Whitelisted IP-та се пропускат — могат да работят отвсякъде */
        setInterval(async function() {
          if (sessionStorage.getItem(QR_MODE_KEY) !== "1") return;
          if (sessionStorage.getItem(LOCK_WHITELISTED_KEY) === "1") return;
          const pos = await getGeolocation();
          if (!pos || !isNearCinema(pos.lat, pos.lng)) {
            const sid = state.currentSessionId || sessionStorage.getItem(LOCK_SESSION_KEY);
            if (sid) releaseLockBeacon(sid);
            state.currentSessionId = null;
            sessionStorage.removeItem(LOCK_SESSION_KEY);
            sessionStorage.removeItem(QR_SESSION_KEY);
            sessionStorage.removeItem(QR_MODE_KEY);
            sessionStorage.removeItem(QR_TYPE_KEY);
            sessionStorage.removeItem(QR_LOC_KEY);
            window.location.replace(QR_REDIRECT_URL);
          }
        }, GEO_RECHECK_MS);
      });
      } /* end getAccessBlock check */

    </script>

    <!-- Google Reviews (Places API New — REST) -->
    <script>
      (function() {
        var API_KEY  = 'AIzaSyAHkDc75iMBlaL-yahzQxzg1xgKhIBItbs';
        var PLACE_ID = 'ChIJSwfBtwaFqkARCbgjdIFdbVY';
        var MAPS_URL = 'https://www.google.com/maps/place/?q=place_id:' + PLACE_ID;
        var LS_KEY   = 'cg_reviews_v3';
        var _memCache = null;
        var _loading  = false;

        /* ── Sofia timezone helpers ── */
        function toSofiaDate(ms) {
          return new Date(new Date(ms).toLocaleString('en-US', { timeZone: 'Europe/Sofia' }));
        }
        function lastRefreshPointBefore(nowMs) {
          var s    = toSofiaDate(nowMs);
          var h    = s.getHours();
          var base = new Date(s); base.setHours(0, 0, 0, 0);
          var r;
          if (h >= 18)      { r = new Date(base); r.setHours(18); }
          else if (h >= 12) { r = new Date(base); r.setHours(12); }
          else              { r = new Date(base); r.setDate(r.getDate() - 1); r.setHours(18); }
          var shift = toSofiaDate(nowMs).getTime() - nowMs;
          return r.getTime() - shift;
        }
        function isCacheValid(entry) {
          if (!entry || !entry.cachedAt || !entry.place) return false;
          return entry.cachedAt >= lastRefreshPointBefore(Date.now());
        }

        /* ── localStorage ── */
        function lsLoad() {
          try { return JSON.parse(localStorage.getItem(LS_KEY)); } catch(e) { return null; }
        }
        function lsSave(place) {
          try { localStorage.setItem(LS_KEY, JSON.stringify({ place: place, cachedAt: Date.now() })); } catch(e) {}
        }

        /* ── Rendering ── */
        function stars(n) { n = Math.round(n); return '★'.repeat(n) + '☆'.repeat(5 - n); }
        function initials(name) {
          if (!name) return '?';
          var p = name.trim().split(/\s+/);
          return p.length === 1 ? p[0][0].toUpperCase() : (p[0][0] + p[p.length-1][0]).toUpperCase();
        }
        function esc(s) { return (s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        function buildHtml(place) {
          /* New API fields: publishTime (ISO), authorAttribution.displayName, text.text */
          var reviews = (place.reviews || [])
            .slice()
            .sort(function(a, b) {
              return new Date(b.publishTime).getTime() - new Date(a.publishTime).getTime();
            })
            .slice(0, 5);

          var overallHtml = place.rating
            ? '<div class="cg-overall">'
              + '<div class="cg-overall-num">' + (+place.rating).toFixed(1) + '</div>'
              + '<div><div class="cg-overall-stars">' + stars(place.rating) + '</div>'
              + (place.userRatingCount ? '<div class="cg-overall-count">' + place.userRatingCount + ' ревюта в Google</div>' : '')
              + '</div></div>'
            : '';

          var cardsHtml = reviews.map(function(r, i) {
            var name  = esc(r.authorAttribution && r.authorAttribution.displayName || '');
            var text  = esc(r.text && r.text.text || '');
            var date  = r.relativePublishTimeDescription || '';
            var delay = ((i + 1) * 0.1).toFixed(1) + 's';
            return '<div class="cg-review-card" style="animation-delay:' + delay + '">'
              + '<div class="cg-quote-deco">\u201c</div>'
              + '<div class="cg-review-header">'
              + '<div class="cg-avatar">' + initials(name) + '</div>'
              + '<div><div class="cg-author">' + name + '</div>'
              + '<div class="cg-date">' + date + '</div></div></div>'
              + '<div class="cg-review-stars">' + stars(r.rating) + '</div>'
              + (text ? '<div class="cg-review-text">' + text + '</div>' : '')
              + '</div>';
          }).join('');

          return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">'
            + '<div class="cg-reviews-kicker" style="margin-bottom:0;">GOOGLE REVIEWS</div>'
            + '<button onclick="cgManualRefresh()" title="Ръчно обновяване" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 4px;line-height:1;opacity:.6;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.6">&#x21BB;</button>'
            + '</div>'
            + '<div class="cg-reviews-heading">Какво казват нашите гости</div>'
            + overallHtml
            + '<div class="cg-reviews-grid">' + cardsHtml + '</div>'
            + '<a class="cg-reviews-link" href="' + MAPS_URL + '" target="_blank" rel="noopener">Виж всички ревюта в Google \u2197</a>';
        }

        function inject(html) {
          var el = document.getElementById('cg-reviews-section');
          if (el) el.innerHTML = html;
        }

        /* ── Fetch from new Places REST API ── */
        function fetchAndRender() {
          if (_loading) return;
          _loading = true;
          fetch('https://places.googleapis.com/v1/places/' + PLACE_ID + '?languageCode=bg', {
            headers: {
              'X-Goog-Api-Key': API_KEY,
              'X-Goog-FieldMask': 'rating,userRatingCount,reviews'
            }
          })
          .then(function(res) { return res.json(); })
          .then(function(data) {
            _loading = false;
            lsSave(data);
            _memCache = buildHtml(data);
            inject(_memCache);
          })
          .catch(function() {
            _loading = false;
            inject('<div style="color:var(--muted);font-size:13px;padding:8px 0;">Ревютата не могат да бъдат заредени в момента.</div>');
          });
        }

        /* Called by render() every time home screen is shown */
        window.cgUpdateReviews = function() {
          if (_memCache) { inject(_memCache); return; }
          var entry = lsLoad();
          if (isCacheValid(entry)) {
            _memCache = buildHtml(entry.place);
            inject(_memCache);
            return;
          }
          fetchAndRender();
        };

        /* Manual refresh button — asks for password first */
        window.cgManualRefresh = function() {
          var pass = prompt('Въведете парола за ръчно обновяване:');
          if (pass === null) return; // cancelled
          if (pass !== '1232911041644') {
            alert('Грешна парола.');
            return;
          }
          _memCache = null;
          inject('<div class="cg-reviews-loading"><div class="cg-bounce-dots sm"><span></span><span></span><span></span></div><span>Обновяване...</span></div>');
          fetchAndRender();
        };
      })();
    </script>

    <!-- Announcement modal (managed by cgAnnRender) -->
    <div id="cg-ann-modal" class="cg-ann-overlay" hidden aria-modal="true" role="dialog"></div>

  </body>

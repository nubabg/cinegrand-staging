<!DOCTYPE html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Grand Hygiene Control</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.svg" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap");

      :root {
        --bg: #06080c;
        --bg-2: #0b1016;
        --panel: #121821;
        --panel-2: #18212c;
        --panel-3: #0f141b;
        --border: #263140;
        --gold: #c87818;
        --gold-2: #eba030;
        --text: #f5f7fb;
        --muted: #9ba8b9;
        --muted-2: #6d7a8c;
        --green: #2dcc70;
        --green-dark: #16784a;
        --red: #ef5b5b;
        --red-dark: #862a2a;
        --blue: #62a9ff;
        --shadow: 0 16px 40px rgba(0,0,0,.32);
      }
      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        overscroll-behavior: none;
        -webkit-user-select: none; user-select: none;
        -webkit-touch-callout: none;
        background:
          radial-gradient(circle at top left, rgba(200,120,24,.14), transparent 24%),
          radial-gradient(circle at top right, rgba(98,169,255,.10), transparent 20%),
          linear-gradient(180deg, var(--bg) 0%, #05070a 100%);
        color: var(--text);
        font-family: "DM Sans", "Segoe UI", sans-serif;
      }

      button, input, select, textarea { font: inherit; }
      input, textarea { -webkit-user-select: text; user-select: text; }

      #app { position: relative; z-index: 1; }
      #modals { position: relative; z-index: 100; }
      .app-shell { min-height: 100vh; padding: 24px; }
      .workspace { width: min(1280px, 100%); margin: 0 auto; }

      .product-strip {
        position: relative;
        display: flex; align-items: center; justify-content: center;
        gap: 16px; margin-bottom: 14px; color: var(--muted);
        min-height: 48px;
      }
      .product-strip-left {
        display: flex; align-items: center; gap: 12px;
        margin: 0 auto;
      }
      .product-strip-status {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
      }

      .brand-badge {
        width: 42px; height: 42px; border-radius: 14px;
        display: inline-flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, var(--gold), var(--gold-2));
        color: #15110b; font-family: "Oswald", sans-serif;
        font-size: 22px; font-weight: 700; letter-spacing: .08em;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.45);
      }

      .brand-meta strong {
        display: block; color: var(--text); font-family: "Oswald", sans-serif;
        font-size: 18px; letter-spacing: .08em; text-transform: uppercase;
      }
      .brand-meta span { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }

      .topbar-shell { position: sticky; top: 16px; z-index: 20; margin-bottom: 18px; }
      .topbar {
        display: flex; justify-content: space-between; align-items: center;
        gap: 16px; padding: 16px 18px;
        border: 1px solid rgba(200,120,24,.18); border-radius: 20px;
        background: linear-gradient(180deg, rgba(19,24,33,.96) 0%, rgba(10,14,20,.96) 100%);
        box-shadow: var(--shadow); backdrop-filter: blur(14px);
      }
      .topbar-nav { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .topbar-meta { display: flex; gap: 10px; align-items: center; color: var(--muted); white-space: nowrap; }

      /* === SEARCH BAR === */
      .search-wrap { position: relative; display: flex; align-items: center; }
      .search-btn-icon {
        display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; border-radius: 50%;
        border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.04);
        color: var(--muted); cursor: pointer; transition: background .2s, color .2s, transform .15s;
        flex-shrink: 0;
      }
      .search-btn-icon:hover { background: rgba(255,255,255,.08); color: var(--text); transform: translateY(-1px); }
      .search-btn-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      /* Expanded search — fixed, centered at the top */
      .search-field-wrap {
        position: fixed;
        top: 74px;
        left: 50%; transform: translateX(-50%);
        width: min(520px, calc(100vw - 40px));
        z-index: 300;
        display: none;
      }
      .search-field-wrap.open { display: block; }
      .search-field-inner {
        display: flex; align-items: center; gap: 8px;
        border: 1px solid rgba(200,120,24,.3); border-radius: 999px;
        background: linear-gradient(180deg, rgba(22,28,38,.98) 0%, rgba(12,16,22,.98) 100%);
        backdrop-filter: blur(20px);
        box-shadow: 0 8px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(200,120,24,.08);
      }
      .search-icon-inner { margin-left: 14px; color: var(--muted); flex-shrink: 0; }
      .search-icon-inner svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .search-input {
        flex: 1; background: transparent; border: none; outline: none;
        color: var(--text); font-size: 14px; height: 44px;
        caret-color: var(--gold);
      }
      .search-input::placeholder { color: var(--muted); }
      .search-clear {
        display: flex; align-items: center; justify-content: center;
        width: 30px; height: 30px; border-radius: 50%; margin-right: 6px;
        border: none; background: transparent; cursor: pointer; color: var(--muted);
        transition: background .15s, color .15s, transform .15s;
        flex-shrink: 0;
      }
      .search-clear:hover { background: rgba(255,255,255,.08); color: var(--text); transform: scale(1.1); }
      .search-clear svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .search-dropdown {
        position: absolute; top: calc(100% + 8px); left: 0; right: 0;
        background: linear-gradient(180deg, rgba(19,24,33,.99) 0%, rgba(10,14,20,.99) 100%);
        border: 1px solid rgba(200,120,24,.2); border-radius: 16px;
        box-shadow: 0 12px 40px rgba(0,0,0,.6); overflow: hidden;
        z-index: 301;
      }
      .search-item {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 16px; cursor: pointer;
        transition: background .15s; border-bottom: 1px solid rgba(255,255,255,.04);
      }
      .search-item:last-child { border-bottom: none; }
      .search-item:hover, .search-item.focused { background: rgba(200,120,24,.1); }
      .search-item-icon { font-size: 20px; flex-shrink: 0; width: 32px; text-align: center; }
      .search-item-label { font-size: 14px; font-weight: 600; color: var(--text); }
      .search-item-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
      .search-item-arrow { margin-left: auto; color: var(--muted); font-size: 16px; }
      .search-no-results { padding: 16px; text-align: center; color: var(--muted); font-size: 13px; }

      .meta-chip {
        padding: 8px 12px; border-radius: 999px;
        background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06);
        font-size: 12px;
      }

      /* === BUTTON SYSTEM — INTERACTIVE 2026 === */
      .btn {
        border: 1px solid transparent; border-radius: 20px;
        padding: 11px 18px; cursor: pointer;
        position: relative; overflow: hidden; isolation: isolate;
        font-weight: 600; font-size: 14px; letter-spacing: .02em;
        transition: transform .24s cubic-bezier(.34,1.56,.64,1),
                    box-shadow .22s ease, border-color .22s ease, background .22s ease;
      }
      .btn::before {
        content: ""; position: absolute; inset: 0; border-radius: inherit;
        transform: scaleX(0); transform-origin: left;
        transition: transform .32s cubic-bezier(.34,1.2,.64,1);
        z-index: -1; pointer-events: none;
      }
      .btn:hover { transform: translateY(-2px) scale(1.02); }
      .btn:hover::before { transform: scaleX(1); }
      .btn:active { transform: scale(.96); transition-duration: .1s; }
      .nav-btn:hover, .status-btn:hover, .tab:hover { transform: translateY(-1px); }

      .btn-gold {
        background: linear-gradient(135deg, var(--gold), var(--gold-2));
        color: #15110b; font-weight: 700;
        border-color: rgba(0,0,0,.15);
        outline: 2px solid transparent; outline-offset: 2px;
        box-shadow: 0 4px 18px rgba(200,120,24,.24), inset 0 1px 0 rgba(255,255,255,.32);
      }
      .btn-gold::before { background: rgba(255,255,255,.16); }
      .btn-gold:hover {
        box-shadow: 0 8px 28px rgba(200,120,24,.46), 0 0 0 1px rgba(235,160,48,.38),
                    inset 0 1px 0 rgba(255,255,255,.32);
      }
      .btn-gold:focus-visible { outline-color: var(--gold-2); }
      .btn-outline {
        background: rgba(255,255,255,.04); color: var(--text);
        border-color: rgba(255,255,255,.12);
        box-shadow: 0 2px 8px rgba(0,0,0,.18);
      }
      .btn-outline::before { background: rgba(255,255,255,.05); }
      .btn-outline:hover { border-color: rgba(255,255,255,.26); box-shadow: 0 6px 20px rgba(0,0,0,.3); }
      .btn-outline:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
      .btn-green {
        background: rgba(45,204,112,.12); color: var(--green);
        border-color: rgba(45,204,112,.28);
        box-shadow: 0 2px 12px rgba(45,204,112,.12);
      }
      .btn-green::before { background: rgba(45,204,112,.1); }
      .btn-green:hover { box-shadow: 0 6px 22px rgba(45,204,112,.26); border-color: rgba(45,204,112,.5); }
      .btn-green:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }
      .btn-red {
        background: rgba(239,91,91,.12); color: var(--red);
        border-color: rgba(239,91,91,.28);
        box-shadow: 0 2px 12px rgba(239,91,91,.12);
      }
      .btn-red::before { background: rgba(239,91,91,.1); }
      .btn-red:hover { box-shadow: 0 6px 22px rgba(239,91,91,.26); border-color: rgba(239,91,91,.5); }
      .btn-red:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
      .btn-secondary {
        background: rgba(98,169,255,.1); color: var(--blue);
        border-color: rgba(98,169,255,.22);
        box-shadow: 0 2px 10px rgba(98,169,255,.1);
      }
      .btn-secondary::before { background: rgba(98,169,255,.08); }
      .btn-secondary:hover { box-shadow: 0 6px 20px rgba(98,169,255,.22); border-color: rgba(98,169,255,.44); }
      .nav-btn {
        background: transparent; border: 1px solid transparent;
        color: var(--muted); border-radius: 14px; padding: 10px 14px;
        font-family: "Oswald", sans-serif; font-size: 14px; font-weight: 500;
        text-transform: uppercase; letter-spacing: .04em; cursor: pointer;
        position: relative; overflow: visible; isolation: isolate;
        transition: color .2s ease, background .2s ease, border-color .2s ease,
                    box-shadow .2s ease, transform .22s cubic-bezier(.34,1.56,.64,1);
      }
      .nav-btn::before {
        content: ""; position: absolute; inset: 0; border-radius: inherit;
        background: rgba(200,120,24,.06); transform: scaleX(0); transform-origin: left;
        transition: transform .28s cubic-bezier(.34,1.2,.64,1);
        z-index: -1; pointer-events: none;
      }
      /* Tubelight lamp bar */
      .nav-btn::after {
        content: "";
        position: absolute; top: -2px; left: 50%;
        transform: translateX(-50%) scaleX(0);
        transform-origin: center;
        width: 30px; height: 3px;
        background: var(--gold);
        border-radius: 0 0 4px 4px;
        opacity: 0;
        transition: transform .32s cubic-bezier(.34,1.56,.64,1), opacity .2s ease;
        pointer-events: none; z-index: 2;
        box-shadow:
          0 0 6px 2px rgba(200,120,24,.75),
          0 4px 14px 5px rgba(200,120,24,.3),
          0 10px 28px 10px rgba(200,120,24,.12);
      }
      .nav-btn:hover { color: var(--text); background: rgba(255,255,255,.04); transform: translateY(-1px); }
      .nav-btn:hover::before { transform: scaleX(1); }
      .nav-btn:hover::after { transform: translateX(-50%) scaleX(.5); opacity: .35; }
      .nav-btn:active { transform: scale(.96); transition-duration: .08s; }
      .nav-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
      .nav-btn.state {
        color: var(--gold-2); border-color: rgba(200,120,24,.22);
        background: rgba(200,120,24,.08);
      }
      .nav-btn.state::before { transform: scaleX(1); }
      .nav-btn.state::after { transform: translateX(-50%) scaleX(1); opacity: 1; }
      .nav-btn.cooldown { opacity: 0.7; cursor: not-allowed; pointer-events: none; }

      .page { padding: 8px 0 24px; }
      .grid { display: grid; gap: 16px; }
      .cards-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .cards-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

      .panel {
        background: linear-gradient(180deg, rgba(24,33,44,.98) 0%, rgba(15,20,27,.98) 100%);
        border: 1px solid var(--border); border-radius: 20px;
        padding: 20px; box-shadow: var(--shadow);
      }
      .panel-soft {
        background:
          linear-gradient(135deg, rgba(200,120,24,.18), rgba(98,169,255,.08)),
          linear-gradient(180deg, rgba(24,33,44,.98), rgba(15,20,27,.98));
        border-color: rgba(200,120,24,.24);
      }

      .hero-title, .section-title {
        margin: 0 0 8px; font-family: "Oswald", sans-serif;
        letter-spacing: .04em; text-transform: uppercase;
      }
      .hero-title { font-size: 34px; }
      .section-title { font-size: 24px; }
      .muted { color: var(--muted); }
      .muted-2 { color: var(--muted-2); }

      .hero-grid {
        display: grid; grid-template-columns: minmax(0, 1.4fr) minmax(280px, .8fr);
        gap: 18px; align-items: stretch;
      }
      .hero-copy {
        display: flex; flex-direction: column;
        justify-content: space-between; min-height: 220px;
      }
      .hero-kicker {
        color: var(--gold-2); font-family: "Oswald", sans-serif;
        font-size: 13px; letter-spacing: .18em;
        text-transform: uppercase; margin-bottom: 10px;
      }
      .hero-orbit {
        border-radius: 18px; min-height: 220px;
        background:
          radial-gradient(circle at center, rgba(235,203,120,.20), transparent 36%),
          linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
        display: flex; align-items: center; justify-content: center;
        position: relative; overflow: hidden;
      }
      .hero-orbit::before, .hero-orbit::after {
        content: ""; position: absolute; border-radius: 50%;
        border: 1px solid rgba(200,120,24,.28);
      }
      .hero-orbit::before { width: 180px; height: 180px; }
      .hero-orbit::after { width: 240px; height: 240px; opacity: .55; }

      .hero-core {
        width: 108px; height: 108px; border-radius: 28px;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, var(--gold), var(--gold-2));
        color: #17120a; font-family: "Oswald", sans-serif;
        font-size: 46px; font-weight: 700;
        box-shadow: 0 18px 40px rgba(200,120,24,.18);
      }
      .hero-metrics {
        display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px; margin-top: 18px;
      }
      .metric {
        padding: 14px; border-radius: 16px;
        background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      }
      .metric-label {
        color: var(--muted); font-size: 11px;
        letter-spacing: .12em; text-transform: uppercase;
      }
      .metric-value { font-family: "Oswald", sans-serif; font-size: 26px; margin-top: 6px; }

      .stat {
        text-align: center;
        background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      }
      .stat strong {
        display: block; font-family: "Oswald", sans-serif;
        font-size: 36px; margin-top: 8px;
      }

      .card-pick { cursor: pointer; overflow: hidden; padding: 0; transition: transform .2s ease, box-shadow .2s ease; }
      .card-pick:hover { transform: translateY(-4px); box-shadow: 0 24px 48px rgba(0,0,0,.4); }

      .card-head {
        padding: 16px 18px 20px; min-height: 160px; position: relative;
        display: flex; flex-direction: column; justify-content: flex-end;
      }
      .card-text-icon {
        position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
        font-family: "Oswald", sans-serif; font-weight: 700;
        font-size: 36px; letter-spacing: .06em; text-transform: uppercase;
        background: linear-gradient(135deg, var(--gold), var(--gold-2));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text; opacity: .32; pointer-events: none;
        line-height: 1.1; text-align: center; max-width: 130px;
      }

      .btn-back {
        background: rgba(12,7,0,.88); border: 1px solid rgba(201,162,39,.38);
        border-radius: 999px; color: var(--gold); padding: 8px 16px 8px 12px;
        font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
        position: relative; overflow: hidden; isolation: isolate;
        transition: background .2s ease, border-color .2s ease, box-shadow .2s ease,
                    transform .22s cubic-bezier(.34,1.56,.64,1);
        line-height: 1; box-shadow: 0 2px 10px rgba(201,162,39,.12);
      }
      .btn-back::before {
        content: ""; position: absolute; inset: 0; border-radius: inherit;
        background: rgba(201,162,39,.08); transform: scaleX(0); transform-origin: left;
        transition: transform .28s cubic-bezier(.34,1.2,.64,1);
        z-index: -1; pointer-events: none;
      }
      .btn-back:hover {
        background: rgba(201,162,39,.1); border-color: rgba(201,162,39,.65);
        transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,162,39,.22);
      }
      .btn-back:hover::before { transform: scaleX(1); }
      .btn-back:active { transform: scale(.96); transition-duration: .08s; }

      .card-body {
        padding: 14px 16px 16px;
        background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      }

      .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
      .tag {
        font-size: 11px; padding: 5px 9px; border-radius: 999px;
        border: 1px solid rgba(255,255,255,.08);
        color: var(--muted); background: rgba(255,255,255,.03);
      }

      .field { display: grid; gap: 8px; margin-bottom: 14px; }
      .field label {
        font-size: 11px; color: var(--muted); text-transform: uppercase;
        letter-spacing: .14em; font-family: "Oswald", sans-serif;
      }
      .field input, .field select, .field textarea {
        width: 100%; background: var(--panel-3); color: var(--text);
        border: 1px solid rgba(255,255,255,.08); border-radius: 14px;
        padding: 12px 14px;
      }
      .field input:focus, .field select:focus, .field textarea:focus {
        outline: none; border-color: rgba(200,120,24,.45);
        box-shadow: 0 0 0 3px rgba(200,120,24,.12);
      }

      .items { display: grid; gap: 10px; }
      .item-row {
        display: grid; grid-template-columns: 1fr 240px;
        gap: 16px; align-items: center;
        background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.06);
        border-left: 4px solid rgba(200,120,24,.24); border-radius: 16px;
        padding: 14px 16px; transition: background .2s ease, border-color .2s ease;
      }
      .item-row.clean { border-left-color: var(--green); background: rgba(45,204,112,.08); }
      .item-row.dirty { border-left-color: var(--red); background: rgba(239,91,91,.08); }
      .item-row.missing { border-left-color: #f59e0b; }
      .item-title { font-weight: 700; margin-bottom: 4px; }
      .status-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .status-btn {
        border: 1px solid rgba(255,255,255,.1); border-radius: 18px;
        padding: 13px 10px; cursor: pointer;
        background: rgba(255,255,255,.04); color: var(--text);
        font-family: "Oswald", sans-serif; letter-spacing: .06em;
        position: relative; overflow: hidden; isolation: isolate;
        transition: background .2s ease, border-color .2s ease, box-shadow .2s ease,
                    transform .2s cubic-bezier(.34,1.56,.64,1);
      }
      .status-btn::before {
        content: ""; position: absolute; inset: 0; border-radius: inherit;
        opacity: 0; transition: opacity .2s ease; z-index: -1; pointer-events: none;
      }
      .status-btn[data-value="clean"]::before { background: rgba(45,204,112,.1); }
      .status-btn[data-value="dirty"]::before { background: rgba(239,91,91,.1); }
      .status-btn:hover { transform: translateY(-1px); }
      .status-btn:hover::before { opacity: 1; }
      .status-btn[data-value="clean"]:hover { border-color: rgba(45,204,112,.32); }
      .status-btn[data-value="dirty"]:hover { border-color: rgba(239,91,91,.32); }
      .status-btn:active { transform: scale(.96); transition-duration: .08s; }
      .status-btn.active.clean {
        background: linear-gradient(135deg, var(--green), var(--green-dark)); border-color: var(--green);
        box-shadow: 0 4px 18px rgba(45,204,112,.28), inset 0 1px 0 rgba(255,255,255,.18);
      }
      .status-btn.active.dirty {
        background: linear-gradient(135deg, var(--red), var(--red-dark)); border-color: var(--red);
        box-shadow: 0 4px 18px rgba(239,91,91,.28), inset 0 1px 0 rgba(255,255,255,.15);
      }

      .toolbar {
        display: flex; flex-wrap: wrap; justify-content: space-between;
        align-items: center; gap: 10px; margin-bottom: 18px;
      }

      .table-wrap { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,.06); }
      th {
        color: var(--muted); font-size: 11px; text-transform: uppercase;
        letter-spacing: .16em; font-family: "Oswald", sans-serif;
      }
      tr:nth-child(even) td { background: rgba(255,255,255,.02); }

      .pill {
        display: inline-block; padding: 4px 10px;
        border-radius: 999px; font-size: 12px; font-weight: 700;
      }
      .pill.ok { color: var(--green); background: rgba(45,204,112,.15); }
      .pill.bad { color: var(--red); background: rgba(239,91,91,.15); }

      .progress { height: 6px; background: rgba(255,255,255,.04); border-radius: 999px; overflow: hidden; }
      .progress > div { height: 100%; background: linear-gradient(135deg, var(--gold), var(--gold-2)); transition: width .3s ease; }

      .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
      .tab {
        background: rgba(255,255,255,.03); color: var(--muted);
        border: 1px solid rgba(255,255,255,.08); border-radius: 999px;
        padding: 8px 12px; cursor: pointer;
        transition: background .15s ease, color .15s ease;
      }
      .tab.active { color: var(--gold-2); border-color: rgba(200,120,24,.28); background: rgba(200,120,24,.10); }

      .bars { display: grid; gap: 10px; }
      .bar-label { display: flex; justify-content: space-between; margin-bottom: 6px; gap: 10px; }
      .bar-track { height: 8px; background: rgba(255,255,255,.04); border-radius: 999px; overflow: hidden; }
      .bar-fill { height: 100%; border-radius: 999px; transition: width .4s ease; }

      .footer-bar {
        margin-top: 24px; display: flex; justify-content: space-between;
        gap: 18px; flex-wrap: wrap; align-items: center;
        color: var(--muted); padding: 16px 2px 0;
      }
      .footer-links, .footer-icons { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; }
      .footer-icons span, .footer-links span {
        padding: 8px 10px; border-radius: 999px;
        background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      }

      .modal-backdrop {
        position: fixed; inset: 0; background: rgba(0,0,0,.78);
        display: flex; align-items: center; justify-content: center;
        padding: 20px; z-index: 40;
        animation: fadeIn .2s ease;
      }
      .modal {
        width: min(520px, 100%);
        background: linear-gradient(180deg, rgba(24,33,44,.98) 0%, rgba(15,20,27,.98) 100%);
        border: 1px solid rgba(255,255,255,.08); border-radius: 20px;
        padding: 24px; box-shadow: var(--shadow);
        animation: slideUp .25s ease;
      }
      .toast {
        position: fixed; right: 20px; bottom: 20px; z-index: 50;
        padding: 14px 16px; border-radius: 16px; color: var(--text);
        border: 1px solid transparent; box-shadow: var(--shadow);
        animation: slideIn .3s ease;
      }
      .toast.success { background: rgba(22,101,52,.95); border-color: var(--green); }
      .toast.error { background: rgba(127,29,29,.95); border-color: var(--red); }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes liveBlink { 0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(45,204,112,.6); } 50% { opacity: .6; box-shadow: 0 0 8px 2px rgba(45,204,112,.8); } }
      .live-dot {
        display: inline-block; width: 8px; height: 8px; border-radius: 50%;
        background: var(--green); margin-right: 6px; vertical-align: middle;
        animation: liveBlink 1.5s ease-in-out infinite;
      }

      /* Декоративна метла в background – не пречи на кликове */
      .broom-fun {
        position: fixed; bottom: 0; left: 0; right: 0;
        height: 80px; z-index: 0; pointer-events: none;
        overflow: hidden;
      }
      .broom-sweep {
        position: absolute; bottom: 12px; left: -60px;
        font-size: 42px; opacity: .35;
        animation: sweepAcross 18s ease-in-out infinite;
      }
      .broom-dust {
        position: absolute; bottom: 24px; width: 6px; height: 6px;
        border-radius: 50%; background: rgba(255,255,255,.25);
        pointer-events: none;
      }
      .broom-dust:nth-child(1) { left: 8%; animation: dustFade 18s ease-in-out infinite 0s; }
      .broom-dust:nth-child(2) { left: 22%; animation: dustFade 18s ease-in-out infinite 1.5s; }
      .broom-dust:nth-child(3) { left: 38%; animation: dustFade 18s ease-in-out infinite 3s; }
      .broom-dust:nth-child(4) { left: 55%; animation: dustFade 18s ease-in-out infinite 4.5s; }
      .broom-dust:nth-child(5) { left: 72%; animation: dustFade 18s ease-in-out infinite 6s; }
      .broom-dust:nth-child(6) { left: 88%; animation: dustFade 18s ease-in-out infinite 7.5s; }
      @keyframes sweepAcross {
        0%, 100% { transform: translateX(0) rotate(-5deg); }
        25% { transform: translateX(25vw) rotate(2deg); }
        50% { transform: translateX(50vw) rotate(-3deg); }
        75% { transform: translateX(75vw) rotate(2deg); }
        100% { transform: translateX(100vw) translateX(60px) rotate(-5deg); }
      }
      @keyframes dustFade {
        0%, 10%, 90%, 100% { opacity: 0; transform: scale(0.8); }
        25%, 50%, 75% { opacity: .4; transform: scale(1); }
      }

      @media (max-width: 980px) {
        .hero-grid, .cards-2, .cards-4, .cg-chart-grid { grid-template-columns: 1fr; }
        .topbar { flex-direction: column; align-items: stretch; }
        .topbar-meta { justify-content: flex-start; flex-wrap: wrap; }
        .product-strip {
          flex-direction: column;
          justify-content: center;
          text-align: center;
          gap: 10px;
        }
        .product-strip-left { justify-content: center; }
        .product-strip-status {
          position: static;
          transform: none;
        }

      @media (max-width: 900px) {
        .item-row { grid-template-columns: 1fr; }
      }

      /* ── Charts Screen ── */
      .charts-loading {
        display: flex; align-items: center; justify-content: center;
        gap: 14px; padding: 80px 20px; color: var(--muted); font-size: 15px;
      }
      .charts-loading .spinner { display: none; } /* replaced by bouncing dots */
      .charts-stat-row {
        display: grid; grid-template-columns: repeat(4, 1fr);
        gap: 12px; margin-bottom: 20px;
      }
      .charts-stat-pill {
        display: flex; flex-direction: column; align-items: center;
        gap: 4px; padding: 20px 16px;
        background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
        border: 1px solid rgba(255,255,255,.07); border-radius: 18px;
        text-align: center;
      }
      .charts-stat-pill strong { font-family: "Oswald", sans-serif; font-size: 36px; line-height: 1; }
      .charts-stat-pill span  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; }
      .charts-grid {
        display: grid; grid-template-columns: repeat(2, 1fr);
        gap: 16px; margin-bottom: 16px;
      }
      @media (max-width: 860px) {
        .charts-grid { grid-template-columns: 1fr; }
        .charts-stat-row { grid-template-columns: repeat(2, 1fr); }
      }
      .chart-card.full-width { grid-column: 1 / -1; }
      .charts-table {
        width: 100%; border-collapse: collapse; font-size: 13px;
      }
      .charts-table th {
        text-align: left; padding: 10px 12px;
        font-family: "Oswald", sans-serif; font-weight: 600;
        font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
        color: var(--muted); border-bottom: 1px solid rgba(255,255,255,.08);
      }
      .charts-table td {
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255,255,255,.04);
        color: var(--muted);
      }
      .charts-table tr:last-child td { border-bottom: none; }
      .charts-table tr:hover td { background: rgba(255,255,255,.02); }
      .charts-bar-bg {
        background: rgba(255,255,255,.06); border-radius: 6px; height: 8px; width: 100%; max-width: 200px;
      }
      .charts-bar-fill {
        background: var(--gold); border-radius: 6px; height: 100%;
      }
      .charts-bar-fill--green { background: var(--green); }
      .charts-bar-fill--red { background: var(--red); }
      .charts-bar-fill--blue { background: var(--blue); }
      .charts-bar-fill--purple { background: #a78bfa; }
      .charts-html-list { display: flex; flex-direction: column; gap: 12px; }
      .charts-html-row { display: flex; align-items: center; gap: 12px; font-size: 13px; padding: 4px 0; border-radius: 8px; transition: background .15s ease; }
      .charts-html-row:hover { background: rgba(255,255,255,.02); }
      .charts-html-row span:first-child { min-width: 90px; color: var(--muted); flex-shrink: 0; }
      .charts-html-row span:last-child { min-width: 32px; text-align: right; font-weight: 600; color: var(--text); }
      .charts-html-row .charts-bar-bg { flex: 1; max-width: none; height: 10px; }
      /* KPI cards */
      .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 16px; }
      .kpi-card { padding: 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,.06); background: linear-gradient(160deg, rgba(255,255,255,.03), transparent); transition: transform .15s ease, border-color .15s ease; }
      .kpi-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,.1); }
      .kpi-card .kpi-value { font-family: "Oswald", sans-serif; font-size: 28px; font-weight: 700; line-height: 1.1; }
      .kpi-card .kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-top: 4px; }
      .kpi-card .kpi-badge { font-size: 9px; padding: 2px 6px; border-radius: 6px; margin-top: 6px; display: inline-block; }
      @media (max-width: 900px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 500px) { .kpi-row { grid-template-columns: 1fr; } }
      /* Donut */
      .charts-donut-wrap { display: flex; align-items: center; justify-content: center; gap: 24px; flex-wrap: wrap; min-height: 180px; }
      .charts-donut { width: 140px; height: 140px; border-radius: 50%; position: relative; flex-shrink: 0; }
      .charts-donut-center { position: absolute; inset: 50%; transform: translate(-50%, -50%); width: 70%; height: 70%; background: var(--panel-2); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      /* Vertical bars (time-series) */
      .charts-vertical-wrap { display: flex; align-items: flex-end; gap: 12px; height: 200px; padding: 0 8px; }
      .charts-vertical-col { flex: 1; min-width: 36px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
      .daily-bar-track { width: 100%; height: 150px; display: flex; flex-direction: column; justify-content: flex-end; background: rgba(255,255,255,.06); border-radius: 8px 8px 0 0; overflow: hidden; }
      .daily-bar-fill { width: 100%; min-height: 8px; border-radius: 6px 6px 0 0; background: var(--gold); transition: height .25s ease; }
      /* Hourly histogram */
      .hourly-histogram { display: flex; align-items: flex-end; gap: 4px; height: 200px; padding: 0 4px; }
      .hourly-col { flex: 1; min-width: 14px; display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
      .hourly-bar-track { width: 100%; height: 160px; display: flex; flex-direction: column; justify-content: flex-end; background: rgba(255,255,255,.04); border-radius: 4px 4px 0 0; overflow: visible; }
      .hourly-bar-fill { width: 100%; min-height: 2px; border-radius: 4px 4px 0 0; background: rgba(167,139,250,.7); transition: height .25s ease; }
      .hourly-label { font-size: 9px; color: var(--muted-2); }
      .hourly-value { font-size: 9px; font-weight: 700; color: var(--text); }
      /* Leaderboard */
      .leaderboard-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; transition: background .15s ease; }
      .leaderboard-item:hover { background: rgba(255,255,255,.03); }
      .leaderboard-rank { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
      .leaderboard-rank.top1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1a1a1a; }
      .leaderboard-rank.top2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
      .leaderboard-rank.top3 { background: linear-gradient(135deg, #b45309, #92400e); color: #fef3c7; }
      .leaderboard-rank.other { background: rgba(255,255,255,.08); color: var(--muted); }
      .leaderboard-avatar { width: 36px; height: 36px; border-radius: 10px; background: rgba(200,120,24,.2); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: var(--gold); flex-shrink: 0; }
      .leaderboard-bar { flex: 1; height: 10px; background: rgba(255,255,255,.06); border-radius: 6px; overflow: hidden; }
      .leaderboard-bar-fill { height: 100%; border-radius: 6px; transition: width .25s ease; }
      /* Issue analysis */
      .issue-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; border-left: 3px solid var(--red); background: rgba(239,91,91,.06); transition: background .15s ease; }
      .issue-item:hover { background: rgba(239,91,91,.1); }
      .issue-severity { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .issue-severity.high { background: var(--red); }
      .issue-severity.med { background: var(--gold); }
      .issue-severity.low { background: var(--muted); }
      .issue-count { font-weight: 700; color: var(--red); min-width: 24px; text-align: right; }
      .issue-pct { font-size: 11px; color: var(--muted); }
      /* Grouped distribution */
      .zone-group { margin-bottom: 16px; }
      .zone-group-title { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,.06); }
      .zone-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13px; }
      .zone-item .charts-bar-bg { flex: 1; max-width: none; height: 8px; }
      /* Heatmap */
      .heatmap-grid { display: grid; grid-template-columns: repeat(24, 1fr); gap: 3px; padding: 12px 0; }
      .heatmap-cell { aspect-ratio: 1; min-height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; transition: transform .15s ease; }
      .heatmap-cell:hover { transform: scale(1.08); }
      .heatmap-cell.has-data { color: rgba(255,255,255,.95); }
      .heatmap-cell.empty { background: rgba(255,255,255,.04); color: transparent; }
      .heatmap-legend { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 8px; }
      .chart-card {
        background: linear-gradient(160deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.015) 100%);
        border: 1px solid rgba(255,255,255,.07); border-radius: 20px;
        padding: 20px 20px 16px; position: relative; overflow: hidden;
        transition: transform .15s ease, border-color .15s ease;
      }
      .chart-card:hover { border-color: rgba(255,255,255,.1); }
      .chart-card::before {
        content: ''; position: absolute; inset: 0; border-radius: 20px;
        background: linear-gradient(135deg, rgba(200,120,24,.06) 0%, transparent 60%);
        pointer-events: none;
      }
      .chart-card.card-donut::before { background: linear-gradient(135deg, rgba(45,204,112,.08) 0%, transparent 60%); }
      .chart-card.card-issues::before { background: linear-gradient(135deg, rgba(239,91,91,.06) 0%, transparent 60%); }
      .chart-card.card-time::before { background: linear-gradient(135deg, rgba(167,139,250,.08) 0%, transparent 60%); }
      .chart-title {
        font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 3px;
        font-family: "Oswald", sans-serif; letter-spacing: .04em;
      }
      .chart-subtitle {
        font-size: 11px; color: var(--muted); margin-bottom: 16px;
        text-transform: uppercase; letter-spacing: .1em;
      }
      .chart-wrap { position: relative; }
      .chart-empty {
        display: flex; align-items: center; justify-content: center;
        height: 100%; color: var(--muted); font-size: 13px;
      }

      /* ── Bloom Background Effect (PC + мобилни + таблети) ── */
      .bloom-layer {
        position: fixed; inset: 0;
        pointer-events: none; z-index: 0; overflow: hidden;
        min-height: 100vh; min-height: 100dvh;
        -webkit-backface-visibility: hidden; backface-visibility: hidden;
        transform: translateZ(0); -webkit-transform: translateZ(0);
      }
      .bloom-orb {
        position: absolute; border-radius: 50%;
        filter: blur(90px); -webkit-filter: blur(90px);
        animation: bloomPulse 8s ease-in-out infinite;
        will-change: opacity, transform;
        -webkit-backface-visibility: hidden; backface-visibility: hidden;
        transform: translateZ(0); -webkit-transform: translateZ(0);
      }
      .bloom-orb--gold {
        width: 55vw; height: 55vw; top: -12%; left: -10%;
        background: radial-gradient(circle, rgba(200,120,24,.35), rgba(200,120,24,.12) 40%, transparent 70%);
        animation: bloomPulse 9s ease-in-out infinite, bloomHue1 12s linear infinite;
        animation-delay: 0s, 0s;
      }
      .bloom-orb--blue {
        width: 45vw; height: 45vw; top: 12%; right: -10%;
        background: radial-gradient(circle, rgba(98,169,255,.28), rgba(98,169,255,.08) 40%, transparent 70%);
        animation: bloomPulse 10s ease-in-out infinite, bloomHue2 14s linear infinite;
        animation-delay: -3s, -2s;
      }
      .bloom-orb--red {
        width: 42vw; height: 42vw; bottom: 8%; left: 20%;
        background: radial-gradient(circle, rgba(239,91,91,.22), rgba(239,91,91,.06) 40%, transparent 70%);
        animation: bloomPulse 11s ease-in-out infinite, bloomHue3 16s linear infinite;
        animation-delay: -5s, -4s;
      }
      .bloom-orb--gold2 {
        width: 35vw; height: 35vw; bottom: 15%; right: 2%;
        background: radial-gradient(circle, rgba(200,120,24,.25), rgba(200,120,24,.08) 40%, transparent 70%);
        animation: bloomPulse 7s ease-in-out infinite, bloomHue4 10s linear infinite;
        animation-delay: -2s, -1s;
      }
      .bloom-orb--purple {
        width: 38vw; height: 38vw; top: 50%; left: 50%;
        margin-left: -19vw; margin-top: -19vw;
        background: radial-gradient(circle, rgba(167,139,250,.2), rgba(167,139,250,.05) 40%, transparent 70%);
        animation: bloomPulse 9.5s ease-in-out infinite, bloomHue5 13s linear infinite;
        animation-delay: -6s, -3s;
      }
      /* Bloom за таблети и телефони — по-малък blur (мобилните го рендират по-добре), по-ярки цветове */
      @media (max-width: 1024px) {
        .bloom-orb { filter: blur(60px); -webkit-filter: blur(60px); }
        .bloom-orb--gold { background: radial-gradient(circle, rgba(200,120,24,.45), rgba(200,120,24,.2) 40%, transparent 70%); }
        .bloom-orb--blue { background: radial-gradient(circle, rgba(98,169,255,.38), rgba(98,169,255,.15) 40%, transparent 70%); }
        .bloom-orb--red { background: radial-gradient(circle, rgba(239,91,91,.35), rgba(239,91,91,.12) 40%, transparent 70%); }
        .bloom-orb--gold2 { background: radial-gradient(circle, rgba(200,120,24,.4), rgba(200,120,24,.18) 40%, transparent 70%); }
        .bloom-orb--purple { background: radial-gradient(circle, rgba(167,139,250,.3), rgba(167,139,250,.12) 40%, transparent 70%); }
      }
      @media (max-width: 768px) {
        .bloom-orb { filter: blur(50px); -webkit-filter: blur(50px); }
        .bloom-orb--gold { background: radial-gradient(circle, rgba(200,120,24,.5), rgba(200,120,24,.25) 40%, transparent 70%); }
        .bloom-orb--blue { background: radial-gradient(circle, rgba(98,169,255,.45), rgba(98,169,255,.2) 40%, transparent 70%); }
        .bloom-orb--red { background: radial-gradient(circle, rgba(239,91,91,.42), rgba(239,91,91,.18) 40%, transparent 70%); }
        .bloom-orb--gold2 { background: radial-gradient(circle, rgba(200,120,24,.48), rgba(200,120,24,.22) 40%, transparent 70%); }
        .bloom-orb--purple { background: radial-gradient(circle, rgba(167,139,250,.38), rgba(167,139,250,.18) 40%, transparent 70%); }
      }
      @keyframes bloomPulse {
        0%   { opacity: 0.55; transform: scale(1) translate(0, 0); }
        25%  { opacity: 1; transform: scale(1.18) translate(4vw, -3vw); }
        50%  { opacity: 0.9; transform: scale(1.1) translate(-5vw, 4vw); }
        75%  { opacity: 1; transform: scale(1.15) translate(3vw, 5vw); }
        100% { opacity: 0.55; transform: scale(1) translate(0, 0); }
      }
      @keyframes bloomHue1 {
        0%, 100% { filter: blur(90px) hue-rotate(0deg) saturate(1.2); }
        50% { filter: blur(90px) hue-rotate(15deg) saturate(1.4); }
      }
      @keyframes bloomHue2 {
        0%, 100% { filter: blur(90px) hue-rotate(0deg) saturate(1.1); }
        50% { filter: blur(90px) hue-rotate(-20deg) saturate(1.3); }
      }
      @keyframes bloomHue3 {
        0%, 100% { filter: blur(90px) hue-rotate(0deg) saturate(1.15); }
        50% { filter: blur(90px) hue-rotate(10deg) saturate(1.35); }
      }
      @keyframes bloomHue4 {
        0%, 100% { filter: blur(90px) hue-rotate(0deg) saturate(1.1); }
        50% { filter: blur(90px) hue-rotate(-12deg) saturate(1.3); }
      }
      @keyframes bloomHue5 {
        0%, 100% { filter: blur(90px) hue-rotate(0deg) saturate(1.2); }
        50% { filter: blur(90px) hue-rotate(25deg) saturate(1.4); }
      }
      @media (max-width: 1024px) {
        @keyframes bloomHue1 { 0%, 100% { filter: blur(60px) hue-rotate(0deg) saturate(1.2); } 50% { filter: blur(60px) hue-rotate(15deg) saturate(1.4); } }
        @keyframes bloomHue2 { 0%, 100% { filter: blur(60px) hue-rotate(0deg) saturate(1.1); } 50% { filter: blur(60px) hue-rotate(-20deg) saturate(1.3); } }
        @keyframes bloomHue3 { 0%, 100% { filter: blur(60px) hue-rotate(0deg) saturate(1.15); } 50% { filter: blur(60px) hue-rotate(10deg) saturate(1.35); } }
        @keyframes bloomHue4 { 0%, 100% { filter: blur(60px) hue-rotate(0deg) saturate(1.1); } 50% { filter: blur(60px) hue-rotate(-12deg) saturate(1.3); } }
        @keyframes bloomHue5 { 0%, 100% { filter: blur(60px) hue-rotate(0deg) saturate(1.2); } 50% { filter: blur(60px) hue-rotate(25deg) saturate(1.4); } }
      }
      @media (max-width: 768px) {
        @keyframes bloomHue1 { 0%, 100% { filter: blur(50px) hue-rotate(0deg) saturate(1.2); } 50% { filter: blur(50px) hue-rotate(15deg) saturate(1.4); } }
        @keyframes bloomHue2 { 0%, 100% { filter: blur(50px) hue-rotate(0deg) saturate(1.1); } 50% { filter: blur(50px) hue-rotate(-20deg) saturate(1.3); } }
        @keyframes bloomHue3 { 0%, 100% { filter: blur(50px) hue-rotate(0deg) saturate(1.15); } 50% { filter: blur(50px) hue-rotate(10deg) saturate(1.35); } }
        @keyframes bloomHue4 { 0%, 100% { filter: blur(50px) hue-rotate(0deg) saturate(1.1); } 50% { filter: blur(50px) hue-rotate(-12deg) saturate(1.3); } }
        @keyframes bloomHue5 { 0%, 100% { filter: blur(50px) hue-rotate(0deg) saturate(1.2); } 50% { filter: blur(50px) hue-rotate(25deg) saturate(1.4); } }
      }

      /* ── Low Performance Mode ── */
      body.low-perf .bloom-layer { display: none; }
      body.low-perf .broom-fun { display: none; }
      body.low-perf .live-dot { animation: none; box-shadow: none; }
      body.low-perf .topbar { backdrop-filter: none; }
      body.low-perf .card-pick { transition: none; }
      body.low-perf .card-pick:hover { transform: none; box-shadow: var(--shadow); }
      body.low-perf .btn, body.low-perf .nav-btn, body.low-perf .status-btn, body.low-perf .tab { transition: none; }
      body.low-perf .btn::before, body.low-perf .nav-btn::before, body.low-perf .status-btn::before, body.low-perf .btn-back::before { transition: none; }
      body.low-perf .btn:hover, body.low-perf .nav-btn:hover, body.low-perf .status-btn:hover, body.low-perf .tab:hover { transform: none; }
      body.low-perf .btn:hover::before, body.low-perf .nav-btn:hover::before, body.low-perf .status-btn:hover::before { transform: none; opacity: 0; }
      body.low-perf .modal { animation: none; }
      body.low-perf .modal-backdrop { animation: none; }
      body.low-perf .toast { animation: none; }
      body.low-perf .item-row { transition: none; }
      body.low-perf .bar-fill { transition: none; }
      body.low-perf .progress > div { transition: none; }
      body.low-perf .hero-orbit { display: none; }
      .cg-fx-switch { border-color: rgba(52,211,153,.25) !important; }
      body.low-perf .cg-fx-switch { border-color: rgba(255,255,255,.08) !important; }
      body.low-perf {
        background: var(--bg) !important;
      }

      @media print {
        .bloom-layer, .app-shell, .broom-fun { display: none !important; }
        #qr-modal-backdrop { position: static !important; background: #fff !important; padding: 20px !important; width: 100% !important; min-height: 100vh !important; }
        .qr-modal { box-shadow: none !important; border: 1px solid #ddd !important; max-width: 100% !important; }
      }

      /* ── Google Reviews ── */
      .cg-reviews-wrap { padding: 24px 0 8px; }
      .cg-reviews-kicker { text-transform: uppercase; letter-spacing: 4px; font-size: 11px; color: var(--gold); font-weight: 600; margin-bottom: 6px; }
      .cg-reviews-heading { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
      .cg-overall { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
      .cg-overall-num { font-size: 36px; font-weight: 700; color: var(--gold); line-height: 1; }
      .cg-overall-stars { color: var(--gold); font-size: 18px; }
      .cg-overall-count { color: var(--muted); font-size: 13px; }
      .cg-reviews-grid { display: grid; gap: 12px; }
      .cg-review-card {
        background: var(--panel); border: 1px solid rgba(200,120,24,.15);
        border-radius: 12px; padding: 16px 18px; position: relative; overflow: hidden;
        opacity: 0; transform: translateY(10px);
        transition: background .2s, border-color .2s;
        animation: cgFadeUp .4s forwards;
      }
      .cg-review-card:hover { background: var(--panel-2); border-color: rgba(200,120,24,.35); }
      .cg-quote-deco { position: absolute; top: 6px; right: 12px; font-size: 54px; color: rgba(200,120,24,.07); font-family: Georgia,serif; line-height: 1; pointer-events: none; }
      .cg-review-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
      .cg-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,var(--gold),#7a4e0a); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
      .cg-author { font-weight: 600; font-size: 13px; color: var(--text); }
      .cg-date { font-size: 11px; color: var(--muted); }
      .cg-review-stars { color: var(--gold); font-size: 12px; margin-bottom: 6px; }
      .cg-review-text { font-size: 13px; color: var(--muted); line-height: 1.55; }
      .cg-reviews-link { display: inline-block; margin-top: 14px; color: var(--gold); font-size: 12px; text-decoration: none; border-bottom: 1px solid rgba(200,120,24,.3); padding-bottom: 1px; }
      .cg-reviews-link:hover { border-color: var(--gold); }
      .cg-reviews-loading { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 13px; padding: 16px 0; }
      .cg-spinner { width: 16px; height: 16px; border: 2px solid rgba(200,120,24,.2); border-top-color: var(--gold); border-radius: 50%; animation: cgSpin .8s linear infinite; }
      @keyframes cgSpin { to { transform: rotate(360deg); } }

      /* ── Bouncing Dots Loader ── */
      .cg-bounce-dots { display: flex; gap: 7px; align-items: center; justify-content: center; }
      .cg-bounce-dots span {
        display: block; width: 10px; height: 10px; border-radius: 50%;
        background: var(--gold);
        animation: cgBounce .6s ease-in-out infinite;
      }
      .cg-bounce-dots span:nth-child(2) { animation-delay: .2s; }
      .cg-bounce-dots span:nth-child(3) { animation-delay: .4s; }
      @keyframes cgBounce {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-14px); }
      }
      /* Large — used in full-screen lock/loading overlay */
      .cg-bounce-dots.lg span { width: 14px; height: 14px; }
      /* Small — used inline next to text */
      .cg-bounce-dots.sm span { width: 8px; height: 8px; }
      .cg-bounce-dots.sm { gap: 5px; }
      .cg-bounce-dots.sm span:nth-child(1),
      .cg-bounce-dots.sm span:nth-child(2),
      .cg-bounce-dots.sm span:nth-child(3) { animation: cgBounceSm .6s ease-in-out infinite; }

      .cg-bounce-dots.sm span:nth-child(3) { animation-delay: .4s; }
      @keyframes cgBounceSm {
        0%, 100% { transform: translateY(0); }

      }
      @keyframes cgFadeUp { to { opacity: 1; transform: translateY(0); } }
      @media (max-width: 600px) {
        .cg-reviews-heading { font-size: 17px; }
        .cg-review-card { padding: 12px 14px; }

      /* ── Cinematic Effects Switch ── */
      .cg-fx-switch {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 10px; border-radius: 14px;
        background: rgba(39,39,42,.55); border: 1px solid rgba(255,255,255,.08);
        backdrop-filter: blur(8px); cursor: pointer;
        user-select: none; flex-shrink: 0;
      }
      .cg-fx-switch:hover { border-color: rgba(255,255,255,.16); }
      .cg-fx-label {
        font-size: 10px; font-weight: 700; letter-spacing: .08em;
        transition: color .3s;
      }
      .cg-fx-label-off { color: rgba(155,168,185,.25); }
      .cg-fx-label-on  {
        color: #34d399;
        text-shadow: 0 0 8px rgba(52,211,153,.5);
      }
      /* when low-perf is active, flip label colors */
      body.low-perf .cg-fx-label-off { color: rgba(155,168,185,.5); }
      body.low-perf .cg-fx-label-on  {
        color: rgba(155,168,185,.25);
        text-shadow: none;
      }
      .cg-fx-track {
        position: relative; width: 44px; height: 24px; border-radius: 999px;
        background: #064e3b; transition: background .3s;
        flex-shrink: 0;
      }
      body.low-perf .cg-fx-track { background: #27272a; }
      .cg-fx-thumb {
        position: absolute; top: 3px; left: 3px;
        width: 18px; height: 18px; border-radius: 50%;
        background: #34d399;
        box-shadow: 0 0 8px rgba(52,211,153,.45);
        border: 1px solid rgba(255,255,255,.1);
        transition: transform .25s cubic-bezier(.34,1.56,.64,1), background .3s, box-shadow .3s;
        transform: translateX(20px);
      }
      .cg-fx-thumb::after {
        content: ''; position: absolute; top: 3px; left: 4px;
        width: 7px; height: 4px;
        background: rgba(255,255,255,.25); border-radius: 999px;
        filter: blur(1px);
      }
      body.low-perf .cg-fx-thumb {
        transform: translateX(0);
        background: #52525b;
        box-shadow: none;
        transition: none;
      }
      body.low-perf .cg-fx-track { transition: none; }
      body.low-perf .cg-fx-label { transition: none; }

      /* ── Announcement Banner ── */
      .cg-ann-banner {
        background: linear-gradient(135deg, rgba(220,38,38,.22), rgba(185,28,28,.15), rgba(220,38,38,.18));
        border: 2px solid rgba(239,68,68,.55);
        border-left: 5px solid #ef4444;
        border-radius: 14px; padding: 20px 22px;
        display: flex; gap: 16px; align-items: flex-start;
        margin-bottom: 18px;
        box-shadow: 0 0 30px rgba(239,68,68,.15), 0 0 60px rgba(239,68,68,.06);
        animation: cgAnnPulse 2.5s ease-in-out infinite;
        position: relative;
        overflow: hidden;
      }
      .cg-ann-banner::before {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(239,68,68,.06) 50%, transparent 100%);
        animation: cgAnnSweep 4s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes cgAnnPulse {
        0%,100% { box-shadow: 0 0 25px rgba(239,68,68,.12), 0 0 60px rgba(239,68,68,.05); border-color: rgba(239,68,68,.50); }
        50%      { box-shadow: 0 0 45px rgba(239,68,68,.30), 0 0 80px rgba(239,68,68,.10), inset 0 0 20px rgba(239,68,68,.05); border-color: rgba(239,68,68,.75); }
      }
      @keyframes cgAnnSweep {
        0%   { transform: translateX(-100%); }
        50%  { transform: translateX(100%); }
        100% { transform: translateX(-100%); }
      }
      .cg-ann-icon  { font-size: 28px; line-height:1; padding-top:2px; flex-shrink:0;
                       animation: cgAnnShake 2s ease-in-out infinite;
                       filter: drop-shadow(0 0 6px rgba(239,68,68,.5)); }
      @keyframes cgAnnShake {
        0%,100% { transform: rotate(0deg); }
        15%     { transform: rotate(-12deg); }
        30%     { transform: rotate(10deg); }
        45%     { transform: rotate(-8deg); }
        60%     { transform: rotate(0deg); }
      }
      .cg-ann-body  { flex: 1; min-width:0; position:relative; z-index:1; }
      .cg-ann-label { font-size: 12px; font-weight: 800; letter-spacing: .14em;
                      color: #ef4444; margin-bottom: 6px; text-transform:uppercase;
                      text-shadow: 0 0 12px rgba(239,68,68,.4); }
      .cg-ann-text  { font-size: 16px; font-weight: 700; color: #fff;
                      white-space: pre-wrap; line-height: 1.6; word-break:break-word;
                      text-shadow: 0 1px 3px rgba(0,0,0,.3); }
      .cg-ann-date  { font-size: 12px; color: rgba(255,255,255,.55); margin-top: 8px; }
      .cg-ann-date strong { color: rgba(255,255,255,.8); }
      .cg-ann-btns  { display: flex; gap: 6px; flex-shrink: 0; flex-direction:column; position:relative; z-index:1; }
      .cg-ann-btn   { background: rgba(239,68,68,.18); border: 1px solid rgba(239,68,68,.35);
                      color: #fca5a5; border-radius: 6px; padding: 5px 10px;
                      font-size: 11px; cursor: pointer; font-family: inherit;
                      transition: background .2s; white-space:nowrap; }
      .cg-ann-btn:hover { background: rgba(239,68,68,.35); color:#fff; }

      /* ── Topbar red dot indicator ── */
      .cg-ann-dot {
        width: 8px; height: 8px; border-radius: 50%; background: #ef4444;
        display: inline-block; margin-left: 4px; vertical-align: middle;
        box-shadow: 0 0 6px rgba(239,68,68,.7);
        animation: cgAnnDotPulse 1.5s ease-in-out infinite;
      }
      @keyframes cgAnnDotPulse {
        0%,100% { opacity: 1; box-shadow: 0 0 4px rgba(239,68,68,.5); }
        50%     { opacity: .4; box-shadow: 0 0 10px rgba(239,68,68,.9); }
      }
      body.low-perf .cg-ann-banner { animation: none; }
      body.low-perf .cg-ann-banner::before { animation: none; display: none; }
      body.low-perf .cg-ann-icon { animation: none; }
      body.low-perf .cg-ann-dot  { animation: none; }
      .cg-ann-add-btn {
        width: 100%; padding: 11px; border-radius: 9px; font-size: 12px;
        font-weight: 600; border: 1px dashed rgba(239,68,68,.30);
        color: rgba(239,68,68,.55); background: rgba(239,68,68,.04);
        cursor: pointer; font-family: inherit; margin-bottom: 18px;
        transition: all .2s; display:block; text-align:center;
      }
      .cg-ann-add-btn:hover { background: rgba(239,68,68,.10); color: #ef4444;
                               border-color: rgba(239,68,68,.55); }
      /* Modal overlay */
      .cg-ann-overlay {
        position: fixed; inset: 0; z-index: 500;
        background: rgba(0,0,0,.68); backdrop-filter: blur(5px);
        display: flex; align-items: center; justify-content: center;
        padding: 20px;
      }
      .cg-ann-overlay[hidden] { display: none !important; }
      .cg-ann-modal-box {
        background: #1a1a24; border-radius: 16px;
        border: 1px solid rgba(255,255,255,.10); padding: 24px;
        width: 100%; max-width: 420px;
        box-shadow: 0 24px 64px rgba(0,0,0,.65);
        position:relative;
      }
      .cg-ann-modal-title { font-size: 15px; font-weight: 700; margin-bottom: 14px;
                             display:flex; align-items:center; gap:8px; }
      .cg-ann-modal-input {
        width: 100%; padding: 10px 12px; border-radius: 8px;
        background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
        color: var(--text); font-size: 14px; font-family: inherit;
        box-sizing: border-box; resize: vertical; min-height:100px;
      }
      .cg-ann-modal-input[type="password"] { min-height:unset; resize:none; }
      .cg-ann-modal-input:focus { outline: 1px solid #ef4444; border-color: #ef4444; }
      .cg-ann-modal-err { color: #ef4444; font-size: 12px; margin-top: 5px; min-height:16px; }
      .cg-ann-modal-hint { color: var(--muted); font-size: 12px; margin-bottom:12px; }
      .cg-ann-modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
      .cg-ann-modal-save {
        padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 700;
        background: #ef4444; color: #fff; border: none; cursor: pointer;
        font-family: inherit; transition: background .2s;
      }
      .cg-ann-modal-save:hover { background: #dc2626; }
      .cg-ann-modal-cancel {
        padding: 8px 14px; border-radius: 8px; font-size: 13px;
        background: rgba(255,255,255,.07); color: var(--muted);
        border: 1px solid rgba(255,255,255,.10); cursor: pointer; font-family: inherit;
      }

      /* ── Day filter controls ── */
      .day-filter-bar { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
      .day-filter-btn {
        padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
        background: rgba(255,255,255,.07); color: var(--text);
        border: 1px solid rgba(255,255,255,.12); cursor: pointer;
        transition: background .2s, color .2s, border-color .2s;
        font-family: inherit;
      }
      .day-filter-btn:hover { background: rgba(255,255,255,.14); }
      .day-filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
      .day-filter-sep { color: var(--muted); font-size: 12px; padding: 0 2px; }
      .day-date-input {
        padding: 4px 8px; border-radius: 6px; font-size: 12px;
        background: rgba(255,255,255,.07); color: var(--text);
        border: 1px solid rgba(255,255,255,.12);
        font-family: inherit; cursor: pointer;
        color-scheme: dark;
      }
      .day-date-input:focus { outline: 1px solid var(--gold); border-color: var(--gold); }
      /* Mini calendar popup (custom, shown on date input click) */
      .day-cal-popup {
        position: absolute; z-index: 300; top: calc(100% + 6px); left: 0;
        background: var(--panel-2, #1c1c24); border: 1px solid rgba(255,255,255,.12);
        border-radius: 12px; padding: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.5);
        display: none; min-width: 280px;
      }
      .day-cal-popup.open { display: block; }
      .day-cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
      .day-cal-nav { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:4px 8px; border-radius:6px; }
      .day-cal-nav:hover { background:rgba(255,255,255,.08); color:var(--text); }
      .day-cal-title { font-size:13px; font-weight:600; color:var(--text); }
      .day-cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
      .day-cal-wday { text-align:center; font-size:10px; color:var(--muted); padding:4px 0; font-weight:600; }
      .day-cal-cell {
        text-align:center; font-size:12px; padding:5px 2px; border-radius:6px;
        cursor:pointer; color:var(--text); transition:background .15s, color .15s;
        border: 1px solid transparent;
      }
      .day-cal-cell:hover:not(.empty):not(.disabled) { background:rgba(255,255,255,.1); }
      .day-cal-cell.empty { cursor:default; }
      .day-cal-cell.disabled { color:rgba(255,255,255,.2); cursor:default; }
      .day-cal-cell.today { border-color:rgba(200,120,24,.5); }
      .day-cal-cell.in-range { background:rgba(200,120,24,.18); border-radius:0; }
      .day-cal-cell.range-start, .day-cal-cell.range-end { background:var(--gold); color:#000; font-weight:700; }
      .day-cal-cell.range-start { border-radius:6px 0 0 6px; }
      .day-cal-cell.range-end   { border-radius:0 6px 6px 0; }
      .day-cal-cell.range-start.range-end { border-radius:6px; }
      .day-cal-cell.has-data::after {
        content:''; display:block; width:4px; height:4px; border-radius:50%;
        background:var(--gold); margin:1px auto 0;
      }
      .day-cal-cell.range-start.has-data::after,
      .day-cal-cell.range-end.has-data::after { background:#000; }
      .day-cal-actions { display:flex; gap:6px; margin-top:10px; justify-content:flex-end; }
      .day-cal-apply { padding:5px 14px; border-radius:6px; font-size:12px; font-weight:700;
        background:var(--gold); color:#000; border:none; cursor:pointer; font-family:inherit; }
      .day-cal-clear { padding:5px 10px; border-radius:6px; font-size:12px; font-weight:600;
        background:rgba(255,255,255,.07); color:var(--muted); border:1px solid rgba(255,255,255,.12);
        cursor:pointer; font-family:inherit; }
      .day-cal-wrap { position:relative; display:inline-block; }
      .day-cal-trigger {
        padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600;
        background:rgba(255,255,255,.07); color:var(--text);
        border:1px solid rgba(255,255,255,.12); cursor:pointer;
        font-family:inherit; display:flex; align-items:center; gap:5px;
        transition:background .2s;
      }
      .day-cal-trigger:hover { background:rgba(255,255,255,.14); }
      .day-cal-trigger.has-range { border-color:rgba(200,120,24,.6); color:var(--gold); }
      .day-cal-max-note { font-size:10px; color:var(--muted); margin-top:4px; text-align:center; }

    </style>

    <script>

      /* ── Constants ── */

      function distanceMeters(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
        const Δφ = (lat2 - lat1) * Math.PI / 180;
        const Δλ = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                  Math.cos(φ1) * Math.cos(φ2) *
                  Math.sin(Δλ/2) * Math.sin(Δλ/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

          );
        });
      }

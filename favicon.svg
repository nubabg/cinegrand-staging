<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Broom handle -->
  <rect x="36" y="4" width="6" height="32" rx="3" fill="#5a3a00" transform="rotate(35 39 20)"/>
  <!-- Broom bristles base -->
  <polygon points="20,44 44,30 50,50 16,58" fill="#8b5e00"/>
  <!-- Broom bristles - golden layers -->
  <polygon points="22,46 44,32 48,48 18,56" fill="#c8a756"/>
  <polygon points="24,48 44,34 46,46 20,54" fill="#ebcb78"/>
  <!-- Bristle lines -->
  <line x1="26" y1="52" x2="42" y2="36" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="54" x2="44" y2="38" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
  <line x1="34" y1="55" x2="46" y2="40" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
  <!-- Sparkles -->
  <g fill="#ffd700" opacity="0.9">
    <!-- Sparkle 1 -->
    <path d="M10,24 L11,20 L12,24 L16,25 L12,26 L11,30 L10,26 L6,25 Z"/>
    <!-- Sparkle 2 -->
    <path d="M4,36 L5,33 L6,36 L9,37 L6,38 L5,41 L4,38 L1,37 Z" transform="scale(0.7) translate(2,10)"/>
    <!-- Sparkle 3 -->
    <path d="M16,14 L17,12 L18,14 L20,15 L18,16 L17,18 L16,16 L14,15 Z" transform="scale(0.6)"/>
    <!-- Sparkle 4 small -->
    <circle cx="8" cy="18" r="1.5"/>
    <circle cx="14" cy="30" r="1"/>
    <circle cx="5" cy="42" r="1.2"/>
  </g>
  <!-- Handle shine -->
  <rect x="37" y="5" width="2" height="20" rx="1" fill="#f0c040" opacity="0.5" transform="rotate(35 38 15)"/>
</svg>
